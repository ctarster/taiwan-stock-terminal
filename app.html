<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化決策終端 PRO - 機構版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #030303; margin: 0; padding: 0; color: #d1d5db; overflow: hidden; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        #root { height: 100%; width: 100%; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }
        * { scrollbar-width: thin; scrollbar-color: #333 #000; }
        @keyframes pulseBorder { 0%, 100% { border-color: rgba(220, 38, 38, 0.3); } 50% { border-color: rgba(220, 38, 38, 0.8); } }
        .glass-panel { background: rgba(10, 10, 10, 0.97); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .panel-card { background-color: #050505; border: 1px solid rgba(255,255,255,0.06); border-radius: 0.25rem; }
        .predict-panel { border: 1px solid rgba(220, 38, 38, 0.4); animation: pulseBorder 3s infinite ease-in-out; }
        
        /* 隱藏 Lightweight Charts 的預設商標與警告 */
        .tv-lightweight-charts { overflow: hidden !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        const safeNum = (val, fallback = 0) => {
            if (val === null || val === undefined || val === '' || val === '-') return fallback;
            const n = Number(val);
            return (!isNaN(n) && isFinite(n)) ? n : fallback;
        };
        const fmtPrice   = v => (v == null || v === '---') ? '---' : isNaN(+v) ? '---' : (+v).toFixed(2);
        const fmtChange  = v => { if (v == null || isNaN(+v) || v === '---') return '---'; return +v > 0 ? `+${(+v).toFixed(2)}` : (+v).toFixed(2); };
        const fmtPct     = v => { if (v == null || isNaN(+v) || v === '---') return '---'; return +v > 0 ? `+${(+v).toFixed(2)}%` : `${(+v).toFixed(2)}%`; };
        const fmtVol     = v => (v == null || isNaN(+v) || v === '---') ? '0' : Math.round(+v).toLocaleString('en-US');

        // 嚴格的時間格式化工具 (YYYY-MM-DD)
        const formatTime = (dateObj) => {
            const d = new Date(dateObj);
            // 修正時區偏移，確保取得當地時間的正確日期
            const tzOffset = d.getTimezoneOffset() * 60000;
            const localDate = new Date(d.getTime() - tzOffset);
            return localDate.toISOString().split('T')[0];
        };

        const Indicators = {
            ema(data, period) {
                if (!data || data.length === 0) return [];
                const k = 2 / (period + 1);
                let prev = safeNum(data[0]);
                return data.map((v, i) => { if (i === 0) return prev; prev = (safeNum(v) - prev) * k + prev; return prev; });
            },
            rsi(prices, period = 14) {
                if (prices.length <= period) return prices.map(() => 50);
                const out = new Array(prices.length).fill(50);
                let gains = 0, losses = 0;
                for (let i = 1; i <= period; i++) {
                    const d = prices[i] - prices[i - 1];
                    d >= 0 ? gains += d : losses -= d;
                }
                let ag = gains / period, al = losses / period;
                out[period] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
                for (let i = period + 1; i < prices.length; i++) {
                    const d = prices[i] - prices[i - 1];
                    const g = d > 0 ? d : 0, l = d < 0 ? -d : 0;
                    ag = (ag * (period - 1) + g) / period;
                    al = (al * (period - 1) + l) / period;
                    out[i] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
                }
                return out;
            },
            atr(history, period = 14) {
                if (!history || history.length < period) return history.map(() => 0);
                const trs = [0];
                for (let i = 1; i < history.length; i++) {
                    const { high: h, low: l, close: pc } = { high: history[i].high, low: history[i].low, close: history[i - 1].close };
                    trs.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
                }
                const out = new Array(history.length).fill(0);
                out[period] = trs.slice(1, period + 1).reduce((a, b) => a + b, 0) / period;
                for (let i = period + 1; i < history.length; i++) out[i] = (out[i - 1] * (period - 1) + trs[i]) / period;
                return out;
            },
            macd(prices) {
                if (prices.length < 26) return { dif: prices.map(() => 0), dea: prices.map(() => 0), hist: prices.map(() => 0) };
                const ema12 = Indicators.ema(prices, 12);
                const ema26 = Indicators.ema(prices, 26);
                const dif = ema12.map((v, i) => v - ema26[i]);
                const dea = Indicators.ema(dif, 9);
                return { dif, dea, hist: dif.map((v, i) => (v - dea[i]) * 2) };
            },
            kdj(history) {
                if (!history || history.length === 0) return { k: [], d: [], j: [] };
                const ks = [], ds = [], js = [];
                let k = 50, d = 50;
                for (let i = 0; i < history.length; i++) {
                    const slice = history.slice(Math.max(0, i - 8), i + 1);
                    const c = safeNum(history[i].close);
                    const lo = Math.min(...slice.map(h => safeNum(h.low, c)));
                    const hi = Math.max(...slice.map(h => safeNum(h.high, c)));
                    const rsv = hi === lo ? 0 : ((c - lo) / (hi - lo)) * 100;
                    k = (2 / 3) * k + (1 / 3) * rsv;
                    d = (2 / 3) * d + (1 / 3) * k;
                    ks.push(k); ds.push(d); js.push(3 * k - 2 * d);
                }
                return { k: ks, d: ds, j: js };
            }
        };

        const fetchWithTimeout = async (url, opts = {}, ms = 8000) => {
            const ctrl = new AbortController();
            const tid = setTimeout(() => ctrl.abort(), ms);
            try {
                const res = await fetch(url, { ...opts, signal: ctrl.signal });
                clearTimeout(tid);
                return res;
            } catch (e) { clearTimeout(tid); throw new Error('Timeout'); }
        };

        const fetchFastest = async (url, ms = 6000) => {
            const cb = `_cb=${Date.now()}_${Math.floor(Math.random() * 100000)}`;
            const safeUrl = url.includes('?') ? `${url}&${cb}` : `${url}?${cb}`;
            const enc = encodeURIComponent(safeUrl);
            const proxies = [
                `https://api.allorigins.win/raw?url=${enc}`,
                `https://api.codetabs.com/v1/proxy?quest=${enc}`
            ];
            const ctrls = proxies.map(() => new AbortController());
            try {
                const result = await Promise.any(proxies.map(async (p, i) => {
                    const tid = setTimeout(() => ctrls[i].abort(), ms);
                    try {
                        const res = await fetch(p, { signal: ctrls[i].signal });
                        clearTimeout(tid);
                        if (!res.ok) throw new Error('bad');
                        return await res.json();
                    } catch (e) { clearTimeout(tid); throw e; }
                }));
                ctrls.forEach(c => { try { c.abort(); } catch (_) {} });
                return result;
            } catch { return null; }
        };

        const fetchTWSELive = async (id) => {
            const url = `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_${id}.tw|otc_${id}.tw&json=1&delay=0`;
            try {
                const data = await fetchFastest(url, 4000);
                if (data?.msgArray?.length > 0) {
                    const r = data.msgArray[0];
                    const prevClose = safeNum(r.y);
                    const price = r.z !== '-' ? safeNum(r.z, prevClose) : prevClose;
                    const change = price - prevClose;
                    return {
                        price, change,
                        percent: prevClose ? (change / prevClose) * 100 : 0,
                        open: r.o !== '-' ? safeNum(r.o, price) : price,
                        high: r.h !== '-' ? safeNum(r.h, price) : price,
                        low:  r.l !== '-' ? safeNum(r.l, price) : price,
                        volume: safeNum(r.v),
                        name: r.n || ''
                    };
                }
            } catch {}
            return null;
        };

        const fetchHistory = async (id) => {
            const start = new Date();
            start.setFullYear(start.getFullYear() - 1);
            const ds = formatTime(start);
            try {
                const res = await fetchWithTimeout(
                    `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${id}&start_date=${ds}`,
                    {}, 7000
                );
                const json = await res.json();
                if (json.msg === 'success' && json.data?.length > 0) {
                    return json.data.map(d => ({
                        // 確保日期格式為 YYYY-MM-DD
                        time:   d.date.substring(0, 10),
                        open:   safeNum(d.open),
                        high:   safeNum(d.max),
                        low:    safeNum(d.min),
                        close:  safeNum(d.close),
                        volume: safeNum(d.Trading_Volume) / 1000 
                    }));
                }
            } catch (e) { console.warn('FinMind failed', e); }
            return [];
        };

        const fetchFundamentalsFinmind = async (id) => {
             const start = new Date();
             start.setDate(start.getDate() - 30); 
             const ds = formatTime(start);
             try {
                const res = await fetchWithTimeout(
                    `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPER&data_id=${id}&start_date=${ds}`,
                    {}, 5000
                );
                const json = await res.json();
                if (json.msg === 'success' && json.data?.length > 0) {
                    const latest = json.data[json.data.length - 1];
                    return {
                        pe: latest.PER ? latest.PER.toFixed(2) : '---',
                        pb: latest.PBR ? latest.PBR.toFixed(2) : '---',
                        yield: latest.dividend_yield ? latest.dividend_yield.toFixed(2) + '%' : '---',
                        marketCap: '---', 
                        forwardPE: '---'
                    };
                }
             } catch {}
             return { marketCap: '---', pe: '---', pb: '---', yield: '---', forwardPE: '---' };
        };

        const emptyQuote = () => ({
            price: null, change: '---', percent: '---',
            open: null, high: null, low: null, volume: null,
            marketCap: '---', pe: '---', pb: '---', yield: '---', forwardPE: '---'
        });

        const App = () => {
            const [stockId,      setStockId]      = useState('3481');
            const [currentName,  setCurrentName]  = useState('群創');
            const [inputValue,   setInputValue]   = useState('');
            const [customKey,    setCustomKey]     = useState(() => (localStorage.getItem('api_key_groq') || '').trim());
            
            const [liveQuote,    setLiveQuote]     = useState(emptyQuote());
            const [history,      setHistory]       = useState([]);
            const [aiData,       setAiData]        = useState(null);
            
            const [techFeatures, setTechFeatures]  = useState(null);
            const [techVersion,  setTechVersion]   = useState(0);
            
            const [isChartLoading, setIsChartLoading] = useState(false);
            const [isAiLoading,    setIsAiLoading]    = useState(false);
            const [statusMsg,      setStatusMsg]      = useState(null);
            const [showSettings,   setShowSettings]   = useState(false);
            const [hoverData,      setHoverData]      = useState(null);

            const containerRefs = { kline: useRef(null), vol: useRef(null), macd:  useRef(null), kdj: useRef(null) };
            const chartRefs     = useRef({});
            const seriesRefs    = useRef({});
            const chartInited   = useRef(false);
            const fetchGen      = useRef(0);

            const destroyCharts = useCallback(() => {
                Object.values(chartRefs.current).forEach(c => { try { c.remove(); } catch {} });
                chartRefs.current = {};
                seriesRefs.current = {};
                chartInited.current = false;
            }, []);

            const initCharts = useCallback(() => {
                if (!window.LightweightCharts || chartInited.current) return;
                const el = containerRefs.kline.current;
                if (!el || el.clientWidth === 0) return;

                const w = el.clientWidth;
                const base = {
                    width: w,
                    layout: { background: { color: 'transparent' }, textColor: '#9ca3af', fontSize: 11 },
                    grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } },
                    rightPriceScale: { borderColor: '#374151' },
                    crosshair: { mode: 0 },
                    handleScroll: true, handleScale: true
                };

                // 移除圖表預設的警告
                const kChart = window.LightweightCharts.createChart(containerRefs.kline.current, { ...base, timeScale: { borderColor: '#374151', fixRightEdge: true } });
                const kSeries   = kChart.addCandlestickSeries({ upColor: '#ef4444', downColor: '#22c55e', borderVisible: false, wickUpColor: '#ef4444', wickDownColor: '#22c55e' });
                const ma5Series = kChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const ma20Series= kChart.addLineSeries({ color: '#60a5fa', lineWidth: 1.5, crosshairMarkerVisible: false });

                const vChart  = window.LightweightCharts.createChart(containerRefs.vol.current,  { ...base, timeScale: { visible: false } });
                const vSeries = vChart.addHistogramSeries({ color: '#3b82f6', priceFormat: { type: 'volume' } });

                const mChart = window.LightweightCharts.createChart(containerRefs.macd.current, { ...base, timeScale: { visible: false } });
                const mDif   = mChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const mDea   = mChart.addLineSeries({ color: '#60a5fa', lineWidth: 1.5, crosshairMarkerVisible: false });
                const mHist  = mChart.addHistogramSeries();

                const kjChart = window.LightweightCharts.createChart(containerRefs.kdj.current, { ...base, timeScale: { visible: false } });
                const kjK = kjChart.addLineSeries({ color: '#f8fafc', lineWidth: 1.5, crosshairMarkerVisible: false });
                const kjD = kjChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const kjJ = kjChart.addLineSeries({ color: '#d946ef', lineWidth: 1.5, crosshairMarkerVisible: false });

                chartRefs.current   = { kChart, vChart, mChart, kjChart };
                seriesRefs.current  = { kSeries, ma5Series, ma20Series, vSeries, mDif, mDea, mHist, kjK, kjD, kjJ };
                chartInited.current = true;

                kChart.timeScale().subscribeVisibleLogicalRangeChange(r => {
                    if (r) [vChart, mChart, kjChart].forEach(c => c.timeScale().setVisibleLogicalRange(r));
                });

                const ro = new ResizeObserver(() => {
                    const nw = containerRefs.kline.current?.clientWidth;
                    if (nw) Object.values(chartRefs.current).forEach(c => c.applyOptions({ width: nw }));
                });
                ro.observe(containerRefs.kline.current);
            }, []);

            const chartData = useMemo(() => {
                if (!history.length) return [];
                
                // 1. 嚴格去重與過濾：確保時間唯一且數值合法
                const uniqueHistoryMap = new Map();
                
                // 先將歷史資料放入 Map
                history.forEach(item => {
                    if (item.time && isFinite(item.open) && isFinite(item.high) && isFinite(item.low) && isFinite(item.close)) {
                        uniqueHistoryMap.set(item.time, { ...item });
                    }
                });

                // 2. 縫合今日即時報價 (防呆機制)
                if (liveQuote.price) {
                    const todayStr = formatTime(new Date());
                    const lp = safeNum(liveQuote.price);
                    const lo = safeNum(liveQuote.open, lp);
                    const lh = Math.max(safeNum(liveQuote.high, lp), lp);
                    const ll = Math.min(safeNum(liveQuote.low, lp), lp);
                    const lv = safeNum(liveQuote.volume, 0);

                    if (uniqueHistoryMap.has(todayStr)) {
                        // 更新今日 K 棒
                        const last = uniqueHistoryMap.get(todayStr);
                        last.close = lp;
                        last.open = lo;
                        last.high = Math.max(last.high, lh);
                        last.low = Math.min(last.low, ll);
                        last.volume = Math.max(last.volume, lv);
                    } else {
                        // 插入全新今日 K 棒
                        uniqueHistoryMap.set(todayStr, {
                            time: todayStr, open: lo, high: lh, low: ll, close: lp, volume: lv
                        });
                    }
                }
                
                // 3. 轉回陣列並嚴格按照時間遞增排序 (Lightweight Charts 的絕對要求)
                const finalData = Array.from(uniqueHistoryMap.values()).sort((a, b) => a.time.localeCompare(b.time));
                return finalData;
            }, [history, liveQuote]);

            useEffect(() => {
                if (!chartData.length) return;
                
                // 確保容器已經準備好且可見
                if (!containerRefs.kline.current || containerRefs.kline.current.clientWidth === 0) return;

                if (!chartInited.current) initCharts();
                const s = seriesRefs.current;
                if (!s.kSeries) return;

                // 預防渲染崩潰：將賦值包裝在 requestAnimationFrame 中
                window.requestAnimationFrame(() => {
                    try {
                        const closes = chartData.map(d => d.close);
                        const ma5    = Indicators.ema(closes, 5);
                        const ma20   = Indicators.ema(closes, 20);
                        const rsiArr = Indicators.rsi(closes, 14);
                        const atrArr = Indicators.atr(chartData, 14);
                        const { dif, dea, hist } = Indicators.macd(closes);
                        const { k, d, j } = Indicators.kdj(chartData);

                        const enriched = chartData.map((item, i) => ({
                            ...item, ma5: ma5[i], ma20: ma20[i],
                            rsi: rsiArr[i], atr: atrArr[i],
                            dif: dif[i], dea: dea[i], macd: hist[i],
                            k: k[i], d: d[i], j: j[i]
                        }));

                        chartRefs.current.kChart.subscribeCrosshairMove(param => {
                            const found = param.time ? enriched.find(e => e.time === param.time) : null;
                            setHoverData(found || enriched[enriched.length - 1]);
                        });
                        setHoverData(enriched[enriched.length - 1]);

                        const latest = enriched[enriched.length - 1];
                        const newFeatures = {
                            atr:  latest.atr.toFixed(2),
                            rsi:  latest.rsi.toFixed(2),
                            macd: { dif: latest.dif.toFixed(2), dea: latest.dea.toFixed(2) },
                            kdj:  { j: latest.j.toFixed(2) }
                        };
                        
                        setTechFeatures(newFeatures);
                        setTechVersion(v => v + 1);

                        // 進行最終繪圖
                        s.kSeries.setData(chartData);
                        s.ma5Series.setData(chartData.map((d, i) => ({ time: d.time, value: safeNum(ma5[i]) })));
                        s.ma20Series.setData(chartData.map((d, i) => ({ time: d.time, value: safeNum(ma20[i]) })));
                        s.vSeries.setData(chartData.map(d => ({ time: d.time, value: safeNum(d.volume), color: d.close >= d.open ? 'rgba(239,68,68,0.6)' : 'rgba(34,197,94,0.6)' })));
                        s.mDif.setData(chartData.map((d, i) => ({ time: d.time, value: safeNum(dif[i]) })));
                        s.mDea.setData(chartData.map((d, i) => ({ time: d.time, value: safeNum(dea[i]) })));
                        s.mHist.setData(chartData.map((d, i) => ({ time: d.time, value: safeNum(hist[i]), color: hist[i] >= 0 ? '#ef4444' : '#22c55e' })));
                        s.kjK.setData(chartData.map((d, i) => ({ time: d.time, value: safeNum(k[i], 50) })));
                        s.kjD.setData(chartData.map((d, i) => ({ time: d.time, value: safeNum(d[i], 50) })));
                        s.kjJ.setData(chartData.map((d, i) => ({ time: d.time, value: safeNum(j[i], 50) })));
                    } catch (e) { 
                        console.error('圖表繪製失敗，資料序列錯誤:', e);
                        setStatusMsg('圖表繪製發生錯誤，正在重試...');
                    }
                });
            }, [chartData, initCharts]);

            useEffect(() => {
                const gen = ++fetchGen.current;

                setLiveQuote(emptyQuote());
                setHistory([]);
                setAiData(null);
                setTechFeatures(null);
                setStatusMsg(null);
                destroyCharts();
                setIsChartLoading(true);

                fetchTWSELive(stockId).then(q => {
                    if (fetchGen.current !== gen) return;
                    if (q) {
                        if (q.name) setCurrentName(q.name);
                        const { name, ...quote } = q;
                        setLiveQuote(prev => ({ ...prev, ...quote }));
                    }
                });

                fetchHistory(stockId).then(rows => {
                    if (fetchGen.current !== gen) return;
                    if (rows.length > 0) setHistory(rows);
                    else setStatusMsg('歷史資料載入失敗，圖表無法顯示');
                    setIsChartLoading(false);
                });

                fetchFundamentalsFinmind(stockId).then(f => {
                    if (fetchGen.current !== gen || !f) return;
                    setLiveQuote(prev => ({ ...prev, ...f }));
                });
            }, [stockId, destroyCharts]);

            useEffect(() => {
                if (!techFeatures || !customKey || !liveQuote.price) return;
                const gen = fetchGen.current;
                let cancelled = false;

                const run = async () => {
                    setIsAiLoading(true);
                    setAiData(null);
                    try {
                        const systemPrompt = "你是一名頂級機構的量化交易工程師。請務必且只能輸出合法 JSON (JSON object) 格式，嚴禁任何 Markdown、解釋或前後綴文字。";
                        const userPrompt = `請根據以下參數計算並預測台股 [${stockId}] 次日的走勢。
【當前特徵】現價: ${liveQuote.price}, 波動率 ATR(14): ${techFeatures.atr}, 動能 RSI(14): ${techFeatures.rsi}, MACD DIF: ${techFeatures.macd.dif}, MACD DEA: ${techFeatures.macd.dea}, KDJ J值: ${techFeatures.kdj.j}。
【任務限制】
1. 計算明日的預估開盤價與收盤價（必須是數字，請根據 ATR 合理推算）。
2. 根據 ATR 與 RSI 給出上漲、盤整、下跌機率（整數，總和必須為100）。
3. 設定第一停利目標價 (TP1) 與嚴格停損價 (SL)（必須是數字）。
格式必須完全符合此 JSON 結構：{"prediction":{"open":"","close":"","prob":{"up":0,"flat":0,"down":0},"targets":{"tp1":"","sl":""}},"market":{"taiex":"","sox":""},"strategy":{"score":0,"conclusion":""}}`;

                        const res = await fetchWithTimeout('https://api.groq.com/openai/v1/chat/completions', {
                            method: 'POST',
                            headers: { Authorization: `Bearer ${customKey}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                model: "llama-3.3-70b-versatile",
                                messages: [
                                    { role: 'system', content: systemPrompt },
                                    { role: 'user', content: userPrompt }
                                ],
                                response_format: { type: 'json_object' },
                                temperature: 0.1
                            })
                        }, 20000);

                        if (cancelled || fetchGen.current !== gen) return;
                        
                        if (!res.ok) {
                            const errText = await res.text();
                            let errDetail = res.status;
                            try { 
                                const eObj = JSON.parse(errText); 
                                if(eObj.error?.message) errDetail += ` - ${eObj.error.message}`; 
                            } catch(e){}
                            throw new Error(`Groq 拒絕請求 (${errDetail})`);
                        }

                        const data = await res.json();
                        const raw  = data.choices?.[0]?.message?.content;
                        if (!raw) throw new Error('空回應');

                        const jsonStr = raw.match(/\{[\s\S]*\}/)?.[0] || raw;
                        const parsed  = JSON.parse(jsonStr);
                        if (!cancelled) setAiData(parsed);
                    } catch (e) {
                        if (!cancelled) setStatusMsg(`AI 預測中斷：${e.message}`);
                    } finally {
                        if (!cancelled) setIsAiLoading(false);
                    }
                };
                run();
                return () => { cancelled = true; };
            // eslint-disable-next-line react-hooks/exhaustive-deps
            }, [techVersion, customKey]);

            const handleSearch = () => {
                const v = inputValue.trim();
                if (v && v !== stockId) { setStockId(v); setInputValue(''); }
            };

            const settingsRef = useRef(null);
            useEffect(() => {
                if (!showSettings) return;
                const handler = (e) => { if (settingsRef.current && !settingsRef.current.contains(e.target)) setShowSettings(false); };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, [showSettings]);

            const saveKey = () => {
                localStorage.setItem('api_key_groq', customKey);
                setShowSettings(false);
                setTechVersion(v => v + 1);
            };

            const isUp = liveQuote.change >= 0;

            return (
                <div className="min-h-screen bg-[#030303] text-gray-200 font-sans p-2 flex flex-col" style={{ height: '100vh' }}>
                    <header className="flex-none flex justify-between items-center mb-2 bg-[#0a0a0a] p-3 border border-gray-800 rounded">
                        <div className="flex items-center gap-4">
                            <h1 className="text-xl font-bold text-white tracking-tighter">
                                {currentName}
                                <span className="text-blue-500 font-mono text-sm ml-2">{stockId}</span>
                            </h1>
                            <div className="h-6 w-px bg-gray-700"></div>
                            <span className={`text-3xl font-black font-mono ${isUp ? 'text-red-500' : 'text-green-500'}`}>
                                {liveQuote.price ? fmtPrice(liveQuote.price) : '---'}
                            </span>
                            <div className={`flex flex-col text-xs font-bold font-mono ${isUp ? 'text-red-500' : 'text-green-500'}`}>
                                <span>{fmtChange(liveQuote.change)}</span>
                                <span>{fmtPct(liveQuote.percent)}</span>
                            </div>
                        </div>
                        <div className="flex gap-2 items-center">
                            {isChartLoading && <span className="text-xs text-gray-500 animate-pulse">圖表繪製中…</span>}
                            <input
                                type="text" value={inputValue}
                                onChange={e => setInputValue(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && handleSearch()}
                                placeholder="輸入代號"
                                className="w-32 bg-[#111] border border-gray-700 px-3 py-1.5 text-xs rounded text-white outline-none"
                            />
                            <button onClick={handleSearch} className="bg-blue-900 border border-blue-700 px-4 py-1.5 text-xs font-bold rounded text-white hover:bg-blue-800">
                                查詢
                            </button>
                            <button onClick={() => setShowSettings(s => !s)} className="bg-gray-800 border border-gray-600 px-3 py-1.5 text-xs font-bold rounded text-white hover:bg-gray-700">
                                Groq 設定
                            </button>
                        </div>
                    </header>

                    {showSettings && (
                        <div ref={settingsRef} className="absolute top-16 right-4 z-[100] w-80 p-5 glass-panel rounded shadow-2xl">
                            <h3 className="text-xs font-bold text-blue-400 mb-3 uppercase tracking-widest">Groq API 配置</h3>
                            <p className="text-[10px] text-gray-500 mb-2">免費申請：console.groq.com</p>
                            <input
                                type="password" value={customKey}
                                onChange={e => setCustomKey(e.target.value)}
                                placeholder="gsk_..."
                                className="w-full bg-black border border-gray-700 p-2 text-xs rounded font-mono mb-3 text-white outline-none"
                            />
                            <button onClick={saveKey} className="w-full bg-blue-600 text-white py-2 text-xs font-bold rounded hover:bg-blue-700">
                                儲存並重啟預測引擎
                            </button>
                        </div>
                    )}

                    {statusMsg && (
                        <div className="flex-none bg-red-900/30 border border-red-500 text-red-300 text-xs p-2 mb-2 rounded flex justify-between items-center">
                            <span>{statusMsg}</span>
                            <button onClick={() => setStatusMsg(null)} className="ml-2 text-red-400 hover:text-white">✕</button>
                        </div>
                    )}

                    <main className="flex-1 grid grid-cols-12 gap-2 overflow-hidden min-h-0">
                        <div className="col-span-3 flex flex-col gap-2 overflow-y-auto custom-scrollbar pr-1 min-h-0">

                            <div className="panel-card predict-panel p-3 bg-red-950/10 flex flex-col gap-3 relative overflow-hidden">
                                <div className="text-red-500 font-bold text-xs tracking-widest border-b border-red-900/50 pb-1">
                                    GROQ 價格預測模型
                                </div>
                                {!customKey ? (
                                    <div className="text-center py-4 text-gray-500 text-[10px]">請先設定 Groq API 金鑰</div>
                                ) : isAiLoading ? (
                                    <div className="text-center py-4 text-red-400 text-xs animate-pulse">模型推理中…</div>
                                ) : (
                                    <>
                                        <div className="flex justify-between gap-2">
                                            {[['明日開盤預估', aiData?.prediction?.open], ['明日收盤預估', aiData?.prediction?.close]].map(([label, val]) => (
                                                <div key={label} className="flex-1 bg-black/60 border border-red-900/30 rounded p-2 text-center">
                                                    <div className="text-[10px] text-gray-500 mb-1">{label}</div>
                                                    <div className="text-lg font-mono font-black text-white">{val || '---'}</div>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="bg-black/40 border border-gray-800 rounded p-2">
                                            <div className="text-[10px] text-gray-400 mb-1">機率分佈預估</div>
                                            <div className="h-1.5 w-full bg-gray-800 rounded flex overflow-hidden">
                                                <div style={{ width: `${aiData?.prediction?.prob?.up || 0}%` }} className="bg-red-500 transition-all duration-700"></div>
                                                <div style={{ width: `${aiData?.prediction?.prob?.flat || 0}%` }} className="bg-gray-400 transition-all duration-700"></div>
                                                <div style={{ width: `${aiData?.prediction?.prob?.down || 0}%` }} className="bg-green-500 transition-all duration-700"></div>
                                            </div>
                                            <div className="flex justify-between text-[9px] mt-1 font-mono">
                                                <span className="text-red-400">漲 {aiData?.prediction?.prob?.up ?? '--'}%</span>
                                                <span className="text-gray-400">盤 {aiData?.prediction?.prob?.flat ?? '--'}%</span>
                                                <span className="text-green-400">跌 {aiData?.prediction?.prob?.down ?? '--'}%</span>
                                            </div>
                                        </div>

                                        <div className="flex flex-col gap-1 text-[11px] font-mono border-t border-red-900/30 pt-2">
                                            <div className="flex justify-between">
                                                <span className="text-gray-400">目標一 (TP1)</span>
                                                <span className="text-red-400 font-bold">{aiData?.prediction?.targets?.tp1 || '---'}</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-gray-400">停損線 (SL)</span>
                                                <span className="text-green-400 font-bold">{aiData?.prediction?.targets?.sl || '---'}</span>
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>

                            <div className="panel-card bg-[#050505]">
                                <div className="bg-blue-950/20 border-b border-gray-800 p-2">
                                    <span className="text-blue-400 font-bold text-[10px] tracking-widest uppercase">技術特徵 (Tech Features)</span>
                                </div>
                                <div className="p-3 grid grid-cols-2 gap-2 text-[10px] font-mono">
                                    {[
                                        ['ATR(14)', techFeatures?.atr, 'text-yellow-400'],
                                        ['RSI(14)', techFeatures?.rsi, 'text-white'],
                                        ['MACD.DIF', techFeatures?.macd?.dif, 'text-white'],
                                        ['KDJ.J', techFeatures?.kdj?.j, 'text-pink-400']
                                    ].map(([label, val, cls]) => (
                                        <div key={label} className="flex justify-between border-b border-gray-800 border-dotted pb-1">
                                            <span className="text-gray-500">{label}</span>
                                            <span className={cls}>{val ?? '--'}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="panel-card bg-[#050505] flex-1">
                                <div className="bg-slate-900/40 border-b border-gray-800 p-2">
                                    <span className="text-gray-300 font-bold text-[10px] tracking-widest uppercase">基本面與估值</span>
                                </div>
                                <div className="p-3 space-y-2 text-[10px] font-mono">
                                    {[
                                        ['總市值', liveQuote.marketCap, 'text-white'],
                                        ['殖利率', liveQuote.yield, 'text-white'],
                                        ['股淨比 (PB)', liveQuote.pb, 'text-white'],
                                        ['本益比 (PE)', liveQuote.pe, 'text-yellow-400'],
                                        ['預估本益比', liveQuote.forwardPE, 'text-yellow-400']
                                    ].map(([label, val, cls]) => (
                                        <div key={label} className="flex justify-between border-b border-gray-800 pb-1">
                                            <span className="text-gray-500">{label}</span>
                                            <span className={cls}>{val}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="col-span-6 flex flex-col border border-gray-800 bg-[#050505] rounded overflow-hidden min-h-0">
                            <div className="bg-gray-900/50 p-1.5 flex gap-3 text-[10px] font-mono border-b border-gray-800 text-gray-400 flex-none">
                                <span>開:<span className="text-gray-200">{fmtPrice(hoverData?.open)}</span></span>
                                <span>高:<span className="text-red-400">{fmtPrice(hoverData?.high)}</span></span>
                                <span>低:<span className="text-green-400">{fmtPrice(hoverData?.low)}</span></span>
                                <span>收:<span className="text-white font-bold">{fmtPrice(hoverData?.close)}</span></span>
                                <span>量:<span className="text-blue-400">{fmtVol(hoverData?.volume)}</span></span>
                                <span className="ml-auto text-[9px] text-gray-600">MA5:<span className="text-yellow-400 ml-1">{fmtPrice(hoverData?.ma5)}</span> MA20:<span className="text-blue-400 ml-1">{fmtPrice(hoverData?.ma20)}</span></span>
                            </div>
                            <div className="flex-1 flex flex-col min-h-0">
                                <div ref={containerRefs.kline} className="w-full" style={{ flex: 3 }}></div>
                                <div ref={containerRefs.vol}  className="w-full border-t border-gray-900" style={{ flex: 1 }}></div>
                                <div ref={containerRefs.macd} className="w-full border-t border-gray-900" style={{ flex: 1 }}></div>
                                <div ref={containerRefs.kdj}  className="w-full border-t border-gray-900" style={{ flex: 1 }}></div>
                            </div>
                        </div>

                        <div className="col-span-3 flex flex-col gap-2 overflow-y-auto custom-scrollbar pl-1 min-h-0">
                            <div className="panel-card bg-[#050505]">
                                <div className="bg-orange-950/20 border-b border-gray-800 p-2 flex justify-between items-center">
                                    <span className="text-orange-400 font-bold text-[10px] uppercase">AI 戰略矩陣</span>
                                    {aiData?.strategy?.score != null && (
                                        <span className="text-white font-black text-sm">{aiData.strategy.score} 分</span>
                                    )}
                                </div>
                                <div className="p-3 text-[11px] text-gray-300 leading-relaxed">
                                    {isAiLoading ? (
                                        <span className="text-gray-500 animate-pulse">分析中…</span>
                                    ) : aiData?.strategy?.conclusion ? (
                                        aiData.strategy.conclusion
                                    ) : (
                                        <span className="text-gray-600">等待數據載入…</span>
                                    )}
                                </div>
                            </div>

                            <div className="panel-card bg-[#050505] flex-1">
                                <div className="bg-cyan-950/20 border-b border-gray-800 p-2">
                                    <span className="text-cyan-400 font-bold text-[10px] uppercase">總體聯動</span>
                                </div>
                                <div className="p-3 text-[10px] space-y-2 font-mono">
                                    {[
                                        ['大盤狀態 (加權)', aiData?.market?.taiex],
                                        ['費城半導體 (SOX)', aiData?.market?.sox]
                                    ].map(([label, val]) => (
                                        <div key={label} className="flex justify-between border-b border-gray-800 pb-1">
                                            <span className="text-gray-500">{label}</span>
                                            <span className="text-white">{val || '---'}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="panel-card bg-[#050505]">
                                <div className="bg-gray-900/40 border-b border-gray-800 p-2">
                                    <span className="text-gray-500 font-bold text-[10px] uppercase">圖例</span>
                                </div>
                                <div className="p-3 space-y-1.5 text-[10px] font-mono">
                                    {[
                                        ['●', 'text-yellow-400', 'MA5 (5日均線)'],
                                        ['●', 'text-blue-400', 'MA20 (20日均線)'],
                                        ['●', 'text-gray-200', 'KDJ K 值'],
                                        ['●', 'text-yellow-400', 'KDJ D 值'],
                                        ['●', 'text-pink-400', 'KDJ J 值'],
                                    ].map(([dot, cls, label]) => (
                                        <div key={label} className="flex items-center gap-2">
                                            <span className={cls}>{dot}</span>
                                            <span className="text-gray-500">{label}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
