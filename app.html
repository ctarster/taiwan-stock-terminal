        .custom-scrollbar::-webkit-scrollbar { width: 5px; }

        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }

        :-webkit-full-screen { background-color: #030303; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes glowPulse { 0%, 100% { box-shadow: 0 0 10px rgba(37, 99, 235, 0.1); border-color: rgba(37, 99, 235, 0.2); } 50% { box-shadow: 0 0 25px rgba(37, 99, 235, 0.3); border-color: rgba(37, 99, 235, 0.5); } }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .animate-fade-up { opacity: 0; animation: fadeInUp 0.4s ease-out forwards; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .header-glow { animation: glowPulse 3s infinite ease-in-out; }
        
        .loading-shimmer { background: linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.02) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear; }
        .glass-panel { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .panel-card { background-color: #050505; border: 1px solid rgba(255,255,255,0.06); border-radius: 0.25rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        const defaultModel = "llama-3.3-70b-versatile";

        // --- 全局數值格式化工具 (徹底消滅無限小數點) ---
        const fmtPrice = (val) => {
            if (val === undefined || val === null || val === '-' || val === '---') return '---';
            const num = Number(val);
            return isNaN(num) ? '---' : num.toFixed(2);
        };
        const formatChange = (val) => {
            if (val === undefined || val === null || val === '-' || val === '---') return '---';
            const num = Number(val);
            if (isNaN(num)) return '---';
            return num > 0 ? `+${num.toFixed(2)}` : num.toFixed(2);
        };
        const formatPercent = (val) => {
            if (val === undefined || val === null || val === '-' || val === '---') return '---';
            const num = Number(val);
            if (isNaN(num)) return '---';
            return num > 0 ? `+${num.toFixed(2)}%` : `${num.toFixed(2)}%`;
        };
        const fmtVol = (val) => {
            if (val === undefined || val === null || val === '-' || val === '---') return '0';
            const num = Number(val);
            return isNaN(num) ? '0' : Math.round(num).toString();
        };

        // --- 技術指標核心運算 ---
        const Indicators = {
            ema: (data, period) => {
                if (!data || data.length === 0) return [];
                const k = 2 / (period + 1);
                let emaVal = data[0];
                return data.map(val => (emaVal = (val - emaVal) * k + emaVal));
            },
            calculateMACD: (closePrices) => {
                if (!closePrices || closePrices.length < 26) return { dif: [], dea: [], macd: [] };
                const ema12 = Indicators.ema(closePrices, 12);
                const ema26 = Indicators.ema(closePrices, 26);
                const dif = ema12.map((v, i) => v - ema26[i]);
                const dea = Indicators.ema(dif, 9);
                const macd = dif.map((v, i) => (v - dea[i]) * 2);
                return { dif, dea, macd };
            },
            calculateKDJ: (history) => {
                if (!history || history.length === 0) return { k: [], d: [], j: [] };
                const period = 9;
                const ks = [], ds = [], js = [];
                let k = 50, d = 50;
                for (let i = 0; i < history.length; i++) {
                    const start = Math.max(0, i - period + 1);
                    const slice = history.slice(start, i + 1);
                    const low = Math.min(...slice.map(d => d.low));
                    const high = Math.max(...slice.map(d => d.high));
                    const rsv = high === low ? 0 : ((history[i].close - low) / (high - low)) * 100;
                    k = (2 / 3) * k + (1 / 3) * rsv;
                    d = (2 / 3) * d + (1 / 3) * k;
                    js.push(3 * k - 2 * d);
                    ks.push(k);
                    ds.push(d);
                }
                return { k: ks, d: ds, j: js };
            }
        };

        const aggregateWeekly = (dailyData) => {
            const weekly = [];
            if (!dailyData || dailyData.length === 0) return weekly;
            const getWeek = (dateString) => {
                const d = new Date(dateString);
                d.setHours(0, 0, 0, 0);
                d.setDate(d.getDate() + 4 - (d.getDay() || 7));
                const yearStart = new Date(d.getFullYear(), 0, 1);
                const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
                return `${d.getFullYear()}-W${weekNo.toString().padStart(2, '0')}`;
            };
            let currentWeek = null;
            let weekCandle = null;
            dailyData.forEach(day => {
                const weekKey = getWeek(day.time);
                if (weekKey !== currentWeek) {
                    if (weekCandle) weekly.push(weekCandle);
                    currentWeek = weekKey;
                    weekCandle = { ...day };
                } else {
                    weekCandle.high = Math.max(weekCandle.high, day.high);
                    weekCandle.low = Math.min(weekCandle.low, day.low);
                    weekCandle.close = day.close;
                    weekCandle.volume += day.volume;
                }
            });
            if (weekCandle) weekly.push(weekCandle);
            return weekly;
        };

        const fetchWithTimeout = async (url, options = {}, timeoutMs = 8000) => {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch (e) {
                clearTimeout(id);
                throw new Error("Timeout");
            }
        };

        // --- 獨創：多線程競速代理引擎 (Promise.any 極速抓取) ---
        const fetchFastestProxy = async (url, timeoutMs = 6000) => {
            const cb = `_cb=${Date.now()}_${Math.floor(Math.random() * 100000)}`;
            const safeUrl = url.includes('?') ? `${url}&${cb}` : `${url}?${cb}`;
            const encodedUrl = encodeURIComponent(safeUrl);
            
            // 3 個節點同時競速，最快回傳的直接採用！
            const proxies = [
                `https://corsproxy.io/?${encodedUrl}`,
                `https://api.allorigins.win/raw?url=${encodedUrl}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodedUrl}`
            ];

            try {
                const result = await Promise.any(proxies.map(async (proxyUrl) => {
                    const res = await fetchWithTimeout(proxyUrl, { cache: 'no-store' }, timeoutMs);
                    if (!res.ok) throw new Error('Bad Proxy');
                    const text = await res.text();
                    return JSON.parse(text);
                }));
                return result;
            } catch (e) {
                console.warn("All proxies failed for URL:", url);
                return null;
            }
        };

        // --- 1. 極速即時報價引擎 (1分K解析) ---
        const fetchRealTimeAndFundamentals = async (target) => {
            for (let ext of ['.TW', '.TWO']) {
                const url = `https://query2.finance.yahoo.com/v7/finance/quote?symbols=${target}${ext}`;
                const data = await fetchFastestProxy(url, 5000);
                if (data && data.quoteResponse && data.quoteResponse.result) {
                    const result = data.quoteResponse.result[0];
                    if (!result || !result.regularMarketPrice) continue;

                    const currentPrice = result.regularMarketPrice;
                    const prevClose = result.regularMarketPreviousClose || currentPrice;
                    const change = currentPrice - prevClose;
                    const percent = prevClose !== 0 ? (change / prevClose) * 100 : 0;
                    
                    let marketCapStr = "---";
                    if (result.marketCap) {
                        marketCapStr = result.marketCap >= 1000000000000 
                            ? (result.marketCap / 1000000000000).toFixed(2) + " 兆" 
                            : (result.marketCap / 100000000).toFixed(2) + " 億";
                    }

                    return {
                        price: currentPrice,
                        change: change,
                        percent: percent,
                        open: result.regularMarketOpen || currentPrice,
                        high: result.regularMarketDayHigh || currentPrice,
                        low: result.regularMarketDayLow || currentPrice,
                        close: currentPrice,
                        volume: result.regularMarketVolume ? Math.round(result.regularMarketVolume / 1000) : 0,
                        marketCap: marketCapStr,
                        pe: result.trailingPE ? result.trailingPE.toFixed(2) : "---",
                        pb: result.priceToBook ? result.priceToBook.toFixed(2) : "---",
                        yield: result.trailingAnnualDividendYield ? (result.trailingAnnualDividendYield * 100).toFixed(2) + "%" : "---"
                    };
                }
            }
            return null;
        };

        // --- 2. 歷史圖表引擎 (Yahoo 極速版) ---
        const fetchHistoryData = async (target) => {
            for (let ext of ['.TW', '.TWO']) {
                const url = `https://query1.finance.yahoo.com/v8/finance/chart/${target}${ext}?interval=1d&range=1y`;
                const data = await fetchFastestProxy(url, 6000);
                if (data && data.chart && data.chart.result) {
                    const result = data.chart.result[0];
                    const timestamps = result.timestamp;
                    const quote = result.indicators?.quote?.[0];
                    if (!timestamps || !quote) continue;
                    
                    const history = [];
                    for (let i = 0; i < timestamps.length; i++) {
                        if (quote.close[i] === null || quote.open[i] === null) continue;
                        const d = new Date(timestamps[i] * 1000);
                        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                        history.push({
                            time: dateStr, 
                            open: Number(quote.open[i]), 
                            high: Number(quote.high[i]), 
                            low: Number(quote.low[i]), 
                            close: Number(quote.close[i]), 
                            volume: Number(quote.volume[i])
                        });
                    }
                    if (history.length > 0) return history;
                }
            }
            return [];
        };

        const getMockData = (symbol) => ({
            name: `${symbol}`, industry: "尚未分析",
            market: { taiex: "等待同步", sox: "等待同步", nasdaq: "等待同步" },
            peers: [],
            valuation: { rating: "---" },
            growth: { mom: "---", yoy: "---", grossMargin: "---" },
            risk: { level: "---", details: "請點擊右上角「設定」輸入 Groq 金鑰解鎖深度分析。左上角與圖表為絕對真實即時報價。" },
            fund: { status: "等待設定金鑰..." },
            chips: { foreign: "---", trust: "---", big: "---", retail: "---", status: "等待設定金鑰..." },
            moneyFlow: { inflow: "---", outflow: "---", net: "---", analysis: "無資料。" },
            tech: { ma: "---", support: "---", pressure: "---" },
            strategy: { score: 0, conclusion: "等待設定", short: "---", swing: "---", stop: "---" },
            news: []
        });

        const App = () => {
            const [stockId, setStockId] = useState('2330');
            const [currentName, setCurrentName] = useState('台積電');
            const [inputValue, setInputValue] = useState('');
            
            const [customKey, setCustomKey] = useState(() => (localStorage.getItem('groq_api_key') || '').trim());
            const [aiModel, setAiModel] = useState(() => (localStorage.getItem('groq_model_name') || defaultModel).trim());
            
            // 獨立狀態：確保資料結構永遠乾淨
            const [liveQuote, setLiveQuote] = useState({ price: null, change: null, percent: null, open: null, high: null, low: null, volume: null, marketCap: '---', pe: '---', pb: '---', yield: '---' });
            const [baseHistoryData, setBaseHistoryData] = useState([]); 
            const [liveTickData, setLiveTickData] = useState(null); // 用於圖表合成
            const [aiData, setAiData] = useState(null);
            
            const [watchlist, setWatchlist] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem('quant_watchlist')) || [
                        { id: '2330', name: '台積電' }, { id: '2317', name: '鴻海' }, { id: '2454', name: '聯發科' }, { id: '2603', name: '長榮' }
                    ];
                } catch {
                    return [{ id: '2330', name: '台積電' }];
                }
            });
            const [watchlistQuotes, setWatchlistQuotes] = useState({});
            const [isWatchlistExpanded, setIsWatchlistExpanded] = useState(true);
            
            const [isChartLoading, setIsChartLoading] = useState(false);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [error, setError] = useState(null);
            
            const [fullStockList, setFullStockList] = useState([]); 
            const [suggestions, setSuggestions] = useState([]); 
            const [showSuggestions, setShowSuggestions] = useState(false);
            
            const [hoverData, setHoverData] = useState(null); 
            const [timeframe, setTimeframe] = useState('1D'); 

            const [isFullScreen, setIsFullScreen] = useState(false);
            const [zenMode, setZenMode] = useState(false);
            const [showSettings, setShowSettings] = useState(false);

            const rootRef = useRef(null);
            const inputRef = useRef(null); 
            const chartRefs = useRef({});
            const seriesRefs = useRef({});
            const containerRefs = { kline: useRef(null), vol: useRef(null), macd: useRef(null), kdj: useRef(null) };
            
            const isChartInitialized = useRef(false);
            const isSyncing = useRef(false);
            const currentFetchId = useRef(0);

            const isWatched = watchlist.some(w => w.id === stockId);
            const toggleWatchlist = () => {
                setWatchlist(prev => {
                    let newWatchlist;
                    if (isWatched) newWatchlist = prev.filter(w => w.id !== stockId);
                    else newWatchlist = [...prev, { id: stockId, name: currentName || stockId }];
                    localStorage.setItem('quant_watchlist', JSON.stringify(newWatchlist));
                    return newWatchlist;
                });
            };

            // 自選清單背景安全刷新
            useEffect(() => {
                let isActive = true;
                const updateWatchlistQuotes = async () => {
                    if (watchlist.length === 0) return;
                    for (const item of watchlist) {
                        if (!isActive) break;
                        try {
                            const rtData = await fetchRealTimeAndFundamentals(item.id);
                            if (rtData) {
                                setWatchlistQuotes(prev => ({
                                    ...prev,
                                    [item.id]: { price: rtData.price, change: rtData.change, percent: rtData.percent }
                                }));
                            }
                        } catch(e){}
                        await new Promise(r => setTimeout(r, 200)); 
                    }
                };
                
                updateWatchlistQuotes();
                const interval = setInterval(updateWatchlistQuotes, 20000); 
                return () => { isActive = false; clearInterval(interval); };
            }, [watchlist]);

            useEffect(() => {
                const loadStockList = async () => {
                    try {
                        const cachedList = localStorage.getItem('quant_stock_list_cache');
                        if (cachedList) {
                            setFullStockList(JSON.parse(cachedList));
                            return;
                        }
                        const res = await fetchWithTimeout(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo`);
                        const json = await res.json();
                        if (json.msg === 'success') {
                            setFullStockList(json.data);
                            localStorage.setItem('quant_stock_list_cache', JSON.stringify(json.data));
                        }
                    } catch (e) { }
                };
                loadStockList();
            }, []);

            const onInputChange = (e) => {
                const val = e.target.value;
                setInputValue(val);
                if (val.trim() && fullStockList.length > 0) {
                    const filtered = fullStockList.filter(s => s.stock_id.includes(val) || s.stock_name.includes(val)).slice(0, 8); 
                    setSuggestions(filtered);
                    setShowSuggestions(true);
                } else {
                    setSuggestions([]);
                    setShowSuggestions(false);
                }
            };

            const selectSuggestion = (id) => {
                setInputValue(id);
                setShowSuggestions(false);
                executeJump(id);
            };

            const executeJump = useCallback((targetId) => {
                if (targetId === stockId) return;
                setShowSuggestions(false);
                setInputValue('');
                setStockId(targetId);
            }, [stockId]);

            const handleSearch = useCallback(() => {
                let input = inputValue.trim();
                if (!input) return;
                setShowSuggestions(false);

                if (/[\u4e00-\u9fa5]/.test(input) && fullStockList.length > 0) {
                    const matchedStock = fullStockList.find(i => i.stock_name === input) || fullStockList.find(i => i.stock_name.includes(input));
                    if (matchedStock) {
                        input = matchedStock.stock_id;
                        setInputValue(input); 
                    } else {
                        setError(`找不到標的：「${input}」`);
                        return;
                    }
                }
                executeJump(input.toUpperCase());
            }, [inputValue, fullStockList, executeJump]);

            const toggleFullScreen = useCallback(() => {
                if (!document.fullscreenElement) {
                    if (rootRef.current) rootRef.current.requestFullscreen().catch(() => {});
                } else {
                    document.exitFullscreen();
                }
            }, []);

            useEffect(() => {
                const fn = () => { setIsFullScreen(!!document.fullscreenElement); if(!!document.fullscreenElement) setZenMode(false); };
                document.addEventListener('fullscreenchange', fn);
                return () => document.removeEventListener('fullscreenchange', fn);
            }, []);

            // --- 圖表初始化 (完美自適應) ---
            const initCharts = useCallback(() => {
                if (!window.LightweightCharts || isChartInitialized.current || !containerRefs.kline.current) return;
                
                const width = containerRefs.kline.current.clientWidth;
                const baseOpts = {
                    width,
                    layout: { background: { color: 'transparent' }, textColor: '#9ca3af', fontSize: 11 },
                    grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } },
                    rightPriceScale: { borderColor: '#374151' }, crosshair: { mode: 0 },
                    handleScroll: true, handleScale: true
                };

                const kChart = window.LightweightCharts.createChart(containerRefs.kline.current, { ...baseOpts, timeScale: { borderColor: '#374151', fixRightEdge: true, rightOffset: 5 } });
                const kSeries = kChart.addCandlestickSeries({ upColor: '#ef4444', downColor: '#22c55e', borderVisible: false, wickUpColor: '#ef4444', wickDownColor: '#22c55e' });
                const ma5Series = kChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const ma20Series = kChart.addLineSeries({ color: '#60a5fa', lineWidth: 1.5, crosshairMarkerVisible: false });
                const ma60Series = kChart.addLineSeries({ color: '#4ade80', lineWidth: 1.5, crosshairMarkerVisible: false });
                
                const vChart = window.LightweightCharts.createChart(containerRefs.vol.current, { ...baseOpts, timeScale: { visible: false, fixRightEdge: true } });
                const vSeries = vChart.addHistogramSeries({ color: '#3b82f6', priceFormat: { type: 'volume' } });
                
                const mChart = window.LightweightCharts.createChart(containerRefs.macd.current, { ...baseOpts, timeScale: { visible: false, fixRightEdge: true } });
                const mDif = mChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const mDea = mChart.addLineSeries({ color: '#60a5fa', lineWidth: 1.5, crosshairMarkerVisible: false });
                const mHist = mChart.addHistogramSeries();
                
                const kjChart = window.LightweightCharts.createChart(containerRefs.kdj.current, { ...baseOpts, timeScale: { borderColor: '#374151', fixRightEdge: true } });
                const kjK = kjChart.addLineSeries({ color: '#f8fafc', lineWidth: 1.5, crosshairMarkerVisible: false });
                const kjD = kjChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const kjJ = kjChart.addLineSeries({ color: '#d946ef', lineWidth: 1.5, crosshairMarkerVisible: false });

                chartRefs.current = { kChart, vChart, mChart, kjChart };
                seriesRefs.current = { kSeries, ma5Series, ma20Series, ma60Series, vSeries, macdDifSeries: mDif, macdDeaSeries: mDea, macdHistSeries: mHist, kdjKSeries: kjK, kdjDSeries: kjD, kdjJSeries: kjJ };

                const resizeObserver = new ResizeObserver(entries => {
                    window.requestAnimationFrame(() => {
                        if (!isChartInitialized.current) return;
                        for (let entry of entries) {
                            const { width, height } = entry.contentRect;
                            if (width === 0 || height === 0) continue;
                            if (entry.target === containerRefs.kline.current && chartRefs.current.kChart) chartRefs.current.kChart.applyOptions({ width, height });
                            if (entry.target === containerRefs.vol.current && chartRefs.current.vChart) chartRefs.current.vChart.applyOptions({ width, height });
                            if (entry.target === containerRefs.macd.current && chartRefs.current.mChart) chartRefs.current.mChart.applyOptions({ width, height });
                            if (entry.target === containerRefs.kdj.current && chartRefs.current.kjChart) chartRefs.current.kjChart.applyOptions({ width, height });
                        }
                    });
                });

                resizeObserver.observe(containerRefs.kline.current);
                resizeObserver.observe(containerRefs.vol.current);
                resizeObserver.observe(containerRefs.macd.current);
                resizeObserver.observe(containerRefs.kdj.current);

                const instances = [kChart, vChart, mChart, kjChart];
                instances.forEach(c => {
                    c.timeScale().subscribeVisibleLogicalRangeChange(range => {
                        if (!range || isSyncing.current) return;
                        isSyncing.current = true;
                        instances.forEach(other => { if (other !== c) other.timeScale().setVisibleLogicalRange(range); });
                        isSyncing.current = false;
                    });
                    
                    c.subscribeCrosshairMove(param => {
                        if (param.time) {
                            // Find the specific data point from the series
                            // Since we don't have direct access to enriched array here without refs, we use state.
                        }
                    });
                });
                isChartInitialized.current = true;
            }, []);

            // --- 即時合成 K 棒邏輯 ---
            const chartDataToRender = useMemo(() => {
                if (!baseHistoryData || baseHistoryData.length === 0) return [];
                
                // 去重
                const sorted = [...baseHistoryData].sort((a, b) => new Date(a.time).getTime() - new Date(b.time).getTime());
                const uniqueHistory = [];
                const seen = new Set();
                for (let item of sorted) {
                    if (!seen.has(item.time)) {
                        seen.add(item.time);
                        uniqueHistory.push({...item});
                    }
                }

                if (liveTickData) {
                    const todayStr = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Taipei' }).format(new Date());
                    const lastCandle = uniqueHistory[uniqueHistory.length - 1];
                    const lOpen = Number(liveTickData.open);
                    const lHigh = Number(liveTickData.high);
                    const lLow = Number(liveTickData.low);
                    const lClose = Number(liveTickData.close);
                    const lVol = Number(liveTickData.volume);

                    if (lastCandle.time < todayStr) {
                        uniqueHistory.push({ time: todayStr, open: lOpen, high: lHigh, low: lLow, close: lClose, volume: lVol });
                    } else if (lastCandle.time === todayStr) {
                        lastCandle.open = lOpen;
                        lastCandle.high = Math.max(lastCandle.high, lHigh);
                        lastCandle.low = Math.min(lastCandle.low, lLow);
                        lastCandle.close = lClose;
                        lastCandle.volume = Math.max(lastCandle.volume, lVol);
                    }
                }
                
                if (timeframe === '1W') return aggregateWeekly(uniqueHistory);
                return uniqueHistory;
            }, [baseHistoryData, liveTickData, timeframe]);

            useEffect(() => {
                if (chartDataToRender.length > 0) {
                    if (!isChartInitialized.current) initCharts();
                    
                    const s = seriesRefs.current;
                    if (!s.kSeries) return;

                    const closePrices = chartDataToRender.map(d => d.close);
                    const ma5 = Indicators.ema(closePrices, 5);
                    const ma20 = Indicators.ema(closePrices, 20);
                    const ma60 = Indicators.ema(closePrices, 60);
                    const { dif, dea, macd } = Indicators.calculateMACD(closePrices);
                    const { k, d, j } = Indicators.calculateKDJ(chartDataToRender);
                    
                    const enriched = chartDataToRender.map((item, i) => ({
                        ...item, ma5: ma5[i], ma20: ma20[i], ma60: ma60[i], dif: dif[i], dea: dea[i], macd: macd[i], k: k[i], d: d[i], j: j[i]
                    }));
                    
                    // Crosshair tracking callback (Bind to the new enriched data)
                    const kChart = chartRefs.current.kChart;
                    if (kChart) {
                        kChart.subscribeCrosshairMove(param => {
                            if (param.time) {
                                const dataPoint = enriched.find(d => d.time === param.time);
                                if (dataPoint) setHoverData(dataPoint);
                            } else {
                                setHoverData(enriched[enriched.length - 1]);
                            }
                        });
                    }
                    
                    // Set default hover to latest
                    setHoverData(enriched[enriched.length - 1]);

                    try {
                        s.kSeries.setData(chartDataToRender);
                        s.ma5Series.setData(chartDataToRender.map((d, i) => ({ time: d.time, value: ma5[i] })));
                        s.ma20Series.setData(chartDataToRender.map((d, i) => ({ time: d.time, value: ma20[i] })));
                        s.ma60Series.setData(chartDataToRender.map((d, i) => ({ time: d.time, value: ma60[i] })));
                        s.vSeries.setData(chartDataToRender.map(data => ({ time: data.time, value: data.volume, color: data.close >= data.open ? 'rgba(239, 68, 68, 0.6)' : 'rgba(34, 197, 94, 0.6)' })));
                        s.macdDifSeries.setData(chartDataToRender.map((d, i) => ({ time: d.time, value: dif[i] || 0 })));
                        s.macdDeaSeries.setData(chartDataToRender.map((d, i) => ({ time: d.time, value: dea[i] || 0 })));
                        s.macdHistSeries.setData(chartDataToRender.map((d, i) => ({ time: d.time, value: macd[i] || 0, color: macd[i] >= 0 ? '#ef4444' : '#22c55e' })));
                        s.kdjKSeries.setData(chartDataToRender.map((v, i) => ({ time: v.time, value: k[i] || 50 })));
                        s.kdjDSeries.setData(chartDataToRender.map((v, i) => ({ time: v.time, value: d[i] || 50 })));
                        s.kdjJSeries.setData(chartDataToRender.map((v, i) => ({ time: v.time, value: j[i] || 50 })));
                    } catch(e) {}
                }
            }, [chartDataToRender, initCharts]);


            // ==========================================
            // 第一階段：極速加載即時報價與圖表 (互不阻塞)
            // ==========================================
            useEffect(() => {
                let isCurrent = true;
                const fetchId = ++currentFetchId.current;

                const loadFastData = async () => {
                    setIsChartLoading(true);
                    setError(null);
                    
                    // 重置狀態以防殘影
                    setLiveQuote({ price: null, change: null, percent: null, open: null, high: null, low: null, volume: null, marketCap: '---', pe: '---', pb: '---', yield: '---' });
                    setBaseHistoryData([]);
                    setLiveTickData(null);
                    setHoverData(null);
                    
                    const matched = fullStockList.find(s => s.stock_id === stockId);
                    setCurrentName(matched ? matched.stock_name : stockId);

                    // A. 發送即時報價抓取
                    fetchRealTimeAndFundamentals(stockId).then(live => {
                        if (!isCurrent || fetchId !== currentFetchId.current) return;
                        if (live) {
                            setLiveQuote({
                                price: live.price,
                                change: live.change,
                                percent: live.percent,
                                open: live.open,
                                high: live.high,
                                low: live.low,
                                volume: live.volume,
                                marketCap: live.marketCap,
                                pe: live.pe,
                                pb: live.pb,
                                yield: live.yield
                            });
                            setLiveTickData(live);
                        } else {
                            setLiveQuote(prev => ({ ...prev, price: '查無報價' }));
                        }
                    });

                    // B. 發送歷史資料抓取
                    fetchHistoryData(stockId).then(history => {
                        if (!isCurrent || fetchId !== currentFetchId.current) return;
                        if (history && history.length > 0) {
                            setBaseHistoryData(history);
                        }
                        setIsChartLoading(false); // 歷史圖表加載完畢即可解除遮罩
                    });
                };

                loadFastData();
                return () => { isCurrent = false; };
            }, [stockId, fullStockList]);


            // ==========================================
            // 第二階段：背景執行 Groq AI 分析
            // ==========================================
            useEffect(() => {
                let isCurrent = true;
                const fetchId = currentFetchId.current;
                
                const runAI = async () => {
                    setIsAiLoading(true);
                    setAiData(null); 
                    
                    if (!customKey) {
                        if (isCurrent && fetchId === currentFetchId.current) {
                            setAiData(getMockData(stockId));
                            setIsAiLoading(false);
                        }
                        return;
                    }

                    try {
                        const safeModel = aiModel ? aiModel.replace(/[^a-z0-9.-]/gi, '') : defaultModel;
                        const targetName = currentName || stockId;
                        
                        const prompt = `分析台股代號[${stockId}]，名稱[${targetName}]。
                        任務：提供大盤聯動、營收成長、風險預警、籌碼面、資金流向與最新動態。
                        【最高強制指令】：
                        1. 絕對禁止使用任何表情符號或特殊圖形。
                        2. 若缺乏精確數據，請運用金融知識給出合理的「市場預估值」或「趨勢描述 (如: 偏強、衰退)」，絕對不允許填入 "---" 或留白。
                        3. 推薦實體商品時，務必清楚寫出具體的「品牌」與「型號」。
                        4. 必須且只能回傳 JSON 格式。請確認輸出是完全合法的 JSON。
                        JSON結構：{"industry":"產業","market":{"taiex":"大盤預估","sox":"費半預估","nasdaq":"那指預估"},"peers":[{"name":"同業","change":"漲跌預估"}],"valuation":{"rating":"評價(買進/中立/賣出)"},"growth":{"mom":"月營收趨勢","yoy":"年營收趨勢","grossMargin":"預估毛利率"},"risk":{"level":"高/中/低","details":"風險與事件說明"},"fund":{"status":"基本面點評"},"chips":{"foreign":"外資動向","trust":"投信動向","big":"主力動向","retail":"散戶動向","status":"籌碼點評"},"moneyFlow":{"inflow":"流入預估","outflow":"流出預估","net":"淨流入流出","analysis":"資金面點評"},"tech":{"ma":"均線狀態","support":"預估支撐","pressure":"預估壓力"},"strategy":{"score":85,"conclusion":"判定","short":"短線操作","swing":"波段策略","stop":"建議停損"},"news":[{"date":"日期","title":"標題","snippet":"詳細摘要(必填)","impact":"多空"}]}`;

                        const rawApiUrl = `https://api.groq.com/openai/v1/chat/completions`;
                        
                        let aiRes;
                        try {
                            aiRes = await fetchWithTimeout(rawApiUrl, {
                                method: 'POST', 
                                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${customKey}` },
                                body: JSON.stringify({ 
                                    model: safeModel, 
                                    temperature: 0.2,
                                    response_format: { type: "json_object" },
                                    messages: [
                                        { role: "system", content: prompt },
                                        { role: "user", content: `提供台股 [${stockId}] 分析數據，輸出純 JSON。` }
                                    ]
                                })
                            }, 45000);
                        } catch(e) {
                            // CORS Fallback for Groq
                            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(rawApiUrl)}`;
                            aiRes = await fetchWithTimeout(proxyUrl, {
                                method: 'POST', 
                                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${customKey}` },
                                body: JSON.stringify({ 
                                    model: safeModel, 
                                    temperature: 0.2,
                                    response_format: { type: "json_object" },
                                    messages: [
                                        { role: "system", content: prompt },
                                        { role: "user", content: `提供台股 [${stockId}] 分析數據，輸出純 JSON。` }
                                    ]
                                })
                            }, 45000);
                        }

                        if (!isCurrent || fetchId !== currentFetchId.current) return;
                        if (!aiRes.ok) throw new Error(`API 連線失敗 (${aiRes.status})`);
                        
                        const aiJson = await aiRes.json();
                        let rawText = aiJson.choices?.[0]?.message?.content;
                        if (!rawText) throw new Error("AI 模型未能產出內容");
                        
                        rawText = rawText.replace(/```json/gi, '').replace(/```/gi, '').trim();
                        const rawP = JSON.parse(rawText.match(/\{[\s\S]*\}/)[0]);
                        
                        const safeAiData = {
                            name: targetName,
                            industry: String(rawP.industry || "未分類"),
                            market: { taiex: String(rawP.market?.taiex || "穩定"), sox: String(rawP.market?.sox || "穩定"), nasdaq: String(rawP.market?.nasdaq || "穩定") },
                            peers: Array.isArray(rawP.peers) ? rawP.peers : [],
                            valuation: { rating: String(rawP.valuation?.rating || "中立") },
                            growth: { mom: String(rawP.growth?.mom || "持平"), yoy: String(rawP.growth?.yoy || "持平"), grossMargin: String(rawP.growth?.grossMargin || "持平") },
                            risk: { level: String(rawP.risk?.level || "中"), details: String(rawP.risk?.details || "目前無重大風險事件") },
                            fund: { status: String(rawP.fund?.status || "基本面穩定") },
                            chips: { foreign: String(rawP.chips?.foreign || "觀望"), trust: String(rawP.chips?.trust || "觀望"), big: String(rawP.chips?.big || "觀望"), retail: String(rawP.chips?.retail || "觀望"), status: String(rawP.chips?.status || "籌碼穩定") },
                            moneyFlow: { inflow: String(rawP.moneyFlow?.inflow || "估算中"), outflow: String(rawP.moneyFlow?.outflow || "估算中"), net: String(rawP.moneyFlow?.net || "持平"), analysis: String(rawP.moneyFlow?.analysis || "資金動能平穩") },
                            tech: { ma: String(rawP.tech?.ma || "糾結"), support: String(rawP.tech?.support || "分析中"), pressure: String(rawP.tech?.pressure || "分析中") },
                            strategy: { score: Number(rawP.strategy?.score) || 50, conclusion: String(rawP.strategy?.conclusion || "觀望"), short: String(rawP.strategy?.short || "觀望"), swing: String(rawP.strategy?.swing || "觀望"), stop: String(rawP.strategy?.stop || "分析中") },
                            news: Array.isArray(rawP.news) ? rawP.news : []
                        };

                        if (isCurrent && fetchId === currentFetchId.current) {
                            setAiData(safeAiData);
                        }

                    } catch (e) { 
                        if (isCurrent && fetchId === currentFetchId.current) {
                            const fallback = getMockData(stockId);
                            fallback.risk.details = `AI 分析異常：${e.message}。圖表與左上角顯示為真實即時報價。`;
                            setAiData(fallback);
                        }
                    } finally { 
                        if (isCurrent && fetchId === currentFetchId.current) setIsAiLoading(false);
                    }
                };

                runAI();
                return () => { isCurrent = false; };
            }, [stockId, currentName, customKey, aiModel]);

            const saveSettings = () => { 
                const cleanKey = customKey.replace(/[\s\u200B-\u200D\uFEFF]/g, '');
                const cleanModel = aiModel.replace(/[^a-z0-9.-]/gi, '') || defaultModel;
                localStorage.setItem('groq_api_key', cleanKey); 
                localStorage.setItem('groq_model_name', cleanModel);
                setCustomKey(cleanKey);
                setAiModel(cleanModel);
                setShowSettings(false); 
                
                const temp = stockId;
                setStockId("");
                setTimeout(() => setStockId(temp), 10);
            };

            const isUp = liveQuote.change && !String(liveQuote.change).includes('-');
            const priceColor = liveQuote.price === null || String(liveQuote.price) === '讀取中' || String(liveQuote.price) === '查無報價' ? 'text-white' : isUp ? 'text-red-500' : 'text-green-500';
            const zenClass = zenMode ? "fixed inset-0 z-[9999] bg-[#030303] p-1 lg:p-3" : "";
            const disableInput = isChartLoading; 
            
            const displayVal = (val) => isAiLoading ? "運算中..." : (val || "---");

            return (
                <div ref={rootRef} className={`min-h-screen bg-[#030303] text-gray-200 font-sans p-1 lg:p-2 overflow-hidden flex flex-col ${zenClass}`}>
                    <div className="flex-1 flex flex-col overflow-hidden w-full h-full">
                        
                        {/* 頂部標頭列 */}
                        <header className="flex-none flex flex-col md:flex-row justify-between items-center mb-1 lg:mb-2 bg-[#0a0a0a] p-2 lg:p-3 border border-gray-800 rounded shadow-xl">
                            <div className="flex flex-col lg:flex-row lg:items-center gap-3 w-full lg:w-auto">
                                <div className="flex items-center gap-3">
                                    <div className="flex flex-col">
                                        <h1 className="text-lg lg:text-xl font-bold text-white tracking-tighter">{currentName}</h1>
                                        <span className="text-blue-500 font-mono text-xs uppercase tracking-widest">{stockId}</span>
                                    </div>
                                    <div className="h-6 w-px bg-gray-700 mx-1"></div>
                                    <div className="flex items-baseline gap-2">
                                        <span className={`text-3xl lg:text-4xl font-black font-mono tracking-tighter ${priceColor}`}>{liveQuote.price || '讀取中'}</span>
                                        <div className="flex flex-col text-xs font-bold font-mono">
                                            <span className={priceColor}>{liveQuote.change || '---'}</span>
                                            <span className={priceColor}>{liveQuote.percent || '---'}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="flex items-center gap-2 mt-2 md:mt-0 w-full lg:w-auto justify-end relative">
                                {isAiLoading && !isChartLoading ? <div className="w-4 h-4 border-2 border-purple-500 border-t-transparent rounded-full animate-spin mr-2" title="AI 分析生成中"></div> : null}
                                
                                <button onClick={toggleWatchlist} className={`px-2 py-1.5 lg:px-3 lg:py-2 text-[10px] lg:text-xs font-bold rounded transition-colors border ${isWatched ? 'bg-yellow-900/40 border-yellow-700 text-yellow-300' : 'bg-gray-800 border-gray-600 text-gray-400 hover:bg-gray-700 hover:text-white'}`}>
                                    {isWatched ? '取消追蹤' : '加入追蹤'}
                                </button>

                                <div className="relative" ref={inputRef}>
                                    <input 
                                        type="text" 
                                        value={inputValue} 
                                        onChange={onInputChange} 
                                        onKeyDown={e => { if (e.key === 'Enter') handleSearch(); }} 
                                        onBlur={() => setTimeout(() => setShowSuggestions(false), 200)}
                                        onFocus={() => { if(suggestions.length > 0) setShowSuggestions(true); }}
                                        placeholder="輸入代號" 
                                        disabled={disableInput}
                                        className="w-24 lg:w-32 bg-[#111] border border-gray-700 px-2 py-1.5 lg:py-2 text-[10px] lg:text-xs font-bold rounded text-white focus:border-blue-500 outline-none transition-all disabled:opacity-50 shadow-inner" 
                                    />
                                    {showSuggestions && suggestions.length > 0 && (
                                        <div className="absolute top-full left-0 mt-1 w-full bg-gray-900 border border-gray-700 rounded shadow-2xl z-[999] overflow-hidden">
                                            {suggestions.map(s => (
                                                <div key={s.stock_id} onMouseDown={() => selectSuggestion(s.stock_id)} className="p-2 px-3 hover:bg-blue-600/50 cursor-pointer flex justify-between items-center border-b border-gray-800 last:border-b-0 transition-colors">
                                                    <span className="text-white font-bold text-[10px] lg:text-xs">{s.stock_name}</span>
                                                    <span className="text-blue-400 font-mono text-[9px]">{s.stock_id}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <button onClick={() => handleSearch()} disabled={disableInput} className="bg-blue-900/60 border border-blue-700 px-3 py-1.5 lg:py-2 text-[10px] lg:text-xs font-bold rounded hover:bg-blue-800 transition-all uppercase disabled:opacity-50 hidden sm:block">查詢</button>
                                <button onClick={() => setShowSettings(!showSettings)} className="bg-gray-800 border border-gray-600 px-3 py-1.5 lg:py-2 text-[10px] lg:text-xs font-bold rounded hover:bg-gray-700 transition-all uppercase hidden sm:block">設定</button>
                                <button onClick={toggleFullScreen} className={`border px-3 py-1.5 lg:py-2 text-[10px] lg:text-xs font-black rounded transition-all uppercase hidden lg:block ${zenMode || isFullScreen ? 'bg-red-900/40 border-red-700 text-red-200 hover:bg-red-800/60' : 'bg-transparent border-gray-600 text-gray-300 hover:bg-white/10'}`}>
                                    {isFullScreen || zenMode ? '結束全螢幕' : '全螢幕'}
                                </button>
                            </div>
                        </header>

                        {showSettings && (
                            <div className="absolute top-16 right-4 z-[100] w-[320px] p-5 glass-panel border border-gray-700 rounded shadow-2xl animate-fade-in">
                                <h3 className="text-sm font-bold mb-4 border-b border-gray-800 pb-2 text-blue-400 uppercase tracking-widest">系統配置</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] block text-gray-400 mb-1 font-bold tracking-widest font-mono">Groq API Key</label>
                                        <input type="password" value={customKey} onChange={e => setCustomKey(e.target.value)} className="w-full bg-black border border-gray-700 p-2 text-xs rounded focus:border-blue-500 outline-none font-mono" placeholder="請貼入 Groq 金鑰 (gsk_ 開頭)" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] block text-gray-400 mb-1 font-bold tracking-widest font-mono">AI 運算模型配置</label>
                                        <select value={aiModel} onChange={e => setAiModel(e.target.value)} className="w-full bg-black border border-gray-700 p-2 text-xs rounded focus:border-blue-500 outline-none font-mono text-gray-200">
                                            <option value="llama-3.3-70b-versatile">Llama 3.3 70B (推薦/邏輯最強)</option>
                                            <option value="llama-3.1-8b-instant">Llama 3.1 8B (極速/日常看盤)</option>
                                        </select>
                                    </div>
                                    <div className="border-t border-gray-800 pt-5 mt-2">
                                        <button onClick={(e) => {
                                            Object.keys(localStorage).forEach(k => { if(k.startsWith('groq_cache_')) localStorage.removeItem(k); });
                                            e.target.innerText = "已清除快取！(下回查詢強制連線)";
                                            setTimeout(() => { e.target.innerText = "清除本機深度分析快取"; }, 2000);
                                        }} className="w-full bg-red-900/30 border border-red-800/50 text-red-300 py-2.5 text-xs font-bold rounded-lg hover:bg-red-800/50 transition-colors">清除本機深度分析快取</button>
                                    </div>
                                    <div className="flex gap-3 pt-2">
                                        <button onClick={saveSettings} className="flex-1 bg-blue-600 py-2 text-xs font-black rounded uppercase hover:bg-blue-500 transition-colors">儲存重連</button>
                                        <button onClick={() => setShowSettings(false)} className="px-4 bg-gray-800 text-xs font-bold rounded uppercase hover:bg-gray-700">關閉</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {error && (
                            <div className="flex-none bg-red-900/30 border border-red-500/30 text-red-300 p-1.5 text-center text-[10px] font-bold mb-1 rounded flex items-center justify-center animate-pulse">
                                <span>{error}</span>
                            </div>
                        )}

                        <main className={`flex-1 grid grid-cols-1 lg:grid-cols-12 gap-1 lg:gap-2 overflow-hidden ${(isFullScreen || zenMode) ? 'h-full' : ''}`}>
                            
                            <div className="col-span-12 lg:col-span-3 flex flex-col gap-1 overflow-y-auto custom-scrollbar pr-0.5 pb-1">
                                
                                <div className="panel-card flex-none transition-all duration-500 overflow-hidden border border-gray-800">
                                    <div className="bg-[#0a0a0a] border-b border-gray-800 p-2 px-3 flex justify-between items-center cursor-pointer hover:bg-gray-900 transition-colors" onClick={() => setIsWatchlistExpanded(!isWatchlistExpanded)}>
                                        <span className="text-yellow-500 font-bold text-[10px] tracking-widest uppercase">自選追蹤清單</span>
                                        <span className="text-gray-500 transform transition-transform duration-300 select-none text-[8px]" style={{ transform: isWatchlistExpanded ? 'rotate(180deg)' : 'rotate(0deg)' }}>▼</span>
                                    </div>
                                    <div className={`transition-all duration-500 ease-in-out bg-[#050505] ${isWatchlistExpanded ? 'max-h-[250px] opacity-100' : 'max-h-0 opacity-0'}`}>
                                        <div className="p-1.5 flex flex-col gap-0.5 overflow-y-auto custom-scrollbar" style={{ maxHeight: '200px' }}>
                                            {watchlist.length > 0 ? watchlist.map((item) => {
                                                const quote = watchlistQuotes[item.id];
                                                const isWUp = quote && parseFloat(quote.change) >= 0;
                                                const colorClass = !quote ? 'text-gray-500' : isWUp ? 'text-red-500' : 'text-green-500';
                                                return (
                                                    <div key={item.id} onClick={() => executeJump(item.id)} className={`flex justify-between items-center p-1.5 rounded cursor-pointer transition-all duration-200 border ${stockId === item.id ? 'bg-gray-800/60 border-gray-600 shadow-inner' : 'bg-transparent border-transparent hover:bg-gray-900/50'}`}>
                                                        <div className="flex flex-col">
                                                            <span className="text-white font-bold text-[10px]">{item.name}</span>
                                                            <span className="text-gray-600 font-mono text-[8px]">{item.id}</span>
                                                        </div>
                                                        <div className="flex flex-col items-end">
                                                            <span className={`font-mono font-bold text-[10px] ${colorClass}`}>{quote ? fmtPrice(quote.price) : '---'}</span>
                                                            <span className={`font-mono text-[8px] ${colorClass}`}>{quote ? formatPercent(quote.percent) : '---'}</span>
                                                        </div>
                                                    </div>
                                                );
                                            }) : <span className="text-gray-600 text-[10px] p-2 text-center block">尚無追蹤標的</span>}
                                        </div>
                                    </div>
                                </div>

                                {!customKey && (
                                    <div className="panel-card p-3 text-center flex-none border-blue-900/30 bg-blue-950/10 animate-fade-in">
                                        <p className="text-[10px] text-blue-300 font-bold mb-2 tracking-widest">設定金鑰啟用 AI 分析</p>
                                        <button onClick={() => setShowSettings(true)} className="bg-blue-700 text-white text-[10px] px-4 py-1.5 rounded font-black hover:bg-blue-600 transition-all">立即設定</button>
                                    </div>
                                )}
                                
                                <div className="panel-card flex-none border border-gray-800 bg-[#050505]">
                                    <div className="bg-blue-950/20 border-b border-gray-800 p-2 px-3"><span className="text-blue-400 font-bold text-[10px] tracking-widest uppercase">市場聯動分析</span></div>
                                    <div className="p-3 space-y-2 text-[10px]">
                                        <div className="flex justify-between border-b border-gray-800 border-dotted pb-1"><span className="text-gray-500">台股大盤</span><span className="text-white font-bold">{displayVal(aiData?.market?.taiex)}</span></div>
                                        <div className="flex justify-between border-b border-gray-800 border-dotted pb-1"><span className="text-gray-500">費半指數</span><span className="text-white font-bold">{displayVal(aiData?.market?.sox)}</span></div>
                                        <div className="flex justify-between pb-0.5"><span className="text-gray-500">那斯達克</span><span className="text-white font-bold">{displayVal(aiData?.market?.nasdaq)}</span></div>
                                    </div>
                                </div>
                                
                                <div className="panel-card flex-none border border-gray-800 bg-[#050505]">
                                    <div className="bg-purple-950/20 border-b border-gray-800 p-2 px-3"><span className="text-purple-400 font-bold text-[10px] tracking-widest uppercase">同業競爭比較</span></div>
                                    <div className="p-3 space-y-1.5 text-[10px]">
                                        {isAiLoading ? <div className="text-gray-500 text-center py-1">運算中...</div> : 
                                         aiData?.peers && aiData.peers.length > 0 ? (
                                            aiData.peers.map((p, i) => (
                                                <div key={i} className="flex justify-between bg-gray-900/40 p-2 border border-gray-800 rounded">
                                                    <span className="text-gray-300 font-bold">{p.name}</span>
                                                    <span className={p.change && String(p.change).includes('-') ? 'text-green-500' : 'text-red-500'}>{p.change}</span>
                                                </div>
                                            ))
                                        ) : (
                                            <div className="text-gray-600 text-center py-1">---</div>
                                        )}
                                    </div>
                                </div>
                                
                                <div className="panel-card flex-1 min-h-[120px] border border-gray-800 bg-[#050505]">
                                    <div className="bg-slate-900/40 border-b border-gray-800 p-2 px-3"><span className="text-gray-300 font-bold text-[10px] tracking-widest uppercase">基本面與估值</span></div>
                                    <div className="p-3 space-y-2 text-[10px]">
                                        <div className="flex justify-between border-b border-gray-800 border-dotted pb-1"><span className="text-gray-500">總市值估算</span><span className="text-white font-bold font-mono">{liveQuote.marketCap}</span></div>
                                        <div className="flex justify-between border-b border-gray-800 border-dotted pb-1"><span className="text-gray-500">殖利率/股淨比</span><span className="text-white font-bold font-mono">{liveQuote.yield} / {liveQuote.pb}</span></div>
                                        <div className="flex justify-between border-b border-gray-800 border-dotted pb-1"><span className="text-gray-500">預估本益比 (PE)</span><span className="text-yellow-400 font-bold font-mono">{liveQuote.pe}</span></div>
                                        <div className="flex justify-between pb-0.5"><span className="text-gray-500">AI 評價評等</span><span className="text-white font-black">{displayVal(aiData?.valuation?.rating)}</span></div>
                                    </div>
                                </div>
                            </div>

                            {/* 中間圖表區塊 */}
                            <div className="col-span-12 lg:col-span-6 flex flex-col overflow-hidden pb-1 min-h-[500px] lg:min-h-0">
                                <div className="panel-card flex-1 flex flex-col overflow-hidden shadow-2xl relative border border-gray-800 bg-[#050505]">
                                    
                                    <div className="bg-green-950/20 border-b border-gray-800 p-2 px-3 flex justify-between items-center z-10 flex-none">
                                        <div className="flex items-center gap-3">
                                            <span className="text-green-400 font-bold text-[10px] tracking-widest uppercase">技術線圖</span>
                                            <div className="hidden sm:flex items-center gap-2 text-[9px] font-mono text-gray-400 bg-black/40 px-2 py-1 rounded border border-gray-800">
                                                <span>開: <strong className="text-white">{fmtPrice(hoverData?.open || liveQuote.open)}</strong></span>
                                                <span>高: <strong className="text-red-400">{fmtPrice(hoverData?.high || liveQuote.high)}</strong></span>
                                                <span>低: <strong className="text-green-400">{fmtPrice(hoverData?.low || liveQuote.low)}</strong></span>
                                                <span>量: <strong className="text-yellow-400">{fmtVol(hoverData?.volume || liveQuote.volume)}</strong> 張</span>
                                            </div>
                                        </div>
                                        <div className="flex border border-gray-700 rounded overflow-hidden bg-black/40">
                                            <button onClick={() => setTimeframe('1D')} disabled={isChartLoading} className={`px-3 py-0.5 text-[10px] font-black transition-all ${timeframe === '1D' ? 'bg-gray-600 text-white' : 'bg-transparent text-gray-400 hover:text-white'}`}>日線</button>
                                            <button onClick={() => setTimeframe('1W')} disabled={isChartLoading} className={`px-3 py-0.5 text-[10px] font-black transition-all ${timeframe === '1W' ? 'bg-gray-600 text-white' : 'bg-transparent text-gray-400 hover:text-white'}`}>週線</button>
                                        </div>
                                    </div>

                                    {isChartLoading && (
                                        <div className="absolute inset-0 z-50 flex flex-col justify-center items-center bg-black/70 backdrop-blur-sm mt-10 rounded-b">
                                            <div className="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                                        </div>
                                    )}

                                    <div className="flex-1 bg-[#020202] flex flex-col overflow-hidden min-h-0">
                                        
                                        <div className="relative w-full flex-[4] min-h-0 flex flex-col overflow-hidden">
                                            <div className="absolute top-1 left-2 z-10 flex flex-wrap gap-1 text-[9px] font-mono pointer-events-none">
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-gray-400 border border-gray-800">K線</div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-white border border-white/5">
                                                    <span className="text-gray-400 mr-2">{hoverData?.time || '最新'}</span>
                                                    開:{fmtPrice(hoverData?.open || liveQuote.open)} 高:{fmtPrice(hoverData?.high || liveQuote.high)} 低:{fmtPrice(hoverData?.low || liveQuote.low)} 收:{fmtPrice(hoverData?.close || liveQuote.price)}
                                                </div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-yellow-500 border border-gray-800">MA5:{fmtPrice(hoverData?.ma5)}</div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-blue-400 border border-gray-800">MA20:{fmtPrice(hoverData?.ma20)}</div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-green-400 border border-gray-800">MA60:{fmtPrice(hoverData?.ma60)}</div>
                                            </div>
                                            <div ref={containerRefs.kline} className="w-full h-full" />
                                        </div>
                                        
                                        <div className="relative w-full flex-[1.2] min-h-0 flex flex-col border-t border-gray-900 overflow-hidden">
                                            <div className="absolute top-0.5 left-2 z-10 flex gap-1 text-[9px] font-mono pointer-events-none">
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-gray-300 font-bold border border-white/5">成交量</div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-blue-300 font-bold border border-white/5">
                                                    Vol: {fmtVol(hoverData?.volume || liveQuote.volume)}
                                                </div>
                                            </div>
                                            <div ref={containerRefs.vol} className="w-full h-full" />
                                        </div>
                                        
                                        <div className="relative w-full flex-[1.2] min-h-0 flex flex-col border-t border-gray-900 overflow-hidden">
                                            <div className="absolute top-0.5 left-2 z-10 flex gap-1 text-[9px] font-mono pointer-events-none">
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-gray-300 font-bold border border-white/5">MACD (12,26,9)</div>
                                                <div className={`bg-black/80 px-1.5 py-0.5 rounded border border-white/5 ${hoverData?.macd >= 0 ? "text-red-500" : "text-green-500"}`}>MACD:{fmtPrice(hoverData?.macd)}</div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-yellow-500 border border-white/5">DIF:{fmtPrice(hoverData?.dif)}</div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-blue-400 border border-white/5">DEA:{fmtPrice(hoverData?.dea)}</div>
                                            </div>
                                            <div ref={containerRefs.macd} className="w-full h-full" />
                                        </div>
                                        
                                        <div className="relative w-full flex-[1.2] min-h-0 flex flex-col border-t border-gray-900 overflow-hidden">
                                            <div className="absolute top-0.5 left-2 z-10 flex gap-1 text-[9px] font-mono pointer-events-none">
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-gray-300 font-bold border border-white/5">KDJ (9,3,3)</div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-white border border-white/5">K:{fmtPrice(hoverData?.k)}</div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-yellow-500 border border-white/5">D:{fmtPrice(hoverData?.d)}</div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-pink-500 border border-white/5">J:{fmtPrice(hoverData?.j)}</div>
                                            </div>
                                            <div ref={containerRefs.kdj} className="w-full h-full" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="col-span-12 lg:col-span-3 flex flex-col gap-2 overflow-y-auto custom-scrollbar pl-0.5 pb-1">
                                <div className="panel-card flex-none border border-gray-800 bg-[#050505]">
                                    <div className="bg-cyan-950/20 border-b border-gray-800 p-2 px-3"><span className="text-cyan-400 font-bold text-[10px] tracking-widest uppercase">營收與獲利動能</span></div>
                                    <div className="p-3 space-y-2 text-[10px]">
                                        <div className="flex justify-between border-b border-gray-800 border-dotted pb-1"><span className="text-gray-500">月營收 (MoM)</span><span className="text-white font-bold">{displayVal(aiData?.growth?.mom)}</span></div>
                                        <div className="flex justify-between border-b border-gray-800 border-dotted pb-1"><span className="text-gray-500">年營收 (YoY)</span><span className="text-white font-bold">{displayVal(aiData?.growth?.yoy)}</span></div>
                                        <div className="flex justify-between border-b border-gray-800 border-dotted pb-1"><span className="text-gray-500">預估毛利率</span><span className="text-white font-bold">{displayVal(aiData?.growth?.grossMargin)}</span></div>
                                        <div className="mt-2 text-gray-400 bg-gray-900/40 p-2 border border-gray-800 rounded leading-relaxed text-justify">{aiData?.fund?.status || "等待 AI 分析中..."}</div>
                                    </div>
                                </div>

                                <div className="panel-card flex-none border border-gray-800 bg-[#050505]">
                                    <div className="bg-indigo-950/20 border-b border-gray-800 p-2 px-3"><span className="text-indigo-400 font-bold text-[10px] tracking-widest uppercase">籌碼與資金</span></div>
                                    <div className="p-3 space-y-2 text-[10px]">
                                        <div className="flex justify-between border-b border-gray-800 border-dotted pb-1"><span className="text-gray-500">外資動態</span><span className="text-white font-bold">{displayVal(aiData?.chips?.foreign)}</span></div>
                                        <div className="flex justify-between border-b border-gray-800 border-dotted pb-1"><span className="text-gray-500">投信動態</span><span className="text-blue-400 font-bold">{displayVal(aiData?.chips?.trust)}</span></div>
                                        <div className="flex justify-between border-b border-gray-800 border-dotted pb-1"><span className="text-gray-500">買盤流入</span><span className="text-red-400 font-bold">{displayVal(aiData?.moneyFlow?.inflow)}</span></div>
                                        <div className="flex justify-between pb-0.5"><span className="text-gray-500">淨流入出</span><span className="text-white font-bold">{displayVal(aiData?.moneyFlow?.net)}</span></div>
                                    </div>
                                </div>

                                <div className="panel-card flex-none border border-gray-800 bg-[#050505]">
                                    <div className="bg-orange-950/20 border-b border-gray-800 p-2 px-3 flex justify-between items-center"><span className="text-orange-400 font-bold text-[10px] tracking-widest uppercase">AI 戰略矩陣</span><span className="text-sm font-black text-white">{isAiLoading ? '--' : aiData?.strategy?.score || 0} 分</span></div>
                                    <div className="p-3 space-y-2 text-[10px]">
                                        <div className="bg-gray-900/50 p-2 rounded border border-gray-800"><span className="text-white font-bold block mb-1">{displayVal(aiData?.strategy?.conclusion)}</span><span className="text-gray-400 block text-[9px]">短線：{displayVal(aiData?.strategy?.short)}</span></div>
                                        <div className="flex justify-between p-2 bg-red-950/20 border border-red-900/40 rounded"><span className="text-red-400 font-bold">建議停損</span><span className="text-white font-bold font-mono">{displayVal(aiData?.strategy?.stop)}</span></div>
                                    </div>
                                </div>

                                <div className="panel-card flex-1 min-h-[150px] flex flex-col border border-gray-800 bg-[#050505]">
                                    <div className="bg-yellow-950/20 border-b border-gray-800 p-2 px-3">
                                        <span className="text-yellow-400 font-bold text-[10px] tracking-widest uppercase">即時情報與觀點</span>
                                    </div>
                                    <div className="p-1.5 space-y-1 flex-1 overflow-y-auto custom-scrollbar">
                                        {isAiLoading ? <div className="text-center text-gray-600 text-[10px] py-4">資料解析中...</div> : 
                                         aiData?.news && aiData.news.length > 0 ? (
                                            aiData.news.map((n, i) => (
                                                <a 
                                                    key={i} 
                                                    href={`https://www.google.com/search?q=${encodeURIComponent(stockId + ' ' + String(n.title))}&tbm=nws`} 
                                                    target="_blank" 
                                                    rel="noreferrer" 
                                                    className="block border-b border-gray-800/50 p-2 hover:bg-gray-800/40 transition-colors group"
                                                >
                                                    <div className="flex justify-between text-[8px] mb-1 text-gray-500">
                                                        <span>{n.date}</span>
                                                        <span className={n.impact === '多' ? 'text-red-500 font-bold' : n.impact === '空' ? 'text-green-500 font-bold' : 'text-gray-400'}>{n.impact}</span>
                                                    </div>
                                                    <div className="text-gray-200 font-bold text-[10px] leading-tight group-hover:text-blue-400 transition-colors">
                                                        {n.title}
                                                    </div>
                                                    
                                                    <div className="max-h-0 overflow-hidden group-hover:max-h-[100px] opacity-0 group-hover:opacity-100 transition-all duration-300 ease-in-out">
                                                        <div className="mt-1.5 text-[9px] text-gray-500 leading-relaxed border-l border-gray-700 pl-1.5">{n.snippet && n.snippet !== "-" ? n.snippet : "點擊跳轉閱讀完整新聞..."}</div>
                                                    </div>
                                                </a>
                                            ))
                                        ) : (
                                            <div className="text-center text-gray-600 text-[10px] py-4">---</div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
