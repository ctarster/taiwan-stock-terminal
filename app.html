<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化決策終端 PRO</title>
    <!-- 引入外部核心資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #030303; margin: 0; padding: 0; color: #d1d5db; overflow: hidden; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        #root { height: 100%; width: 100%; }
        
        /* 訂製流暢滾動條 */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; border: 1px solid #030303; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }
        * { scrollbar-width: thin; scrollbar-color: #333 transparent; }
        :-webkit-full-screen { background-color: #030303; }
        
        /* 進階動畫定義 */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes glowPulse { 0%, 100% { box-shadow: 0 0 10px rgba(37, 99, 235, 0.1); border-color: rgba(37, 99, 235, 0.2); } 50% { box-shadow: 0 0 25px rgba(37, 99, 235, 0.3); border-color: rgba(37, 99, 235, 0.5); } }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .animate-fade-up { opacity: 0; animation: fadeInUp 0.4s ease-out forwards; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .delay-50 { animation-delay: 50ms; }
        .delay-100 { animation-delay: 100ms; }
        .delay-150 { animation-delay: 150ms; }
        .delay-200 { animation-delay: 200ms; }
        .header-glow { animation: glowPulse 3s infinite ease-in-out; }
        
        .loading-shimmer { background: linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.02) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear; }
        .glass-panel { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .panel-card { background-color: #0a0a0a; border: 1px solid rgba(255,255,255,0.06); border-radius: 0.75rem; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.5); transition: border-color 0.3s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- 技術指標核心運算 ---
        const Indicators = {
            ema: (data, period) => {
                if (!data || data.length === 0) return [];
                const k = 2 / (period + 1);
                let emaVal = data[0];
                return data.map(val => (emaVal = (val - emaVal) * k + emaVal));
            },
            calculateMACD: (closePrices) => {
                if (!closePrices || closePrices.length < 26) return { dif: [], dea: [], macd: [] };
                const ema12 = Indicators.ema(closePrices, 12);
                const ema26 = Indicators.ema(closePrices, 26);
                const dif = ema12.map((v, i) => v - ema26[i]);
                const dea = Indicators.ema(dif, 9);
                const macd = dif.map((v, i) => (v - dea[i]) * 2);
                return { dif, dea, macd };
            },
            calculateKDJ: (history) => {
                if (!history || history.length === 0) return { k: [], d: [], j: [] };
                const period = 9;
                const ks = [], ds = [], js = [];
                let k = 50, d = 50;
                for (let i = 0; i < history.length; i++) {
                    const start = Math.max(0, i - period + 1);
                    const slice = history.slice(start, i + 1);
                    const low = Math.min(...slice.map(data => data.low));
                    const high = Math.max(...slice.map(data => data.high));
                    const rsv = high === low ? 0 : ((history[i].close - low) / (high - low)) * 100;
                    k = (2 / 3) * k + (1 / 3) * rsv;
                    d = (2 / 3) * d + (1 / 3) * k;
                    js.push(3 * k - 2 * d);
                    ks.push(k);
                    ds.push(d);
                }
                return { k: ks, d: ds, j: js };
            }
        };

        const aggregateWeekly = (dailyData) => {
            const weekly = [];
            if (!dailyData || dailyData.length === 0) return weekly;
            const getWeek = (dateString) => {
                const d = new Date(dateString);
                d.setHours(0, 0, 0, 0);
                d.setDate(d.getDate() + 4 - (d.getDay() || 7));
                const yearStart = new Date(d.getFullYear(), 0, 1);
                const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
                return `${d.getFullYear()}-W${weekNo.toString().padStart(2, '0')}`;
            };
            let currentWeek = null;
            let weekCandle = null;
            dailyData.forEach(day => {
                const weekKey = getWeek(day.time);
                if (weekKey !== currentWeek) {
                    if (weekCandle) weekly.push(weekCandle);
                    currentWeek = weekKey;
                    weekCandle = { ...day };
                } else {
                    weekCandle.high = Math.max(weekCandle.high, day.high);
                    weekCandle.low = Math.min(weekCandle.low, day.low);
                    weekCandle.close = day.close;
                    weekCandle.volume += day.volume;
                }
            });
            if (weekCandle) weekly.push(weekCandle);
            return weekly;
        };

        const fetchWithTimeout = async (url, options = {}, timeoutMs = 15000) => {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeoutMs);
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch (e) {
                clearTimeout(id);
                throw new Error("連線逾時");
            }
        };

        // --- 強固型快取擊穿網路引擎 ---
        const fetchWithProxy = async (url, timeoutMs = 8000) => {
            const cb = `_cb=${Date.now()}_${Math.floor(Math.random() * 10000)}`;
            const safeUrl = url.includes('?') ? `${url}&${cb}` : `${url}?${cb}`;
            const encodedUrl = encodeURIComponent(safeUrl);
            
            const proxies = [
                { url: `https://api.allorigins.win/get?url=${encodedUrl}&disableCache=true`, type: 'wrapped' },
                { url: `https://corsproxy.io/?${encodedUrl}`, type: 'direct' }
            ];

            for (const proxy of proxies) {
                try {
                    const res = await fetchWithTimeout(proxy.url, { cache: 'no-store' }, timeoutMs);
                    if (!res.ok) continue;

                    if (proxy.type === 'wrapped') {
                        const data = await res.json();
                        if (data.contents) return JSON.parse(data.contents);
                    } else {
                        return await res.json();
                    }
                } catch (e) { }
            }
            throw new Error("代理伺服器皆無回應");
        };

        // --- 1. 極致解析：1 分鐘 K 線轉化為今日日 K 棒 ---
        const fetchRealTimeData = async (target) => {
            for (let ext of ['.TW', '.TWO']) {
                // 強制抓取 1m K棒，獲取絕對即時的開高低收
                const url = `https://query1.finance.yahoo.com/v8/finance/chart/${target}${ext}?interval=1m&range=1d`;
                try {
                    const data = await fetchWithProxy(url, 6000);
                    if (data.chart?.error) continue;
                    
                    const result = data.chart.result[0];
                    const meta = result.meta;
                    if (!meta || !meta.regularMarketPrice) continue;

                    const currentPrice = meta.regularMarketPrice;
                    const prevClose = meta.chartPreviousClose || currentPrice;
                    const change = currentPrice - prevClose;
                    const percent = prevClose !== 0 ? (change / prevClose) * 100 : 0;
                    
                    const quote = result.indicators?.quote?.[0];
                    
                    let open = currentPrice;
                    let high = currentPrice;
                    let low = currentPrice;
                    let volume = 0;

                    if (quote) {
                        const validOpens = (quote.open || []).filter(v => v !== null);
                        const validHighs = (quote.high || []).filter(v => v !== null);
                        const validLows = (quote.low || []).filter(v => v !== null);
                        const validVols = (quote.volume || []).filter(v => v !== null);

                        if (validOpens.length > 0) open = validOpens[0];
                        if (validHighs.length > 0) high = Math.max(...validHighs);
                        if (validLows.length > 0) low = Math.min(...validLows);
                        if (validVols.length > 0) volume = validVols.reduce((a, b) => a + b, 0);
                    }
                    
                    return {
                        price: currentPrice,
                        change: change,
                        percent: percent,
                        open: open,
                        high: high,
                        low: low,
                        close: currentPrice,
                        volume: volume
                    };
                } catch(e) {}
            }
            return null;
        };

        // --- 2. 歷史報價雙引擎 (FinMind 優先，Yahoo 備援) ---
        const fetchHistoryData = async (target) => {
            try {
                const d = new Date(); d.setFullYear(d.getFullYear() - 1);
                const res = await fetchWithTimeout(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${target}&start_date=${d.toISOString().split('T')[0]}`, {}, 4000);
                const json = await res.json();
                if (json.msg === 'success' && json.data && json.data.length > 0) {
                    return json.data.map(i => ({ 
                        time: i.date, open: Number(i.open), high: Number(i.max), low: Number(i.min), close: Number(i.close), volume: Number(i.Trading_Volume) 
                    }));
                }
            } catch (e) { }

            for (let ext of ['.TW', '.TWO']) {
                const url = `https://query1.finance.yahoo.com/v8/finance/chart/${target}${ext}?interval=1d&range=1y`;
                try {
                    const data = await fetchWithProxy(url, 6000);
                    if (data.chart?.error) continue;
                    const result = data.chart.result[0];
                    const timestamps = result.timestamp;
                    const quote = result.indicators.quote[0];
                    if (!timestamps || !quote) continue;
                    
                    const history = [];
                    const seenDates = new Set();
                    for (let i = 0; i < timestamps.length; i++) {
                        if (quote.close[i] === null || quote.open[i] === null) continue;
                        const d = new Date(timestamps[i] * 1000);
                        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                        if (seenDates.has(dateStr)) continue;
                        seenDates.add(dateStr);
                        history.push({
                            time: dateStr, open: Number(quote.open[i]), high: Number(quote.high[i]), low: Number(quote.low[i]), close: Number(quote.close[i]), volume: Number(quote.volume[i])
                        });
                    }
                    if (history.length > 0) return history;
                } catch(e) {}
            }
            return [];
        };

        const getMockData = (symbol) => ({
            name: `${symbol}`, industry: "尚未分析",
            market: { taiex: "等待同步", sox: "等待同步", nasdaq: "等待同步" },
            peers: [],
            valuation: { yield: "---", pb: "---", rating: "---", marketCap: "---" },
            growth: { mom: "---", yoy: "---", forwardPE: "---", grossMargin: "---" },
            risk: { level: "---", details: "請點擊右上角「設定」輸入您的 Groq API 金鑰，解鎖 AI 深度分析。左上角與圖表為絕對真實即時報價。" },
            fund: { eps: "---", gross: "---", net: "---", status: "等待設定金鑰..." },
            chips: { foreign: "---", trust: "---", big: "---", retail: "---", status: "等待設定金鑰..." },
            moneyFlow: { inflow: "---", outflow: "---", net: "---", analysis: "無資料" },
            tech: { ma: "---", support: "---", pressure: "---" },
            strategy: { score: 0, conclusion: "等待設定", short: "---", swing: "---", stop: "---" },
            news: []
        });

        const App = () => {
            const [stockId, setStockId] = useState('2330');
            const [currentName, setCurrentName] = useState('台積電');
            const [inputValue, setInputValue] = useState('');
            
            const [customKey, setCustomKey] = useState(() => (localStorage.getItem('groq_api_key') || '').trim());
            const [aiModel, setAiModel] = useState(() => (localStorage.getItem('groq_model_name') || 'llama-3.3-70b-versatile').trim());
            
            const [liveQuote, setLiveQuote] = useState({ price: '讀取中', change: '---', percent: '---', open: '---', high: '---', low: '---', volume: '---' });
            const [chartData, setChartData] = useState([]); 
            const [aiData, setAiData] = useState(null);
            
            const [watchlist, setWatchlist] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem('quant_watchlist')) || [
                        { id: '2330', name: '台積電' }, { id: '2317', name: '鴻海' }, { id: '2454', name: '聯發科' }, { id: '2603', name: '長榮' }
                    ];
                } catch {
                    return [{ id: '2330', name: '台積電' }];
                }
            });
            const [watchlistQuotes, setWatchlistQuotes] = useState({});
            const [isWatchlistExpanded, setIsWatchlistExpanded] = useState(true);
            
            const [isChartLoading, setIsChartLoading] = useState(false);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [error, setError] = useState(null);
            
            const [fullStockList, setFullStockList] = useState([]); 
            const [suggestions, setSuggestions] = useState([]); 
            const [showSuggestions, setShowSuggestions] = useState(false);
            
            const [hoverData, setHoverData] = useState(null); 
            const [timeframe, setTimeframe] = useState('1D'); 

            const [isFullScreen, setIsFullScreen] = useState(false);
            const [zenMode, setZenMode] = useState(false);
            const [showSettings, setShowSettings] = useState(false);

            const rootRef = useRef(null);
            const inputRef = useRef(null); 
            const chartRefs = useRef({});
            const seriesRefs = useRef({});
            const containerRefs = { kline: useRef(null), vol: useRef(null), macd: useRef(null), kdj: useRef(null) };
            
            const isChartInitialized = useRef(false);
            const isSyncing = useRef(false);
            const enrichedDataRef = useRef([]);

            const isWatched = watchlist.some(w => w.id === stockId);
            const toggleWatchlist = () => {
                setWatchlist(prev => {
                    let newWatchlist;
                    if (isWatched) newWatchlist = prev.filter(w => w.id !== stockId);
                    else newWatchlist = [...prev, { id: stockId, name: currentName || stockId }];
                    localStorage.setItem('quant_watchlist', JSON.stringify(newWatchlist));
                    return newWatchlist;
                });
            };

            // 安全序列化抓取追蹤清單即時報價
            useEffect(() => {
                let isActive = true;
                const updateWatchlistQuotes = async () => {
                    if (watchlist.length === 0) return;
                    for (const item of watchlist) {
                        if (!isActive) break;
                        try {
                            const rtData = await fetchRealTimeData(item.id);
                            if (rtData) {
                                setWatchlistQuotes(prev => ({
                                    ...prev,
                                    [item.id]: { price: rtData.price, change: rtData.change, percent: rtData.percent }
                                }));
                            }
                        } catch(e){}
                        await new Promise(r => setTimeout(r, 300)); 
                    }
                };
                
                updateWatchlistQuotes();
                const interval = setInterval(updateWatchlistQuotes, 20000); 
                return () => { isActive = false; clearInterval(interval); };
            }, [watchlist]);

            // 智慧快取載入全市場清單
            useEffect(() => {
                const loadStockList = async () => {
                    try {
                        const cachedList = localStorage.getItem('quant_stock_list_cache');
                        if (cachedList) {
                            setFullStockList(JSON.parse(cachedList));
                            return;
                        }
                        const res = await fetchWithTimeout(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo`);
                        const json = await res.json();
                        if (json.msg === 'success') {
                            setFullStockList(json.data);
                            localStorage.setItem('quant_stock_list_cache', JSON.stringify(json.data));
                        }
                    } catch (e) { }
                };
                loadStockList();
            }, []);

            const onInputChange = (e) => {
                const val = e.target.value;
                setInputValue(val);
                if (val.trim() && fullStockList.length > 0) {
                    const filtered = fullStockList.filter(s => s.stock_id.includes(val) || s.stock_name.includes(val)).slice(0, 8); 
                    setSuggestions(filtered);
                    setShowSuggestions(true);
                } else {
                    setSuggestions([]);
                    setShowSuggestions(false);
                }
            };

            const selectSuggestion = (id) => {
                setInputValue(id);
                setShowSuggestions(false);
                executeJump(id);
            };

            const executeJump = useCallback((targetId) => {
                if (targetId === stockId) return;
                setShowSuggestions(false);
                setInputValue('');
                setStockId(targetId);
            }, [stockId]);

            const handleSearch = useCallback(() => {
                let input = inputValue.trim();
                if (!input) return;
                setShowSuggestions(false);

                if (/[\u4e00-\u9fa5]/.test(input) && fullStockList.length > 0) {
                    const matchedStock = fullStockList.find(i => i.stock_name === input) || fullStockList.find(i => i.stock_name.includes(input));
                    if (matchedStock) {
                        input = matchedStock.stock_id;
                        setInputValue(input); 
                    } else {
                        setError(`找不到標的：「${input}」`);
                        return;
                    }
                }
                executeJump(input.toUpperCase());
            }, [inputValue, fullStockList, executeJump]);

            const toggleFullScreen = useCallback(() => {
                if (!document.fullscreenElement) {
                    if (rootRef.current) rootRef.current.requestFullscreen().catch(() => {});
                } else {
                    document.exitFullscreen();
                }
            }, []);

            useEffect(() => {
                const fn = () => { setIsFullScreen(!!document.fullscreenElement); if(!!document.fullscreenElement) setZenMode(false); };
                document.addEventListener('fullscreenchange', fn);
                return () => document.removeEventListener('fullscreenchange', fn);
            }, []);

            // --- 圖表初始化 (完美自適應) ---
            const initCharts = useCallback(() => {
                if (!window.LightweightCharts || isChartInitialized.current || !containerRefs.kline.current) return;
                
                const baseOpts = {
                    layout: { background: { color: 'transparent' }, textColor: '#9ca3af', fontSize: 11 },
                    grid: { vertLines: { color: 'rgba(255,255,255,0.04)' }, horzLines: { color: 'rgba(255,255,255,0.04)' } },
                    rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' }, crosshair: { mode: 0 },
                    handleScroll: true, handleScale: true
                };

                const kChart = window.LightweightCharts.createChart(containerRefs.kline.current, { ...baseOpts, timeScale: { borderColor: 'rgba(255,255,255,0.1)', fixRightEdge: true, rightOffset: 5 } });
                const kSeries = kChart.addCandlestickSeries({ upColor: '#ef4444', downColor: '#22c55e', borderVisible: false, wickUpColor: '#ef4444', wickDownColor: '#22c55e' });
                const ma5Series = kChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const ma20Series = kChart.addLineSeries({ color: '#60a5fa', lineWidth: 1.5, crosshairMarkerVisible: false });
                const ma60Series = kChart.addLineSeries({ color: '#4ade80', lineWidth: 1.5, crosshairMarkerVisible: false });
                
                const vChart = window.LightweightCharts.createChart(containerRefs.vol.current, { ...baseOpts, timeScale: { visible: false, fixRightEdge: true } });
                const vSeries = vChart.addHistogramSeries({ color: '#3b82f6', priceFormat: { type: 'volume' } });
                
                const mChart = window.LightweightCharts.createChart(containerRefs.macd.current, { ...baseOpts, timeScale: { visible: false, fixRightEdge: true } });
                const mDif = mChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const mDea = mChart.addLineSeries({ color: '#60a5fa', lineWidth: 1.5, crosshairMarkerVisible: false });
                const mHist = mChart.addHistogramSeries();
                
                const kjChart = window.LightweightCharts.createChart(containerRefs.kdj.current, { ...baseOpts, timeScale: { borderColor: 'rgba(255,255,255,0.1)', fixRightEdge: true } });
                const kjK = kjChart.addLineSeries({ color: '#f8fafc', lineWidth: 1.5, crosshairMarkerVisible: false });
                const kjD = kjChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const kjJ = kjChart.addLineSeries({ color: '#d946ef', lineWidth: 1.5, crosshairMarkerVisible: false });

                chartRefs.current = { kChart, vChart, mChart, kjChart };
                seriesRefs.current = { kSeries, ma5Series, ma20Series, ma60Series, vSeries, macdDifSeries: mDif, macdDeaSeries: mDea, macdHistSeries: mHist, kdjKSeries: kjK, kdjDSeries: kjD, kdjJSeries: kjJ };

                const resizeObserver = new ResizeObserver(entries => {
                    window.requestAnimationFrame(() => {
                        if (!isChartInitialized.current) return;
                        for (let entry of entries) {
                            const { width, height } = entry.contentRect;
                            if (width === 0 || height === 0) continue;
                            if (entry.target === containerRefs.kline.current && chartRefs.current.kChart) chartRefs.current.kChart.applyOptions({ width, height });
                            if (entry.target === containerRefs.vol.current && chartRefs.current.vChart) chartRefs.current.vChart.applyOptions({ width, height });
                            if (entry.target === containerRefs.macd.current && chartRefs.current.mChart) chartRefs.current.mChart.applyOptions({ width, height });
                            if (entry.target === containerRefs.kdj.current && chartRefs.current.kjChart) chartRefs.current.kjChart.applyOptions({ width, height });
                        }
                    });
                });

                resizeObserver.observe(containerRefs.kline.current);
                resizeObserver.observe(containerRefs.vol.current);
                resizeObserver.observe(containerRefs.macd.current);
                resizeObserver.observe(containerRefs.kdj.current);

                const instances = [kChart, vChart, mChart, kjChart];
                instances.forEach(c => {
                    c.timeScale().subscribeVisibleLogicalRangeChange(range => {
                        if (!range || isSyncing.current) return;
                        isSyncing.current = true;
                        instances.forEach(other => { if (other !== c) other.timeScale().setVisibleLogicalRange(range); });
                        isSyncing.current = false;
                    });
                    
                    c.subscribeCrosshairMove(param => {
                        if (param.time && enrichedDataRef.current.length > 0) {
                            const dataPoint = enrichedDataRef.current.find(d => d.time === param.time);
                            if (dataPoint) setHoverData(dataPoint);
                        } else {
                            if (enrichedDataRef.current.length > 0) {
                                setHoverData(enrichedDataRef.current[enrichedDataRef.current.length - 1]);
                            }
                        }
                    });
                });
                isChartInitialized.current = true;
            }, []);

            const updateChartData = useCallback((historyArray) => {
                if (!isChartInitialized.current) return;
                const s = seriesRefs.current;
                if (!s.kSeries) return;

                if (!historyArray || historyArray.length === 0) {
                    try {
                        s.kSeries.setData([]); s.ma5Series.setData([]); s.ma20Series.setData([]); s.ma60Series.setData([]);
                        s.vSeries.setData([]); s.macdDifSeries.setData([]); s.macdDeaSeries.setData([]); s.macdHistSeries.setData([]);
                        s.kdjKSeries.setData([]); s.kdjDSeries.setData([]); s.kdjJSeries.setData([]);
                    } catch(e) {}
                    return;
                }

                // 時間去重，避免相同時間點引發的圖表崩潰
                const sorted = [...historyArray].sort((a, b) => new Date(a.time).getTime() - new Date(b.time).getTime());
                const uniqueHistory = [];
                const seen = new Set();
                for (let item of sorted) {
                    if (seen.has(item.time)) {
                        uniqueHistory[uniqueHistory.length - 1] = item;
                    } else {
                        seen.add(item.time);
                        uniqueHistory.push(item);
                    }
                }

                const closePrices = uniqueHistory.map(d => d.close);
                const ma5 = Indicators.ema(closePrices, 5);
                const ma20 = Indicators.ema(closePrices, 20);
                const ma60 = Indicators.ema(closePrices, 60);
                const { dif, dea, macd } = Indicators.calculateMACD(closePrices);
                const { k, d, j } = Indicators.calculateKDJ(uniqueHistory);
                
                const enriched = uniqueHistory.map((item, i) => ({
                    ...item, ma5: ma5[i], ma20: ma20[i], ma60: ma60[i], dif: dif[i], dea: dea[i], macd: macd[i], k: k[i], d: d[i], j: j[i]
                }));
                enrichedDataRef.current = enriched;
                setHoverData(enriched[enriched.length - 1]); 

                try {
                    s.kSeries.setData(uniqueHistory);
                    s.ma5Series.setData(uniqueHistory.map((d, i) => ({ time: d.time, value: ma5[i] })));
                    s.ma20Series.setData(uniqueHistory.map((d, i) => ({ time: d.time, value: ma20[i] })));
                    s.ma60Series.setData(uniqueHistory.map((d, i) => ({ time: d.time, value: ma60[i] })));

                    s.macdDifSeries.setData(uniqueHistory.map((d, i) => ({ time: d.time, value: dif[i] || 0 })));
                    s.macdDeaSeries.setData(uniqueHistory.map((d, i) => ({ time: d.time, value: dea[i] || 0 })));
                    s.macdHistSeries.setData(uniqueHistory.map((d, i) => ({ time: d.time, value: macd[i] || 0, color: macd[i] >= 0 ? 'rgba(239, 68, 68, 0.9)' : 'rgba(34, 197, 94, 0.9)' })));
                    s.kdjKSeries.setData(uniqueHistory.map((v, i) => ({ time: v.time, value: k[i] || 50 })));
                    s.kdjDSeries.setData(uniqueHistory.map((v, i) => ({ time: v.time, value: d[i] || 50 })));
                    s.kdjJSeries.setData(uniqueHistory.map((v, i) => ({ time: v.time, value: j[i] || 50 })));
                } catch(e) {}
            }, []);

            // ==========================================

                    let mergedHistory = [...history];

                    if (live) {
                        setTopQuoteData(live);
                        const todayStr = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Taipei' }).format(new Date());
                        
                        if (mergedHistory.length > 0) {
                            const lastCandle = mergedHistory[mergedHistory.length - 1];
                            if (lastCandle.time < todayStr) {
                                mergedHistory.push({ time: todayStr, open: Number(live.open), high: Number(live.high), low: Number(live.low), close: Number(live.close), volume: Number(live.volume) });
                            } else if (lastCandle.time === todayStr) {
                                lastCandle.open = Number(live.open);
                                lastCandle.high = Math.max(lastCandle.high, Number(live.high));
                                lastCandle.low = Math.min(lastCandle.low, Number(live.low));
                                lastCandle.close = Number(live.close);
                                lastCandle.volume = Math.max(lastCandle.volume, Number(live.volume));
                            }
                        } else {
                            mergedHistory.push({ time: todayStr, open: Number(live.open), high: Number(live.high), low: Number(live.low), close: Number(live.close), volume: Number(live.volume) });
                        }
                    } else if (mergedHistory.length > 0) {
                        const latest = mergedHistory[mergedHistory.length - 1];
                        const prev = mergedHistory.length > 1 ? mergedHistory[mergedHistory.length - 2] : latest;
                        const change = latest.close - prev.close;
                        setTopQuoteData({
                            price: latest.close.toFixed(2),
                            change: change > 0 ? '+' + change.toFixed(2) : change.toFixed(2),
                            percent: (change > 0 ? '+' : '') + (prev.close !== 0 ? ((change / prev.close) * 100).toFixed(2) : '0.00') + '%',
                            open: latest.open.toFixed(2),
                            high: latest.high.toFixed(2),
                            low: latest.low.toFixed(2),
                            volume: latest.volume || 0
                        });

                        setTopQuoteData({ price: '查無報價', change: '---', percent: '---', open: '---', high: '---', low: '---', volume: '0' });
                    }

                    setChartData(mergedHistory);
                    setIsChartLoading(false);
                };

                const setTopQuoteData = (data) => {

                        high: data.high || '---',
                        low: data.low || '---',
                        volume: data.volume || '0'

                };

                loadFastData();
                return () => { isCurrent = false; };

                        任務：提供大盤聯動、估值、營收成長、風險預警、籌碼面、資金流向與最新動態。

                        const rawApiUrl = `https://api.groq.com/openai/v1/chat/completions`;

                        };

                    }

                fetchAI();
                return () => { isCurrent = false; };
            }, [stockId, currentName, customKey, aiModel]);

            const saveSettings = () => {

                                                    <div key={item.id} onClick={() => executeJump(item.id)} className={`flex justify-between items-center p-2 rounded-lg cursor-pointer transition-all duration-200 border ${stockId === item.id ? 'bg-white/10 border-white/20 shadow-inner' : 'bg-transparent border-transparent hover:bg-white/5'}`}>
                                                        <div className="flex flex-col">
                                                            <span className="text-white font-bold text-xs">{item.name}</span>
                                                            <span className="text-gray-500 font-mono text-[9px]">{item.id}</span>
                                                        </div>
                                                        <div className="flex flex-col items-end">
                                                            <span className={`font-mono font-bold text-xs ${colorClass}`}>{quote ? quote.price : '---'}</span>
                                                            <span className={`font-mono text-[10px] ${colorClass}`}>{quote ? quote.percent : '---'}</span>
                                                        </div>
                                                    </div>
                                                );
                                            }) : <span className="text-gray-600 text-xs p-3 text-center block">尚無追蹤標的</span>}
                                        </div>
                                    </div>
                                </div>

                                {!customKey ? (
                                    <div className="panel-card p-5 text-center mb-1 flex-none border-blue-900/30 bg-blue-950/10 animate-fade-in">
                                        <p className="text-xs text-blue-300 font-bold mb-4 tracking-widest leading-relaxed">請設定 Groq 金鑰以啟用 AI 分析</p>
                                        <button onClick={() => setShowSettings(true)} className="bg-blue-600 text-white text-xs px-8 py-2.5 rounded-lg font-black hover:bg-blue-500 shadow-[0_0_15px_rgba(37,99,235,0.4)] transition-all">立即設定</button>
                                    </div>
                                ) : null}
                                
                                <div className="panel-card flex-none">
                                    <div className="bg-blue-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-blue-400 font-bold text-xs tracking-widest uppercase">市場聯動分析</span></div>
                                    <div className="p-4 space-y-3 text-xs">
                                        <div className="flex justify-between border-b border-white/5 pb-2 font-mono tracking-widest"><span className="text-gray-500">台股大盤</span><span className="text-white font-bold">{aiData?.market?.taiex || "---"}</span></div>
                                        <div className="flex justify-between border-b border-white/5 pb-2 font-mono tracking-widest"><span className="text-gray-500">費半指數</span><span className="text-white font-bold">{aiData?.market?.sox || "---"}</span></div>
                                        <div className="flex justify-between pb-1 font-mono tracking-widest"><span className="text-gray-500">那斯達克</span><span className="text-white font-bold">{aiData?.market?.nasdaq || "---"}</span></div>
                                    </div>
                                </div>
                                
                                <div className="panel-card flex-none">
                                    <div className="bg-purple-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-purple-400 font-bold text-xs tracking-widest uppercase">同業競爭比較</span></div>
                                    <div className="p-4 space-y-2 text-xs">
                                        {aiData?.peers && aiData.peers.length > 0 ? (
                                            aiData.peers.map((p, i) => (
                                                <div key={i} className="flex justify-between bg-black/40 p-3 mb-2 rounded-lg border border-white/5 font-mono hover:bg-white/10 transition-colors">
                                                    <span className="text-gray-200 font-bold">{p.name}</span>
                                                    <span className={p.change && String(p.change).includes('-') ? 'text-green-400' : 'text-red-400'}>{p.change}</span>
                                                </div>
                                            ))
                                        ) : (
                                            <div className="text-gray-600 text-center py-2">---</div>
                                        )}
                                    </div>
                                </div>
                                
                                <div className="panel-card flex-none">
                                    <div className="bg-slate-900/40 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-gray-300 font-bold text-xs tracking-widest uppercase">基本面與估值</span></div>
                                    <div className="p-4 space-y-3 text-xs">
                                        <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-blue-300 tracking-tighter">公司總市值 <span className="text-white font-bold font-mono">{aiData?.valuation?.marketCap || "---"}</span></div>
                                        <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">殖利率/股淨比 <span className="text-white font-bold font-mono">{aiData?.valuation?.yield || "---"} / {aiData?.valuation?.pb || "---"}</span></div>
                                        <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">AI 估值評等 <span className="text-yellow-400 font-black tracking-widest text-sm">{aiData?.valuation?.rating || "---"}</span></div>
                                    </div>
                                </div>

                                <div className="panel-card flex-1 min-h-[160px]">
                                    <div className="bg-cyan-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-cyan-400 font-bold text-xs tracking-widest uppercase">營收與獲利動能</span></div>
                                    <div className="p-4 space-y-3 text-xs">
                                        <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">月營收 (MoM) <span className="text-white font-bold font-mono">{aiData?.growth?.mom || "---"}</span></div>
                                        <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">年營收 (YoY) <span className="text-white font-bold font-mono">{aiData?.growth?.yoy || "---"}</span></div>
                                        <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">預估本益比 (F.P/E) <span className="text-yellow-400 font-bold font-mono">{aiData?.growth?.forwardPE || "---"}</span></div>
                                        <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">最新毛利率 <span className="text-white font-bold font-mono">{aiData?.growth?.grossMargin || "---"}</span></div>
                                    </div>
                                </div>
                            </div>

                            <div className="col-span-12 lg:col-span-6 flex flex-col overflow-hidden pb-1 min-h-[600px] lg:min-h-0">
                                <div className="panel-card flex-1 flex flex-col overflow-hidden shadow-[0_10px_30px_rgba(0,0,0,0.8)] relative">
                                    
                                    <div className="bg-green-950/10 border-b border-white/5 p-3 px-5 flex justify-between items-center z-10 h-14 rounded-t-xl flex-none">
                                        <div className="flex items-center gap-4">
                                            <span className="text-green-400 font-bold text-sm tracking-widest uppercase">技術線圖</span>
                                            <div className="hidden sm:flex items-center gap-3 text-[10px] font-mono text-gray-400 bg-black/40 px-3 py-1.5 rounded-lg border border-white/5">
                                                <span>開: <strong className="text-white">{hoverData?.open || liveQuote.open || '-'}</strong></span>
                                                <span>高: <strong className="text-red-400">{hoverData?.high || liveQuote.high || '-'}</strong></span>
                                                <span>低: <strong className="text-green-400">{hoverData?.low || liveQuote.low || '-'}</strong></span>
                                                <span>總量: <strong className="text-yellow-400">{hoverData?.volume || liveQuote.volume || '0'}</strong> 張</span>
                                            </div>
                                        </div>
                                        <div className="flex border border-white/10 rounded-lg overflow-hidden h-8 bg-black/40 shadow-inner">
                                            <button onClick={() => setTimeframe('1D')} disabled={isChartLoading} className={`px-5 text-xs font-black transition-colors ${timeframe === '1D' ? 'bg-gray-700 text-white' : 'text-gray-400 hover:text-white hover:bg-white/10'} disabled:opacity-50`}>日線</button>
                                            <button onClick={() => setTimeframe('1W')} disabled={isChartLoading} className={`px-5 text-xs font-black transition-colors ${timeframe === '1W' ? 'bg-gray-700 text-white' : 'text-gray-400 hover:text-white hover:bg-white/10'} disabled:opacity-50`}>週線</button>
                                        </div>
                                    </div>

                                    {isChartLoading && (
                                        <div className="absolute inset-0 z-50 flex flex-col justify-center items-center bg-black/80 backdrop-blur-sm mt-14 rounded-b-xl">
                                            <div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                                            <span className="mt-4 text-blue-400 font-mono text-xs tracking-[0.2em] animate-pulse">FETCHING CHART...</span>
                                        </div>
                                    )}

                                    <div className="flex-1 bg-black/30 flex flex-col h-0 overflow-hidden p-1">
                                        <div className="relative w-full flex-[4] min-h-0 flex flex-col mb-1 rounded overflow-hidden">
                                            <div className="absolute top-2 left-2 z-10 flex flex-wrap gap-2 text-[10px] font-mono pointer-events-none">
                                                <div className="bg-black/80 px-2 py-0.5 rounded text-gray-300 font-bold border border-white/5">K線</div>
                                                <div className="bg-black/80 px-2 py-0.5 rounded text-white border border-white/5">
                                                    <span className="text-gray-400 mr-2">{hoverData?.time || '最新'}</span>
                                                    開:{hoverData?.open || hoverData?.close || '-'} 高:{hoverData?.high || hoverData?.close || '-'} 低:{hoverData?.low || hoverData?.close || '-'} 收:{hoverData?.close||'-'}
                                                </div>
                                                <div className="bg-black/80 px-2 py-0.5 rounded text-yellow-400 border border-white/5">MA5:{hoverData?.ma5?.toFixed(2)||'-'}</div>
                                                <div className="bg-black/80 px-2 py-0.5 rounded text-blue-400 border border-white/5">MA20:{hoverData?.ma20?.toFixed(2)||'-'}</div>
                                                <div className="bg-black/80 px-2 py-0.5 rounded text-green-400 border border-white/5">MA60:{hoverData?.ma60?.toFixed(2)||'-'}</div>
                                            </div>
                                            <div ref={containerRefs.kline} className="flex-1 w-full h-full pt-6" />
                                        </div>
                                        
                                        <div className="relative w-full flex-[1.2] min-h-0 flex flex-col border-t border-white/5 bg-black/20 mb-1 rounded overflow-hidden">
                                            <div className="absolute top-1 left-2 z-10 flex gap-2 text-[10px] font-mono pointer-events-none">
                                                <div className="bg-black/80 px-2 py-0.5 rounded text-gray-300 font-bold border border-white/5">成交量</div>
                                                <div className="bg-black/80 px-2 py-0.5 rounded text-blue-300 font-bold border border-white/5">
                                                    Vol: {hoverData?.volume ? hoverData.volume + ' 張' : '-'}
                                                </div>
                                            </div>
                                            <div ref={containerRefs.vol} className="flex-1 w-full h-full pt-4" />
                                        </div>
                                        
                                        <div className="relative w-full flex-[1.2] min-h-0 flex flex-col border-t border-white/5 bg-black/20 mb-1 rounded overflow-hidden">
                                            <div className="absolute top-1 left-2 z-10 flex gap-2 text-[10px] font-mono pointer-events-none">
                                                <div className="bg-black/80 px-2 py-0.5 rounded text-gray-300 font-bold border border-white/5">MACD (12,26,9)</div>
                                                <div className={`bg-black/80 px-2 py-0.5 rounded border border-white/5 ${hoverData?.macd >= 0 ? "text-red-400" : "text-green-400"}`}>MACD:{hoverData?.macd?.toFixed(2)||'-'}</div>
                                                <div className="bg-black/80 px-2 py-0.5 rounded text-yellow-400 border border-white/5">DIF:{hoverData?.dif?.toFixed(2)||'-'}</div>
                                                <div className="bg-black/80 px-2 py-0.5 rounded text-blue-400 border border-white/5">DEA:{hoverData?.dea?.toFixed(2)||'-'}</div>
                                            </div>
                                            <div ref={containerRefs.macd} className="flex-1 w-full h-full pt-4" />
                                        </div>
                                        
                                        <div className="relative w-full flex-[1.2] min-h-0 flex flex-col border-t border-white/5 bg-black/20 rounded-b-xl overflow-hidden pb-1">
                                            <div className="absolute top-1 left-2 z-10 flex gap-2 text-[10px] font-mono pointer-events-none">
                                                <div className="bg-black/80 px-2 py-0.5 rounded text-gray-300 font-bold border border-white/5">KDJ (9,3,3)</div>
                                                <div className="bg-black/80 px-2 py-0.5 rounded text-white border border-white/5">K:{hoverData?.k?.toFixed(2)||'-'}</div>
                                                <div className="bg-black/80 px-2 py-0.5 rounded text-yellow-400 border border-white/5">D:{hoverData?.d?.toFixed(2)||'-'}</div>
                                                <div className="bg-black/80 px-2 py-0.5 rounded text-pink-400 border border-white/5">J:{hoverData?.j?.toFixed(2)||'-'}</div>
                                            </div>
                                            <div ref={containerRefs.kdj} className="flex-1 w-full h-full pt-4" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="col-span-12 lg:col-span-3 flex flex-col gap-3 overflow-y-auto custom-scrollbar pl-1 pb-2">
                                <div className="panel-card flex-none">
                                    <div className="bg-purple-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-purple-400 font-bold text-xs tracking-widest uppercase">籌碼流向解析</span></div>
                                    <div className="p-4 space-y-3 text-xs">
                                        <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">外資動態 <span className="text-white font-bold font-mono">{aiData?.chips?.foreign || "---"}</span></div>
                                        <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">投信動態 <span className="text-blue-400 font-bold font-mono">{aiData?.chips?.trust || "---"}</span></div>
                                        <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter text-blue-400">主力持股 <span className="text-white font-black font-mono">{aiData?.chips?.big || "---"}</span></div>
                                        <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter text-green-400">散戶持股 <span className="text-white font-bold font-mono">{aiData?.chips?.retail || "---"}</span></div>
                                    </div>
                                </div>

                                <div className="panel-card flex-none">
                                    <div className="bg-indigo-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-indigo-400 font-bold text-xs tracking-widest uppercase">資金面監測</span></div>
                                    <div className="p-4 space-y-3 text-xs">
                                        <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">買盤流入 <span className="text-red-400 font-bold font-mono">{aiData?.moneyFlow?.inflow || "---"}</span></div>
                                        <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">賣盤流出 <span className="text-green-400 font-bold font-mono">{aiData?.moneyFlow?.outflow || "---"}</span></div>
                                        <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">淨額 <span className="text-white font-black font-mono text-sm">{aiData?.moneyFlow?.net || "---"}</span></div>
                                        <div className="mt-3 text-gray-400 bg-black/40 p-3 border border-white/5 rounded-lg leading-relaxed text-justify whitespace-normal break-words">{aiData?.moneyFlow?.analysis || "等待深度分析同步..."}</div>
                                    </div>
                                </div>

                                <div className="panel-card flex-none">
                                    <div className="bg-orange-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl flex justify-between items-center"><span className="text-orange-400 font-bold text-xs tracking-widest uppercase">AI 戰略矩陣</span><span className="text-lg font-black text-white font-mono bg-orange-900/30 px-2 py-0.5 rounded shadow-inner">{aiData?.strategy?.score || 0} 評分</span></div>
                                    <div className="p-4 space-y-3 text-xs">
                                        <div className="bg-black/40 p-4 rounded-lg border border-white/5 shadow-inner"><span className="text-white font-black block mb-2 text-sm font-mono whitespace-normal leading-relaxed">{aiData?.strategy?.conclusion || "分析中..."}</span><span className="text-gray-400 block text-xs tracking-tighter font-bold font-mono">短線操作：{aiData?.strategy?.short || "---"}</span></div>
                                        <div className="flex justify-between p-3 bg-red-950/20 border border-red-900/30 font-mono text-red-400 font-black text-xs tracking-widest uppercase rounded-lg">停損建議 <span className="text-white font-black text-sm">{aiData?.strategy?.stop || "---"}</span></div>
                                    </div>
                                </div>

                                <div className="panel-card flex-1 min-h-[220px] flex flex-col">
                                    <div className="bg-yellow-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl flex justify-between items-center">
                                        <span className="text-yellow-400 font-bold text-xs tracking-widest uppercase">即時情報與觀點</span>
                                    </div>
                                    <div className="p-2 space-y-1 flex-1 overflow-y-auto custom-scrollbar">
                                        {aiData?.news && aiData.news.length > 0 ? (
                                            aiData.news.map((n, i) => (
                                                <a 
                                                    key={i} 
                                                    href={`https://www.google.com/search?q=${encodeURIComponent(stockId + ' ' + String(n.title))}&tbm=nws`} 
                                                    target="_blank" 
                                                    rel="noreferrer" 
                                                    className="block border-b border-white/5 p-3 hover:bg-white/5 transition-all duration-300 rounded-lg group"
                                                >
                                                    <div className="flex justify-between text-[10px] mb-2 font-mono text-gray-500">
                                                        {n.date} 
                                                        <span className={`px-1.5 rounded ${n.impact === '多' ? 'bg-red-900/40 text-red-400' : n.impact === '空' ? 'bg-green-900/40 text-green-400' : 'bg-gray-800 text-gray-300'} font-black`}>
                                                            {n.impact}
                                                        </span>
                                                    </div>
                                                    <div className="text-gray-200 font-bold text-xs leading-relaxed group-hover:text-blue-400 transition-colors">
                                                        {n.title}
                                                    </div>
                                                    
                                                    <div className="max-h-0 overflow-hidden group-hover:max-h-[150px] opacity-0 group-hover:opacity-100 transition-all duration-500 ease-in-out">
                                                        <div className="mt-3 text-[11px] text-gray-400 leading-relaxed text-justify border-l-2 border-blue-500/50 pl-2">
                                                            {n.snippet && n.snippet !== "-" ? n.snippet : "點擊以跳轉閱讀完整新聞..."}
                                                        </div>
                                                        <div className="text-[9px] text-blue-500/70 font-bold mt-2 text-right group-hover:text-blue-400 transition-colors">點擊跳轉閱讀全文 ↗</div>
                                                    </div>
                                                </a>
                                            ))
                                        ) : (
                                            <div className="loading-shimmer h-24 rounded-lg opacity-20 m-2"></div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
