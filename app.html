<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化決策終端 PRO</title>
    <!-- 引入外部核心資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #000; margin: 0; padding: 0; color: #d1d5db; overflow: hidden; height: 100vh; }
        #root { height: 100%; width: 100%; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }
        * { scrollbar-width: thin; scrollbar-color: #333 #000; }
        :-webkit-full-screen { background-color: #000; }
        .glass-panel { background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px); border: 1px solid #333; }
        .terminal-border { border: 1px solid #1f2937; }
        .loading-shimmer { background: linear-gradient(90deg, #050505 25%, #111 50%, #050505 75%); background-size: 200% 100%; animation: shimmer 2s infinite linear; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // 技術指標運算核心
        const Indicators = {
            ema: (data, period) => {
                if (!data || data.length === 0) return [];
                const k = 2 / (period + 1);
                let emaVal = data[0];
                return data.map(val => (emaVal = (val - emaVal) * k + emaVal));
            },
            calculateMACD: (closePrices) => {
                if (!closePrices || closePrices.length < 26) return { dif: [], dea: [], macd: [] };
                const ema12 = Indicators.ema(closePrices, 12);
                const ema26 = Indicators.ema(closePrices, 26);
                const dif = ema12.map((v, i) => v - ema26[i]);
                const dea = Indicators.ema(dif, 9);
                const macd = dif.map((v, i) => (v - dea[i]) * 2);
                return { dif, dea, macd };
            },
            calculateKDJ: (history) => {
                if (!history || history.length === 0) return { k: [], d: [], j: [] };
                const period = 9;
                const ks = [], ds = [], js = [];
                let k = 50, d = 50;
                for (let i = 0; i < history.length; i++) {
                    const start = Math.max(0, i - period + 1);
                    const slice = history.slice(start, i + 1);
                    const low = Math.min(...slice.map(data => data.low));
                    const high = Math.max(...slice.map(data => data.high));
                    const rsv = high === low ? 0 : ((history[i].close - low) / (high - low)) * 100;
                    k = (2/3)*k + (1/3)*rsv; d = (2/3)*d + (1/3)*k;
                    js.push(3*k - 2*d); ks.push(k); ds.push(d);
                }
                return { k: ks, d: ds, j: js };
            }
        };

        const aggregateWeekly = (dailyData) => {
            const weekly = [];
            if (!dailyData.length) return weekly;
            const getWeek = (s) => {
                const d = new Date(s);
                d.setDate(d.getDate() + 4 - (d.getDay() || 7));
                return `${d.getFullYear()}-W${Math.ceil((((d-new Date(d.getFullYear(),0,1))/864e5)+1)/7).toString().padStart(2,'0')}`;
            };
            let curW = null, wc = null;
            dailyData.forEach(d => {
                const wk = getWeek(d.time);
                if (wk !== curW) {
                    if (wc) weekly.push(wc);
                    curW = wk; wc = { ...d };
                } else {
                    wc.high = Math.max(wc.high, d.high); wc.low = Math.min(wc.low, d.low);
                    wc.close = d.close; wc.volume += d.volume;
                }
            });
            if (wc) weekly.push(wc);
            return weekly;
        };

        const getMockData = (symbol, price) => ({
            name: `${symbol} (離線模式)`,
            price: String(price),
            change: "+0.00",
            percent: "+0.00%",
            industry: "系統測試模組",
            market: { taiex: "測試數據", sox: "測試數據", nasdaq: "測試數據" },
            peers: [{ name: "模擬對手A", change: "+1.2%" }, { name: "模擬對手B", change: "-0.5%" }],
            valuation: { yield: "---", pb: "---", rating: "測試評估", marketCap: "---" },
            growth: { mom: "-1.5%", yoy: "+12.4%", forwardPE: "15.2", grossMargin: "35.6%" },
            fund: { eps: "---", gross: "---", net: "---", status: "由於 API 額度耗盡或網路異常，目前啟動「離線測試模式」。圖表為真實台股報價，但此處文字分析皆為系統虛擬生成，僅供測試介面排版使用。" },
            chips: { foreign: "模擬", trust: "模擬", big: "模擬", retail: "模擬", status: "籌碼資料模擬中。請等待 API 額度恢復後再重新整理取得真實數據。" },
            tech: { ma: "均線模擬", support: "---", pressure: "---" },
            strategy: { score: 88, conclusion: "離線運行中", short: "測試狀態", swing: "模擬策略", stop: "---" },
            news: [
                { date: "剛剛", title: `【模擬情報】Apple iPhone 16 Pro 發表會落幕，市場關注 ${symbol} 相關硬體供應鏈動向。`, impact: "多" },
                { date: "今日", title: `【模擬情報】NVIDIA RTX 5090 高階顯示卡傳言包下大量產能，引發關注。`, impact: "多" }
            ]
        });

        // 核心修復：使用動態 timestamp 徹底擊穿快取，抓取 Yahoo Finance 絕對即時盤中資料
        const fetchRealTimeYahoo = async (target) => {
            const trySuffix = async (suffix) => {
                const timestamp = Date.now();
                const url = `https://query1.finance.yahoo.com/v8/finance/chart/${target}.${suffix}?interval=1d&range=1d&_t=${timestamp}`;
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&disableCache=true`;
                
                const res = await fetch(proxyUrl, { cache: 'no-store' });
                if (!res.ok) throw new Error('Proxy error');
                const data = await res.json();
                const parsed = JSON.parse(data.contents);
                
                if (parsed.chart?.error) throw new Error(parsed.chart.error.code);
                
                const result = parsed.chart.result[0];
                const meta = result.meta;
                const quote = result.indicators?.quote?.[0] || {};
                
                const close = meta.regularMarketPrice;
                const open = quote.open?.[0] || close;
                const high = quote.high?.[0] || close;
                const low = quote.low?.[0] || close;
                const volume = quote.volume?.[0] || meta.regularMarketVolume || 0;
                
                const change = close - meta.chartPreviousClose;
                const percent = (change / meta.chartPreviousClose) * 100;
                
                return {
                    price: close.toFixed(2),
                    change: change.toFixed(2),
                    percent: (change > 0 ? '+' : '') + percent.toFixed(2) + '%',
                    open: open,
                    high: high,
                    low: low,
                    close: close,
                    volume: volume
                };
            };

            try {
                return await trySuffix('TW');
            } catch (e) {
                try { return await trySuffix('TWO'); } catch (e2) { return null; }
            }
        };

        const fetchWithTimeout = async (url, options = {}, timeout = 30000) => {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch (e) {
                clearTimeout(id);
                if (e.name === 'AbortError') throw new Error("連線逾時");
                throw e;
            }
        };

        const App = () => {
            const [stockId, setStockId] = useState('2330');
            const [inputValue, setInputValue] = useState('');
            const [customKey, setCustomKey] = useState(() => (localStorage.getItem('groq_api_key') || '').trim());
            const [aiModel, setAiModel] = useState(() => (localStorage.getItem('groq_model_name') || 'llama-3.3-70b-versatile').trim());
            
            const [loading, setLoading] = useState(false);
            const [aiLoading, setAiLoading] = useState(false);
            const [error, setError] = useState(null);
            const [chartData, setChartData] = useState([]); 
            const [stockDetails, setStockDetails] = useState({ open: 0, high: 0, low: 0, volume: 0 }); 
            const [timeframe, setTimeframe] = useState('1D'); 
            const [aiData, setAiData] = useState(null);
            const [isFullScreen, setIsFullScreen] = useState(false);
            const [zenMode, setZenMode] = useState(false);
            const [showSettings, setShowSettings] = useState(false);

            const rootRef = useRef(null);
            const chartRefs = useRef({});
            const seriesRefs = useRef({});
            const containerRefs = { kline: useRef(null), vol: useRef(null), macd: useRef(null), kdj: useRef(null) };
            const isSyncing = useRef(false);
            const isChartInitialized = useRef(false);
            const isFetchingRef = useRef(false);
            const refreshTimer = useRef(null);

            const fetchWithRetry = async (url, options = {}, max = 2) => {
                let lastErr = null;
                for (let i = 0; i < max; i++) {
                    try {
                        const res = await fetchWithTimeout(url, options, 30000);
                        if (res.ok) return res;
                        
                        if (res.status === 400) {
                            const errBody = await res.json().catch(() => ({}));
                            const detailedMsg = errBody.error?.message || "請確認模型名稱或 API 格式";
                            throw new Error(`設定格式錯誤(400): ${detailedMsg}`);
                        }

                        if (res.status === 401 || res.status === 403) throw new Error("驗證失敗，請確認 Groq 金鑰是否有效");
                        if (res.status === 404) throw new Error("模型端點無法存取，請確認模型名稱");
                        if (res.status === 429) throw new Error("RATE_LIMIT");

                        if (res.status >= 500) {
                            if (i < max - 1) {
                                await new Promise(r => setTimeout(r, 2000));
                                continue;
                            }
                            throw new Error("SERVER_BUSY");
                        }

                        throw new Error(`伺服器回應異常(${res.status})`);
                    } catch (e) { 
                        lastErr = e; 
                        if (e.message && (e.message.includes("400") || e.message.includes("401") || e.message.includes("403") || e.message.includes("404") || e.message.includes("RATE_LIMIT") || e.message.includes("SERVER_BUSY"))) {
                            throw e; 
                        }
                    }
                }
                throw lastErr || new Error("網路連線異常");
            };

            // 支援中文輸入轉換的搜尋邏輯
            const handleSearch = useCallback(async () => {
                let input = inputValue.trim();
                if (!input || aiLoading || isFetchingRef.current) return;

                // 檢查是否包含中文字符
                if (/[\u4e00-\u9fa5]/.test(input)) {
                    setLoading(true);
                    setError(null);
                    try {
                        const infoRes = await fetchWithTimeout(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo`);
                        const infoJson = await infoRes.json();
                        if (infoJson.msg === 'success') {
                            // 優先精確匹配，若無則模糊比對
                            const matchedStock = infoJson.data.find(i => i.stock_name === input) || 
                                                 infoJson.data.find(i => i.stock_name.includes(input));
                            
                            if (matchedStock) {
                                input = matchedStock.stock_id;
                                setInputValue(input); // 更新輸入框為轉換後的代號
                            } else {
                                setError(`找不到名稱包含「${input}」的股票代號，請重新確認`);
                                setLoading(false);
                                return;
                            }
                        }
                    } catch (e) {
                        setError("中文名稱轉換伺服器連線異常，請直接輸入股票代號");
                        setLoading(false);
                        return;
                    }
                }
                
                setStockId(input.toUpperCase());
            }, [inputValue, aiLoading]);

            const toggleFullScreen = useCallback(() => {
                if (!document.fullscreenElement) {
                    if (rootRef.current) {
                        rootRef.current.requestFullscreen().catch(err => {
                            console.error(`Error attempting to enable full-screen mode: ${err.message}`);
                        });
                    }
                } else {
                    document.exitFullscreen();
                }
            }, []);

            useEffect(() => {
                const fn = () => { setIsFullScreen(!!document.fullscreenElement); if(!!document.fullscreenElement) setZenMode(false); };
                document.addEventListener('fullscreenchange', fn);
                return () => document.removeEventListener('fullscreenchange', fn);
            }, []);

            const initCharts = useCallback(() => {
                if (!window.LightweightCharts || isChartInitialized.current || !containerRefs.kline.current) return;
                const width = containerRefs.kline.current.clientWidth;
                const baseOpts = {
                    width, layout: { background: { color: 'transparent' }, textColor: '#9ca3af', fontSize: 11 }, // 背景透明以融合UI
                    grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
                    rightPriceScale: { borderColor: '#374151' }, crosshair: { mode: 0 },
                    handleScroll: true, handleScale: true
                };
                
                const h = (isFullScreen || zenMode) ? 500 : 320;

                const kChart = window.LightweightCharts.createChart(containerRefs.kline.current, { ...baseOpts, height: h, timeScale: { borderColor: '#374151', fixRightEdge: true, rightOffset: 5 } });
                const kSeries = kChart.addCandlestickSeries({ upColor: '#ef4444', downColor: '#22c55e', borderVisible: false, wickUpColor: '#ef4444', wickDownColor: '#22c55e' });
                const ma5Series = kChart.addLineSeries({ color: '#facc15', lineWidth: 1.5 });
                const ma20Series = kChart.addLineSeries({ color: '#60a5fa', lineWidth: 1.5 });
                const ma60Series = kChart.addLineSeries({ color: '#4ade80', lineWidth: 1.5 });
                
                const vChart = window.LightweightCharts.createChart(containerRefs.vol.current, { ...baseOpts, height: 70, timeScale: { visible: false, fixRightEdge: true } });
                const vSeries = vChart.addHistogramSeries({ color: '#3b82f6', priceFormat: { type: 'volume' } });
                
                const mChart = window.LightweightCharts.createChart(containerRefs.macd.current, { ...baseOpts, height: 90, timeScale: { visible: false, fixRightEdge: true } });
                const mDif = mChart.addLineSeries({ color: '#facc15', lineWidth: 1 });
                const mDea = mChart.addLineSeries({ color: '#60a5fa', lineWidth: 1 });
                const mHist = mChart.addHistogramSeries();
                
                const kjChart = window.LightweightCharts.createChart(containerRefs.kdj.current, { ...baseOpts, height: 90, timeScale: { borderColor: '#374151', fixRightEdge: true } });
                const kjK = kjChart.addLineSeries({ color: '#f8fafc', lineWidth: 1 });
                const kjD = kjChart.addLineSeries({ color: '#facc15', lineWidth: 1 });
                const kjJ = kjChart.addLineSeries({ color: '#d946ef', lineWidth: 1 });

                chartRefs.current = { kChart, vChart, mChart, kjChart };
                seriesRefs.current = { kSeries, ma5Series, ma20Series, ma60Series, vSeries, macdDifSeries: mDif, macdDeaSeries: mDea, macdHistSeries: mHist, kdjKSeries: kjK, kdjDSeries: kjD, kdjJSeries: kjJ };

                [kChart, vChart, mChart, kjChart].forEach(c => {
                    c.timeScale().subscribeVisibleLogicalRangeChange(range => {
                        if (!range || isSyncing.current) return;
                        isSyncing.current = true;
                        [kChart, vChart, mChart, kjChart].forEach(other => { if (other !== c) other.timeScale().setVisibleLogicalRange(range); });
                        isSyncing.current = false;
                    });
                });
                isChartInitialized.current = true;
            }, [isFullScreen, zenMode]);

            useEffect(() => {
                if (isChartInitialized.current && chartRefs.current.kChart) {
                    const isLarge = isFullScreen || zenMode;
                    chartRefs.current.kChart.applyOptions({ height: isLarge ? 500 : 320 });
                }
            }, [isFullScreen, zenMode]);

            useEffect(() => {
                if (!containerRefs.kline.current) return;
                const observer = new ResizeObserver(entries => {
                for (let entry of entries) {
                    const width = entry.contentRect.width;
                    if (isChartInitialized.current && chartRefs.current) {
                    Object.values(chartRefs.current).forEach(chart => {
                        if (chart && typeof chart.applyOptions === 'function') chart.applyOptions({ width });
                    });
                    }
                }
                });
                observer.observe(containerRefs.kline.current);
                return () => observer.disconnect();
            }, []);

            const updateChartData = useCallback((historyArray) => {
                if (!isChartInitialized.current || !historyArray || historyArray.length === 0) return;
                const sorted = [...historyArray].sort((a, b) => new Date(a.time) - new Date(b.time));
                const closePrices = sorted.map(d => d.close);
                const ma5 = Indicators.ema(closePrices, 5);
                const ma20 = Indicators.ema(closePrices, 20);
                const ma60 = Indicators.ema(closePrices, 60);
                const { dif, dea, macd } = Indicators.calculateMACD(closePrices);
                const { k, d, j } = Indicators.calculateKDJ(sorted);
                const s = seriesRefs.current;
                if (!s.kSeries) return;

                s.kSeries.setData(sorted);
                s.ma5Series.setData(sorted.map((d, i) => ({ time: d.time, value: ma5[i] })));
                s.ma20Series.setData(sorted.map((d, i) => ({ time: d.time, value: ma20[i] })));
                s.ma60Series.setData(sorted.map((d, i) => ({ time: d.time, value: ma60[i] })));
                s.vSeries.setData(sorted.map(data => ({ time: data.time, value: data.volume, color: data.close >= data.open ? 'rgba(239, 68, 68, 0.6)' : 'rgba(34, 197, 94, 0.6)' })));
                s.macdDifSeries.setData(sorted.map((d, i) => ({ time: d.time, value: dif[i] || 0 })));
                s.macdDeaSeries.setData(sorted.map((d, i) => ({ time: d.time, value: dea[i] || 0 })));
                s.macdHistSeries.setData(sorted.map((d, i) => ({ time: d.time, value: macd[i] || 0, color: macd[i] >= 0 ? '#ef4444' : '#22c55e' })));
                s.kdjKSeries.setData(sorted.map((v, i) => ({ time: v.time, value: k[i] || 50 })));
                s.kdjDSeries.setData(sorted.map((v, i) => ({ time: v.time, value: d[i] || 50 })));
                s.kdjJSeries.setData(sorted.map((v, i) => ({ time: v.time, value: j[i] || 50 })));
            }, []);

            useEffect(() => {
                if (chartData.length > 0) {
                    if (!isChartInitialized.current) initCharts();
                    const displayData = timeframe === '1W' ? aggregateWeekly(chartData) : chartData;
                    updateChartData(displayData);
                }
            }, [timeframe, chartData, initCharts, updateChartData]);

            const executeAnalysis = useCallback(async (target, isRefresh = false) => {
                if (!target || isFetchingRef.current) return;
                isFetchingRef.current = true;

                if (!isRefresh) {
                    setLoading(true); setAiLoading(true); setError(null); setAiData(null); setChartData([]);
                }
                
                try {
                    const infoRes = await fetchWithTimeout(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo`);
                    const infoJson = await infoRes.json();
                    let officialName = target;
                    if (infoJson.msg === 'success') {
                        const stock = infoJson.data.find(i => i.stock_id === target);
                        if (stock) officialName = stock.stock_name;
                    }

                    const d = new Date(); d.setFullYear(d.getFullYear()-1);
                    const historyRes = await fetchWithTimeout(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${target}&start_date=${d.toISOString().split('T')[0]}`, { cache: 'no-store' }, 15000);
                    const hJson = await historyRes.json();
                    
                    let historyCache = [];
                    let lastClosePrice = "---";
                    let currentDataState = null;
                    
                    if (hJson && hJson.msg === 'success' && hJson.data?.length) {
                        historyCache = hJson.data.map(i => ({ 
                            time: i.date, open: Number(i.open), high: Number(i.max), low: Number(i.min), close: Number(i.close), volume: Number(i.Trading_Volume) 
                        }));
                    }

                    let rtData = null;
                    try { rtData = await fetchRealTimeYahoo(target); } catch(e) { console.error("Yahoo API failed:", e); }

                    if (historyCache.length > 0) {
                        const latest = historyCache[historyCache.length-1];
                        
                        if (rtData) {
                            lastClosePrice = rtData.price;
                            currentDataState = {
                                open: rtData.open.toFixed(2), 
                                high: rtData.high.toFixed(2), 
                                low: rtData.low.toFixed(2), 
                                volume: Math.round(rtData.volume / 1000)
                            };
                            
                            const todayStr = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Taipei' }).format(new Date());
                            if (latest.time < todayStr) {
                                historyCache.push({ time: todayStr, open: rtData.open, high: rtData.high, low: rtData.low, close: rtData.close, volume: rtData.volume });
                            } else if (latest.time === todayStr) {
                                latest.open = rtData.open; latest.high = rtData.high; latest.low = rtData.low; latest.close = rtData.close;
                                latest.volume = Math.max(latest.volume, rtData.volume);
                            }
                        } else {
                            lastClosePrice = latest.close.toString();
                            currentDataState = {
                                open: latest.open.toFixed(2), high: latest.high.toFixed(2), low: latest.low.toFixed(2), volume: Math.round(latest.volume / 1000)
                            };
                        }
                        
                        setChartData([...historyCache]);
                        setStockDetails(currentDataState);
                    }

                    const cleanKey = customKey ? customKey.replace(/[\s\u200B-\u200D\uFEFF]/g, '') : "";
                    if (!cleanKey) {
                        if(!isRefresh) {
                            setAiData({ 
                                name: officialName, price: lastClosePrice, change: rtData?.change||"0", percent: rtData?.percent||"0%", 
                                market: {taiex:"-",sox:"-",nasdaq:"-"}, peers:[], valuation:{yield:"-",pb:"-",rating:"-", marketCap:"-"}, 
                                growth: {mom:"-", yoy:"-", forwardPE:"-", grossMargin:"-"},
                                fund:{status:"請設定 Groq API 金鑰以啟用深度分析。"}, chips:{status:"-"}, strategy:{score:0}, news:[] 
                            });
                        }
                        setAiLoading(false); setLoading(false);
                        isFetchingRef.current = false;
                        return; 
                    }

                    const nowMs = Date.now();
                    const cacheKey = `groq_cache_${target}`;
                    const savedCache = localStorage.getItem(cacheKey);
                    
                    if (savedCache && !isRefresh) {
                        try {
                            const parsedCache = JSON.parse(savedCache);
                            if (nowMs - parsedCache.timestamp < 14400000) { 
                                const cachedData = parsedCache.data;
                                if (rtData) {
                                    cachedData.price = rtData.price;
                                    cachedData.change = rtData.change;
                                    cachedData.percent = rtData.percent;
                                }
                                setAiData(cachedData);
                                setAiLoading(false); setLoading(false);
                                isFetchingRef.current = false;
                                return; 
                            }
                        } catch (e) {}
                    }

                    if (isRefresh) {
                        if (aiData && rtData) {
                            setAiData(prev => ({...prev, price: rtData.price, change: rtData.change, percent: rtData.percent}));
                        }
                        setAiLoading(false); setLoading(false);
                        isFetchingRef.current = false;
                        return;
                    }

                    const safeModel = aiModel ? aiModel.replace(/[^a-z0-9.-]/gi, '') : "llama-3.3-70b-versatile";
                    
                    const prompt = `分析台股代號[${target}]，正式名稱為[${officialName}]。
                    【系統即時真實報價數據】：現價:${lastClosePrice}, 漲跌:${rtData?.change||"未知"}, 開盤:${currentDataState?.open||"未知"}, 最高:${currentDataState?.high||"未知"}, 最低:${currentDataState?.low||"未知"}
                    任務：依據上述報價提供大盤/費半/那指狀態、競爭對手、估值評估、營收成長性、籌碼面(外資/投信/主力/散戶)與最新動態。
                    規則：
                    1. 絕對禁止使用任何表情符號。
                    2. 若在新聞或點評中推薦或提及任何實體商品時，務必清楚寫出具體的「品牌」與「型號」。
                    3. 必須且只能回傳 JSON 格式。請直接輸出 JSON 大括號，不要包含 Markdown 標籤。
                    JSON結構：{"name":"${officialName}","price":"現價","change":"漲跌","percent":"幅度","industry":"產業","market":{"taiex":"大盤","sox":"費半","nasdaq":"那指"},"peers":[{"name":"同業","change":"漲跌"}],"valuation":{"yield":"殖利率","pb":"股淨比","rating":"評價","marketCap":"預估總市值(如:10.5兆)"},"growth":{"mom":"月營收增減","yoy":"年營收增減","forwardPE":"預估本益比","grossMargin":"最新毛利率"},"fund":{"eps":"EPS","gross":"毛利","net":"淨利","status":"點評"},"chips":{"foreign":"外資","trust":"投信","big":"主力","retail":"散戶","status":"點評"},"tech":{"ma":"均線","support":"支撐","pressure":"壓力"},"strategy":{"score":85,"conclusion":"判定","short":"短線","swing":"策略","stop":"停損"},"news":[{"date":"日期","title":"標題","impact":"多空"}]}`;

                    const apiUrl = `https://api.groq.com/openai/v1/chat/completions`;

                    const aiRes = await fetchWithRetry(apiUrl, {
                        method: 'POST', 
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${cleanKey}`
                        },
                        body: JSON.stringify({ 
                            model: safeModel,
                            temperature: 0.1,
                            messages: [
                                { role: "system", content: prompt },
                                { role: "user", content: `請提供台股 [${target}] 的深度分析數據，直接輸出純 JSON。` }
                            ]
                        })
                    }, 2);

                    const aiJson = await aiRes.json();
                    let rawText = aiJson.choices?.[0]?.message?.content;
                    if (!rawText) throw new Error("AI 模型未能產出內容");
                    
                    rawText = rawText.replace(/```json/gi, '').replace(/```/gi, '').trim();
                    const match = rawText.match(/\{[\s\S]*\}/);
                    if (!match) throw new Error("資料格式無法解析");
                    
                    const rawP = JSON.parse(match[0]);
                    
                    const safeAiData = {
                        name: officialName,
                        price: rtData ? rtData.price : String(rawP.price || lastClosePrice),
                        change: rtData ? rtData.change : String(rawP.change || "0"),
                        percent: rtData ? rtData.percent : String(rawP.percent || "0%"),
                        industry: String(rawP.industry || "-"),
                        market: {
                            taiex: String(rawP.market?.taiex || "-"),
                            sox: String(rawP.market?.sox || "-"),
                            nasdaq: String(rawP.market?.nasdaq || "-")
                        },
                        peers: Array.isArray(rawP.peers) ? rawP.peers.map(p => ({
                            name: String(p?.name || "-"),
                            change: String(p?.change || "0")
                        })) : [],
                        valuation: {
                            yield: String(rawP.valuation?.yield || "-"),
                            pb: String(rawP.valuation?.pb || "-"),
                            rating: String(rawP.valuation?.rating || "-"),
                            marketCap: String(rawP.valuation?.marketCap || "-")
                        },
                        growth: {
                            mom: String(rawP.growth?.mom || "-"),
                            yoy: String(rawP.growth?.yoy || "-"),
                            forwardPE: String(rawP.growth?.forwardPE || "-"),
                            grossMargin: String(rawP.growth?.grossMargin || "-")
                        },
                        fund: {
                            eps: String(rawP.fund?.eps || "-"),
                            gross: String(rawP.fund?.gross || "-"),
                            net: String(rawP.fund?.net || "-"),
                            status: String(rawP.fund?.status || "-")
                        },
                        chips: {
                            foreign: String(rawP.chips?.foreign || "-"),
                            trust: String(rawP.chips?.trust || "-"),
                            big: String(rawP.chips?.big || "-"),
                            retail: String(rawP.chips?.retail || "-"),
                            status: String(rawP.chips?.status || "-")
                        },
                        tech: {
                            ma: String(rawP.tech?.ma || "-"),
                            support: String(rawP.tech?.support || "-"),
                            pressure: String(rawP.tech?.pressure || "-")
                        },
                        strategy: {
                            score: Number(rawP.strategy?.score) || 0,
                            conclusion: String(rawP.strategy?.conclusion || "-"),
                            short: String(rawP.strategy?.short || "-"),
                            swing: String(rawP.strategy?.swing || "-"),
                            stop: String(rawP.strategy?.stop || "-")
                        },
                        news: Array.isArray(rawP.news) ? rawP.news.map(n => ({
                            date: String(n?.date || "-"),
                            title: String(n?.title || "-"),
                            impact: String(n?.impact || "-")
                        })) : []
                    };

                    setAiData(safeAiData);
                    localStorage.setItem(cacheKey, JSON.stringify({ timestamp: nowMs, data: safeAiData }));

                } catch (e) { 
                    if (e.message === "RATE_LIMIT" || e.message === "SERVER_BUSY" || e.message.includes("連線逾時")) {
                        const mockData = getMockData(target, lastClosePrice);
                        setAiData(mockData);
                        setError("API 額度限制或伺服器異常。已啟動「離線測試模式」，圖表為真實報價。");
                    } else {
                        if(!isRefresh) setError(`診斷異常：${e.message || "連線不穩定"}`); 
                    }
                } finally { 
                    setAiLoading(false); 
                    setLoading(false);
                    isFetchingRef.current = false;
                }
            }, [customKey, aiModel]);

            useEffect(() => {
                executeAnalysis(stockId);
                refreshTimer.current = setInterval(() => executeAnalysis(stockId, true), 60000);
                return () => clearInterval(refreshTimer.current);
            }, [stockId, executeAnalysis]);

            const saveSettings = () => {

                const cleanModel = aiModel.replace(/[^a-z0-9.-]/gi, '') || 'llama-3.3-70b-versatile';
                localStorage.setItem('groq_api_key', cleanKey);

                                </div>

                            <div className="bg-[#050505] border border-gray-800 rounded shadow-sm">
                                <div className="bg-blue-950/40 border-b border-blue-900/60 p-2 px-3 text-blue-300 font-bold text-xs tracking-widest font-mono">市場聯動分析</div>

                                    <div className="flex justify-between border-b border-gray-800 border-dotted pb-1.5 font-mono tracking-widest">台股大盤 <span className="text-white font-bold">{aiData?.market?.taiex || (aiLoading ? "讀取中" : "---")}</span></div>
                                    <div className="flex justify-between border-b border-gray-800 border-dotted pb-1.5 font-mono tracking-widest">費半指數 <span className="text-white font-bold">{aiData?.market?.sox || (aiLoading ? "讀取中" : "---")}</span></div>

                                </div>

                                    <div className="flex justify-between border-b border-gray-800 border-dotted pb-1.5 font-mono text-gray-500 tracking-tighter">殖利率/股淨比 <span className="text-white font-bold font-mono">{aiData?.valuation?.yield || "---"} / {aiData?.valuation?.pb || "---"}</span></div>

                                    <div className="relative w-full flex-1 min-h-[150px]">

                        <div className="col-span-12 lg:col-span-3 flex flex-col gap-2 overflow-y-auto custom-scrollbar pl-1">
                            <div className="bg-[#050505] border border-gray-800 rounded shadow-sm">
                                <div className="bg-purple-950/40 border-b border-purple-900/60 p-2 px-3 text-purple-300 font-bold text-xs tracking-widest font-mono">籌碼流向分析</div>
                                <div className="p-3 space-y-2 text-xs">
                                    <div className="flex justify-between border-b border-gray-800 border-dotted pb-1.5 font-mono text-gray-500 tracking-tighter">外資動態 <span className="text-white font-bold font-mono">{aiData?.chips?.foreign || "---"}</span></div>
                                    <div className="flex justify-between border-b border-gray-800 border-dotted pb-1.5 font-mono text-gray-500 tracking-tighter">投信動態 <span className="text-blue-400 font-bold font-mono">{aiData?.chips?.trust || "---"}</span></div>
                                    <div className="flex justify-between border-b border-gray-800 border-dotted pb-1.5 font-mono text-gray-500 tracking-tighter text-blue-400">主力持股 <span className="text-white font-black font-mono">{aiData?.chips?.big || "---"}</span></div>
                                    <div className="flex justify-between border-b border-gray-800 border-dotted pb-1.5 font-mono text-gray-500 tracking-tighter text-green-400">散戶持股 <span className="text-white font-bold font-mono">{aiData?.chips?.retail || "---"}</span></div>
                                    <div className="mt-2 text-gray-400 bg-gray-900/50 p-3 border border-gray-800 leading-relaxed text-justify text-[13px] font-medium">{aiData?.chips?.status || (aiLoading ? "正在解析籌碼結構..." : "等待同步")}</div>
                                </div>
                            </div>

                            <div className="bg-[#050505] border border-gray-800 rounded shadow-sm">
                                <div className="bg-orange-950/40 border-b border-orange-900/60 p-2 px-3 flex justify-between items-center text-orange-300 font-bold text-xs tracking-widest font-mono"><span>AI 戰略矩陣</span><span className="text-lg font-black text-white font-mono">{aiData?.strategy?.score || 0} 評分</span></div>
                                <div className="p-3 space-y-2 text-xs">
                                    <div className="bg-gray-900/60 p-3 rounded border border-gray-800 leading-tight"><span className="text-white font-black block mb-2 text-sm font-mono">{aiData?.strategy?.conclusion || (aiLoading ? "計算核心戰略中..." : "等待分析")}</span><span className="text-gray-400 block text-xs tracking-tighter font-bold font-mono">短線操作：{aiData?.strategy?.short || "Analyzing"}</span></div>
                                    <div className="flex justify-between p-2.5 bg-red-950/20 border border-red-900/50 font-mono text-red-400 font-black text-xs tracking-tighter">停損建議 <span className="text-white font-black tracking-widest font-mono text-sm">{aiData?.strategy?.stop || "---"}</span></div>
                                </div>
                            </div>

                            <div className="bg-[#050505] border border-gray-800 rounded flex-1 min-h-[200px] shadow-sm">
                                <div className="bg-yellow-950/40 border-b border-yellow-900/60 p-2 px-3 text-yellow-300 font-bold text-xs tracking-widest font-mono">即時情報新聞</div>
                                <div className="p-2 space-y-2">
                                    {aiData?.news && aiData.news.length > 0 ? (
                                        aiData.news.map((n, i) => (
                                            <a key={i} href={"https://www.google.com/search?q=" + encodeURIComponent(stockId + ' ' + String(n.title)) + "&tbm=nws"} target="_blank" rel="noreferrer" className="block border-b border-gray-800 border-dotted p-2.5 hover:bg-gray-800 transition-all group">
                                                <div className="flex justify-between text-[11px] mb-1.5 font-mono text-gray-500">{n.date} <span className={n.impact === '多' ? 'text-red-500 font-black' : 'text-green-500 font-black'}>{n.impact}</span></div>
                                                <span className="text-gray-200 font-bold text-xs line-clamp-2 leading-relaxed group-hover:text-blue-400 transition-colors">{n.title}</span>
                                            </a>
                                        ))
                                    ) : (
                                        <div className="loading-shimmer h-24 rounded opacity-10 mt-2"></div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </main>

                    <style dangerouslySetInnerHTML={{ __html: `
                        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: #000; }
                        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
                        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }
                        * { scrollbar-width: thin; scrollbar-color: #333 #000; }
                    `}} />
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
