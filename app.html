<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化決策終端 PRO - 機構版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #030303; margin: 0; padding: 0; color: #d1d5db; overflow: hidden; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        #root { height: 100%; width: 100%; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000; border-radius: 2px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }
        * { scrollbar-width: thin; scrollbar-color: #333 #000; }
        
        @keyframes pulseBorder { 0%, 100% { border-color: rgba(220, 38, 38, 0.3); } 50% { border-color: rgba(220, 38, 38, 0.8); } }
        .glass-panel { background: rgba(10, 10, 10, 0.97); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .panel-card { background-color: #050505; border: 1px solid rgba(255,255,255,0.06); border-radius: 0.25rem; }
        .predict-panel { border: 1px solid rgba(220, 38, 38, 0.4); animation: pulseBorder 3s infinite ease-in-out; }
        .chips-panel { border: 1px solid rgba(234, 179, 8, 0.4); }

        /* 響應式字體與間距調整 */
        @media (max-width: 1400px) {
            .responsive-text-sm { font-size: 0.65rem; }
            .responsive-text-base { font-size: 0.75rem; }
            .responsive-text-lg { font-size: 0.875rem; }
            .header-padding { padding: 0.5rem 0.75rem; }
            .panel-padding { padding: 0.5rem; }
            .gap-responsive { gap: 0.25rem; }
        }
        @media (min-width: 1401px) {
            .responsive-text-sm { font-size: 0.75rem; }
            .responsive-text-base { font-size: 0.875rem; }
            .responsive-text-lg { font-size: 1.125rem; }
            .header-padding { padding: 0.75rem 1rem; }
            .panel-padding { padding: 0.75rem; }
            .gap-responsive { gap: 0.5rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        const DEFAULT_GROQ_MODEL = "llama-3.3-70b-versatile";

        // 預設股票名稱對照表 (Fallback)
        const STOCK_NAMES = {
            '2330': '台積電', '2317': '鴻海', '2454': '聯發科', '3481': '群創', 
            '2603': '長榮', '2609': '陽明', '2615': '萬海', '2382': '廣達', '3231': '緯創'
        };

        // ==========================================
        // 核心模組 1：安全資料處理與格式化
        // ==========================================
        const safeNum = (val, fallback = 0) => {
            if (val === null || val === undefined || val === '' || val === '-') return fallback;
            const n = Number(val);
            return (!isNaN(n) && isFinite(n)) ? n : fallback;
        };
        const fmtPrice   = v => (v == null || v === '---') ? '---' : isNaN(+v) ? '---' : (+v).toFixed(2);
        const fmtChange  = v => { if (v == null || isNaN(+v)) return '---'; return +v > 0 ? `+${(+v).toFixed(2)}` : (+v).toFixed(2); };
        const fmtPct     = v => { if (v == null || isNaN(+v)) return '---'; return +v > 0 ? `+${(+v).toFixed(2)}%` : `${(+v).toFixed(2)}%`; };
        const fmtVol     = v => (v == null || isNaN(+v)) ? '0' : Math.round(+v).toLocaleString('en-US');

        // ==========================================
        // 核心模組 2：量化指標運算引擎
        // ==========================================
        const Indicators = {
            ema(data, period) {
                if (!data || data.length === 0) return [];
                const k = 2 / (period + 1);
                let prev = safeNum(data[0]);
                return data.map((v, i) => { if (i === 0) return prev; prev = (safeNum(v) - prev) * k + prev; return prev; });
            },
            rsi(prices, period = 14) {
                if (prices.length <= period) return prices.map(() => 50);
                const out = new Array(prices.length).fill(50);
                let gains = 0, losses = 0;
                for (let i = 1; i <= period; i++) {
                    const d = prices[i] - prices[i - 1];
                    d >= 0 ? gains += d : losses -= d;
                }
                let ag = gains / period, al = losses / period;
                out[period] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
                for (let i = period + 1; i < prices.length; i++) {
                    const d = prices[i] - prices[i - 1];
                    const g = d > 0 ? d : 0, l = d < 0 ? -d : 0;
                    ag = (ag * (period - 1) + g) / period;
                    al = (al * (period - 1) + l) / period;
                    out[i] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
                }
                return out;
            },
            atr(history, period = 14) {
                if (!history || history.length < period) return history.map(() => 0);
                const trs = [0];
                for (let i = 1; i < history.length; i++) {
                    const { high: h, low: l, close: pc } = { high: history[i].high, low: history[i].low, close: history[i - 1].close };
                    trs.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
                }
                const out = new Array(history.length).fill(0);
                out[period] = trs.slice(1, period + 1).reduce((a, b) => a + b, 0) / period;
                for (let i = period + 1; i < history.length; i++) out[i] = (out[i - 1] * (period - 1) + trs[i]) / period;
                return out;
            },
            macd(prices) {
                if (prices.length < 26) return { dif: prices.map(() => 0), dea: prices.map(() => 0), hist: prices.map(() => 0) };
                const ema12 = Indicators.ema(prices, 12);
                const ema26 = Indicators.ema(prices, 26);
                const dif = ema12.map((v, i) => v - ema26[i]);
                const dea = Indicators.ema(dif, 9);
                return { dif, dea, hist: dif.map((v, i) => (v - dea[i]) * 2) };
            },
            kdj(history) {
                if (!history || history.length === 0) return { k: [], d: [], j: [] };
                const ks = [], ds = [], js = [];
                let k = 50, d = 50;
                for (let i = 0; i < history.length; i++) {
                    const slice = history.slice(Math.max(0, i - 8), i + 1);
                    const c = safeNum(history[i].close);
                    const lo = Math.min(...slice.map(h => safeNum(h.low, c)));
                    const hi = Math.max(...slice.map(h => safeNum(h.high, c)));
                    const rsv = hi === lo ? 0 : ((c - lo) / (hi - lo)) * 100;
                    k = (2 / 3) * k + (1 / 3) * rsv;
                    d = (2 / 3) * d + (1 / 3) * k;
                    ks.push(k); ds.push(d); js.push(3 * k - 2 * d);
                }
                return { k: ks, d: ds, j: js };
            }
        };

        // ==========================================
        // 核心模組 3：抗阻塞大逃殺代理引擎
        // ==========================================
        const fetchWithTimeout = async (url, opts = {}, ms = 8000) => {
            const ctrl = new AbortController();
            const tid = setTimeout(() => ctrl.abort(), ms);
            try {
                const res = await fetch(url, { ...opts, signal: ctrl.signal });
                clearTimeout(tid);
                return res;
            } catch (e) { clearTimeout(tid); throw new Error('Timeout'); }
        };

        const fetchFastestProxy = async (url, ms = 7000) => {
            const enc = encodeURIComponent(url);
            const proxies = [
                { url: `https://api.allorigins.win/raw?url=${enc}`, isWrapper: false },
                { url: `https://api.codetabs.com/v1/proxy?quest=${url}`, isWrapper: false },
                { url: `https://corsproxy.io/?${enc}`, isWrapper: false }
            ];

            const ctrls = proxies.map(() => new AbortController());

            try {
                const result = await Promise.any(proxies.map(async (proxyObj, i) => {
                    const tid = setTimeout(() => ctrls[i].abort(), ms);
                    try {
                        const res = await fetch(proxyObj.url, { cache: 'no-store', signal: ctrls[i].signal });
                        clearTimeout(tid);
                        if (!res.ok) throw new Error('Bad Status');
                        const text = await res.text();
                        let json;
                        if (proxyObj.isWrapper) {
                            const parsed = JSON.parse(text);
                            if (!parsed.contents) throw new Error('No contents');
                            json = JSON.parse(parsed.contents);
                        } else {
                            json = JSON.parse(text);
                        }
                        
                        // 嚴格指紋檢查，避免代理伺服器回傳錯誤網頁的 HTML
                        if (json && (json.chart || json.quoteResponse || json.msgArray || json.data)) {
                            return json;
                        }
                        throw new Error('Invalid Payload Structure');
                    } catch (e) {
                        clearTimeout(tid);
                        throw e;
                    }
                }));
                ctrls.forEach(c => { try { c.abort(); } catch (_) {} }); // 結束其他請求
                return result;
            } catch {
                return null;
            }
        };

        // ==========================================
        // 核心模組 4：數據採集與清洗管線
        // ==========================================
        const fetchTWSELive = async (id) => {
            const url = `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_${id}.tw|otc_${id}.tw&json=1&delay=0`;
            try {
                const data = await fetchFastestProxy(url, 4000);
                if (data?.msgArray?.length > 0) {
                    const r = data.msgArray[0];
                    const prevClose = safeNum(r.y);
                    const price = r.z !== '-' ? safeNum(r.z, prevClose) : prevClose;
                    const change = price - prevClose;
                    return {
                        price, change,
                        percent: prevClose ? (change / prevClose) * 100 : 0,
                        open: r.o !== '-' ? safeNum(r.o, price) : price,
                        high: r.h !== '-' ? safeNum(r.h, price) : price,
                        low:  r.l !== '-' ? safeNum(r.l, price) : price,
                        volume: safeNum(r.v),
                        name: r.n || STOCK_NAMES[id] || id
                    };
                }
            } catch {}
            return { name: STOCK_NAMES[id] || id }; // 至少回傳名字
        };

        const fetchHistory = async (id) => {
            const start = new Date();
            start.setFullYear(start.getFullYear() - 1);
            const ds = `${start.getFullYear()}-${String(start.getMonth()+1).padStart(2,'0')}-${String(start.getDate()).padStart(2,'0')}`;
            try {
                // FinMind 官方 API (支援 CORS，免 Proxy)
                const res = await fetchWithTimeout(
                    `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${id}&start_date=${ds}`,
                    {}, 7000
                );
                const json = await res.json();
                if (json.msg === 'success' && json.data?.length > 0) {
                    return json.data.map(d => ({
                        time:   d.date,
                        open:   safeNum(d.open),
                        high:   safeNum(d.max),
                        low:    safeNum(d.min),
                        close:  safeNum(d.close),
                        volume: safeNum(d.Trading_Volume) / 1000 // 轉千股(張)
                    }));
                }
            } catch (e) { console.warn('FinMind failed', e); }
            return [];
        };

        const emptyQuote = (id) => ({
            name: STOCK_NAMES[id] || id,
            price: null, change: null, percent: null,
            open: null, high: null, low: null, volume: null,
            marketCap: '---', pe: '---', pb: '---', yield: '---', forwardPE: '---'
        });

        // ==========================================
        // 主應用程式 App Component
        // ==========================================
        const App = () => {
            const [stockId,      setStockId]      = useState('3481');
            const [currentName,  setCurrentName]  = useState('群創');
            const [inputValue,   setInputValue]   = useState('');
            const [customKey,    setCustomKey]    = useState(() => (localStorage.getItem('api_key_groq') || '').trim());
            const [liveQuote,    setLiveQuote]    = useState(emptyQuote('3481'));
            const [history,      setHistory]      = useState([]);
            
            const [aiData,       setAiData]       = useState(null);
            const [techFeatures, setTechFeatures] = useState(null);
            const [techVersion,  setTechVersion]  = useState(0);
            
            const [isChartLoading, setIsChartLoading] = useState(false);
            const [isAiLoading,    setIsAiLoading]    = useState(false);
            const [statusMsg,      setStatusMsg]      = useState(null);
            const [showSettings,   setShowSettings]   = useState(false);
            const [hoverData,      setHoverData]      = useState(null);

            // 自選追蹤清單狀態
            const [watchlist, setWatchlist] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem('quant_watchlist_pro')) || [
                        { id: '2330', name: '台積電' }, { id: '2454', name: '聯發科' },
                        { id: '2603', name: '長榮' },   { id: '2317', name: '鴻海' }
                    ];
                } catch { return []; }
            });
            const [watchlistQuotes, setWatchlistQuotes] = useState({});
            const [isWatchlistExpanded, setIsWatchlistExpanded] = useState(true);

            const containerRefs = {
                kline: useRef(null), vol: useRef(null),
                macd:  useRef(null), kdj: useRef(null)
            };
            const chartRefs     = useRef({});
            const seriesRefs    = useRef({});
            const chartInited   = useRef(false);
            const fetchGen      = useRef(0);
            const settingsRef   = useRef(null);

            const isWatched = watchlist.some(w => w.id === stockId);
            const toggleWatchlist = () => {
                setWatchlist(prev => {
                    const newList = isWatched ? prev.filter(w => w.id !== stockId) : [...prev, { id: stockId, name: currentName }];
                    localStorage.setItem('quant_watchlist_pro', JSON.stringify(newList));
                    return newList;
                });
            };

            // 自選清單背景輪詢
            useEffect(() => {
                let isActive = true;
                const updateWatchlistQuotes = async () => {
                    if (watchlist.length === 0) return;
                    for (const item of watchlist) {
                        if (!isActive) break;
                        try {
                            const rtData = await fetchTWSELive(item.id);
                            if (rtData && rtData.price !== null) {
                                setWatchlistQuotes(prev => ({
                                    ...prev,
                                    [item.id]: { price: rtData.price, change: rtData.change, percent: rtData.percent }
                                }));
                            }
                        } catch(e){}
                        await new Promise(r => setTimeout(r, 200)); // 避免觸發限流
                    }
                };
                
                updateWatchlistQuotes();
                const interval = setInterval(updateWatchlistQuotes, 8000); 
                return () => { isActive = false; clearInterval(interval); };
            }, [watchlist]);

            // ─── 圖表初始化 ──────────────────────────────────────────────────────────
            const destroyCharts = useCallback(() => {
                Object.values(chartRefs.current).forEach(c => { try { c.remove(); } catch {} });
                chartRefs.current = {};
                seriesRefs.current = {};
                chartInited.current = false;
            }, []);

            const initCharts = useCallback(() => {
                if (!window.LightweightCharts || chartInited.current) return;
                const el = containerRefs.kline.current;
                if (!el || el.clientWidth === 0) return; // 確保容器已渲染

                const w = el.clientWidth;
                const base = {
                    width: w,
                    layout: { background: { color: 'transparent' }, textColor: '#9ca3af', fontSize: 11 },
                    grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } },
                    rightPriceScale: { borderColor: '#374151' },
                    crosshair: { mode: 0 },
                    handleScroll: true, handleScale: true
                };

                const kChart = window.LightweightCharts.createChart(containerRefs.kline.current, { ...base, timeScale: { borderColor: '#374151', fixRightEdge: true } });
                const kSeries   = kChart.addCandlestickSeries({ upColor: '#ef4444', downColor: '#22c55e', borderVisible: false, wickUpColor: '#ef4444', wickDownColor: '#22c55e' });
                const ma5Series = kChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const ma20Series= kChart.addLineSeries({ color: '#60a5fa', lineWidth: 1.5, crosshairMarkerVisible: false });

                const vChart  = window.LightweightCharts.createChart(containerRefs.vol.current,  { ...base, timeScale: { visible: false } });
                const vSeries = vChart.addHistogramSeries({ color: '#3b82f6', priceFormat: { type: 'volume' } });

                const mChart = window.LightweightCharts.createChart(containerRefs.macd.current, { ...base, timeScale: { visible: false } });
                const mDif   = mChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const mDea   = mChart.addLineSeries({ color: '#60a5fa', lineWidth: 1.5, crosshairMarkerVisible: false });
                const mHist  = mChart.addHistogramSeries();

                const kjChart = window.LightweightCharts.createChart(containerRefs.kdj.current, { ...base, timeScale: { visible: false } });
                const kjK = kjChart.addLineSeries({ color: '#f8fafc', lineWidth: 1.5, crosshairMarkerVisible: false });
                const kjD = kjChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const kjJ = kjChart.addLineSeries({ color: '#d946ef', lineWidth: 1.5, crosshairMarkerVisible: false });

                chartRefs.current   = { kChart, vChart, mChart, kjChart };
                seriesRefs.current  = { kSeries, ma5Series, ma20Series, vSeries, mDif, mDea, mHist, kjK, kjD, kjJ };
                chartInited.current = true;

                // 同步時間軸縮放
                kChart.timeScale().subscribeVisibleLogicalRangeChange(r => {
                    if (r) [vChart, mChart, kjChart].forEach(c => c.timeScale().setVisibleLogicalRange(r));
                });

                const ro = new ResizeObserver(() => {
                    const nw = containerRefs.kline.current?.clientWidth;
                    if (nw) Object.values(chartRefs.current).forEach(c => c.applyOptions({ width: nw }));
                });
                ro.observe(containerRefs.kline.current);
            }, []);

            // ─── 合併歷史與即時報價，並嚴格去重 ──────────────────────────────────────
            const chartData = useMemo(() => {
                if (!history.length) return [];
                
                // 使用 Map 確保時間序列唯一性 (去重)
                const dataMap = new Map();
                history.forEach(d => dataMap.set(d.time, d));

                // 若有最新報價，覆蓋或新增當日 K 棒
                if (liveQuote.price) {
                    const now = new Date();
                    const twUtc = now.getTime() + (now.getTimezoneOffset() * 60000) + (8 * 3600000);
                    const twDate = new Date(twUtc);
                    const today = `${twDate.getFullYear()}-${String(twDate.getMonth()+1).padStart(2,'0')}-${String(twDate.getDate()).padStart(2,'0')}`;
                    
                    if (dataMap.has(today)) {
                        const last = dataMap.get(today);
                        last.close  = liveQuote.price;
                        last.high   = Math.max(last.high, liveQuote.price);
                        last.low    = liveQuote.low ? Math.min(last.low, liveQuote.low) : last.low;
                        last.volume = Math.max(last.volume, liveQuote.volume || 0);
                    } else {
                        dataMap.set(today, {
                            time: today,
                            open:   liveQuote.open  || liveQuote.price,
                            high:   liveQuote.high  || liveQuote.price,
                            low:    liveQuote.low   || liveQuote.price,
                            close:  liveQuote.price,
                            volume: liveQuote.volume || 0
                        });
                    }
                }
                
                // 轉回陣列並排序
                return Array.from(dataMap.values()).sort((a, b) => a.time.localeCompare(b.time));
            }, [history, liveQuote]);

            // ─── 圖表渲染與特徵萃取 ──────────────────────────────────────────────────
            useEffect(() => {
                if (!chartData.length) return;
                
                // 確保容器有寬度才繪圖
                if (!containerRefs.kline.current || containerRefs.kline.current.clientWidth === 0) return;
                if (!chartInited.current) initCharts();
                
                const s = seriesRefs.current;
                if (!s.kSeries) return;

                const closes = chartData.map(d => d.close);
                const ma5    = Indicators.ema(closes, 5);
                const ma20   = Indicators.ema(closes, 20);
                const rsiArr = Indicators.rsi(closes, 14);
                const atrArr = Indicators.atr(chartData, 14);
                const { dif, dea, hist } = Indicators.macd(closes);
                const { k, d, j } = Indicators.kdj(chartData);

                const enriched = chartData.map((item, i) => ({
                    ...item, ma5: ma5[i], ma20: ma20[i],
                    rsi: rsiArr[i], atr: atrArr[i],
                    dif: dif[i], dea: dea[i], macd: hist[i],
                    k: k[i], d: d[i], j: j[i]
                }));

                // Crosshair hover
                chartRefs.current.kChart.subscribeCrosshairMove(param => {
                    const found = param.time ? enriched.find(e => e.time === param.time) : null;
                    setHoverData(found || enriched[enriched.length - 1]);
                });
                setHoverData(enriched[enriched.length - 1]);

                // 萃取最新特徵供 AI 使用
                const latest = enriched[enriched.length - 1];
                const newFeatures = {
                    atr:  latest.atr.toFixed(2),
                    rsi:  latest.rsi.toFixed(2),
                    macd: { dif: latest.dif.toFixed(2), dea: latest.dea.toFixed(2) },
                    kdj:  { j: latest.j.toFixed(2) }
                };
                setTechFeatures(newFeatures);
                setTechVersion(v => v + 1);

                // 強制在下一個重繪週期寫入資料，避免阻塞
                requestAnimationFrame(() => {
                    try {
                        s.kSeries.setData(chartData);
                        s.ma5Series.setData(chartData.map((d, i) => ({ time: d.time, value: safeNum(ma5[i]) })));
                        s.ma20Series.setData(chartData.map((d, i) => ({ time: d.time, value: safeNum(ma20[i]) })));
                        s.vSeries.setData(chartData.map(d => ({ time: d.time, value: safeNum(d.volume), color: d.close >= d.open ? 'rgba(239,68,68,0.6)' : 'rgba(34,197,94,0.6)' })));
                        s.mDif.setData(chartData.map((d, i) => ({ time: d.time, value: safeNum(dif[i]) })));
                        s.mDea.setData(chartData.map((d, i) => ({ time: d.time, value: safeNum(dea[i]) })));
                        s.mHist.setData(chartData.map((d, i) => ({ time: d.time, value: safeNum(hist[i]), color: hist[i] >= 0 ? '#ef4444' : '#22c55e' })));
                        s.kjK.setData(chartData.map((d, i) => ({ time: d.time, value: safeNum(k[i], 50) })));
                        s.kjD.setData(chartData.map((d, i) => ({ time: d.time, value: safeNum(d[i], 50) })));
                        s.kjJ.setData(chartData.map((d, i) => ({ time: d.time, value: safeNum(j[i], 50) })));
                    } catch (e) { console.warn('Chart setData error:', e); }
                });
            }, [chartData, initCharts]);

            // ─── 資料載入與防呆備援 ──────────────────────────────────────────────────
            useEffect(() => {
                const gen = ++fetchGen.current;

                setLiveQuote(emptyQuote(stockId));
                setHistory([]);
                setAiData(null);
                setTechFeatures(null);
                setStatusMsg(null);
                destroyCharts();
                setIsChartLoading(true);

                let isTwseDone = false;

                // 1. 即時報價
                fetchTWSELive(stockId).then(q => {
                    if (fetchGen.current !== gen) return;
                    isTwseDone = true;
                    if (q) {
                        if (q.name) setCurrentName(q.name);
                        const { name, ...quote } = q;
                        setLiveQuote(prev => ({ ...prev, ...quote }));
                    }
                });

                // 2. 歷史資料 (若 TWSE 太慢，以歷史最後一筆強行補上現價)
                fetchHistory(stockId).then(rows => {
                    if (fetchGen.current !== gen) return;
                    if (rows.length > 0) {
                        setHistory(rows);
                        if (!isTwseDone) {
                            const last = rows[rows.length - 1];
                            setLiveQuote(prev => {
                                if (prev.price === null) {
                                    return { ...prev, price: last.close, open: last.open, high: last.high, low: last.low, volume: last.volume };
                                }
                                return prev;
                            });
                        }
                    } else {
                        setStatusMsg('歷史資料載入失敗，圖表無法顯示');
                    }
                    setIsChartLoading(false);
                }).catch(() => {
                    if (fetchGen.current !== gen) return;
                    setStatusMsg('歷史資料載入失敗');
                    setIsChartLoading(false);
                });

            }, [stockId, destroyCharts]);

            // ─── AI 預測引擎 ────────────────────────────────────────────────────────
            useEffect(() => {
                if (!techFeatures || !customKey || !liveQuote.price) return;
                const gen = fetchGen.current;
                let cancelled = false;

                const run = async () => {
                    setIsAiLoading(true);
                    setAiData(null);
                    try {
                        const prompt = `你是一名頂級機構的量化交易工程師。請根據以下參數計算並預測台股 [${stockId}] 次日的走勢，並推算籌碼與基本面。
【當前特徵】現價: ${liveQuote.price}, 波動率 ATR(14): ${techFeatures.atr}, 動能 RSI(14): ${techFeatures.rsi}, MACD DIF: ${techFeatures.macd.dif}, MACD DEA: ${techFeatures.macd.dea}, KDJ J值: ${techFeatures.kdj.j}。
【任務限制】
1. 計算明日的預估開盤價與收盤價（必須是數字）。
2. 根據特徵，撰寫 100 字以上的「open_analysis (盤前開盤分析)」，需涵蓋高開/低開可能與早盤應對策略。
3. 根據公司現況與大盤動態，推估「基本面與總體經濟 (market)」，必須填寫所有空缺數值(如市值、本益比、大盤狀態等)，嚴禁留空。
4. 推估籌碼動向 (chips)：主力、機構、散戶動態，並給出 0~100 的多空指標 (bull_bear_index，>50偏多)。
5. 設定第一停利目標價 (TP1) 與嚴格停損價 (SL)（必須是數字）。
6. 只能輸出純 JSON，嚴禁任何 markdown 標記。
格式：{"prediction":{"open":"","close":"","open_analysis":"","prob":{"up":0,"flat":0,"down":0},"targets":{"tp1":"","sl":""}},"market":{"taiex":"","sox":"","marketCap":"","pe":""},"chips":{"big_player":"","institution":"","retail":"","bull_bear_index":0},"strategy":{"score":0,"conclusion":""}}`;

                        const res = await fetchWithTimeout('https://api.groq.com/openai/v1/chat/completions', {
                            method: 'POST',
                            headers: { Authorization: `Bearer ${customKey}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                model: DEFAULT_GROQ_MODEL,
                                messages: [
                                    { role: 'system', content: 'You are a quantitative analysis engine. You must output valid JSON ONLY. No markdown formatting.' },
                                    { role: 'user', content: prompt }
                                ],
                                response_format: { type: 'json_object' }
                            })
                        }, 25000);

                        if (cancelled || fetchGen.current !== gen) return;
                        if (!res.ok) throw new Error(`Groq ${res.status}`);

                        const data = await res.json();
                        const raw  = data.choices?.[0]?.message?.content;
                        if (!raw) throw new Error('空回應');

                        const jsonStr = raw.match(/\{[\s\S]*\}/)?.[0] || raw;
                        const parsed  = JSON.parse(jsonStr);
                        if (!cancelled) setAiData(parsed);
                    } catch (e) {
                        if (!cancelled) setStatusMsg(`AI 預測失敗：${e.message}`);
                    } finally {
                        if (!cancelled) setIsAiLoading(false);
                    }
                };
                run();
                return () => { cancelled = true; };
            // eslint-disable-next-line react-hooks/exhaustive-deps
            }, [techVersion, customKey]);

            const handleSearch = () => {
                const v = inputValue.trim();
                if (v && v !== stockId) { setStockId(v); setInputValue(''); }
            };

            useEffect(() => {
                if (!showSettings) return;
                const handler = (e) => { if (settingsRef.current && !settingsRef.current.contains(e.target)) setShowSettings(false); };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, [showSettings]);

            const saveKey = () => {
                localStorage.setItem('api_key_groq', customKey);
                setShowSettings(false);
                setTechVersion(v => v + 1);
            };

            const isUp = liveQuote.change >= 0;

            return (
                <div className="min-h-screen bg-[#030303] text-gray-200 font-sans p-1 lg:p-2 flex flex-col" style={{ height: '100vh' }}>
                    {/* Header */}
                    <header className="flex-none flex justify-between items-center mb-1 lg:mb-2 bg-[#0a0a0a] header-padding border border-gray-800 rounded shadow-xl">
                        <div className="flex items-center gap-3">
                            <h1 className="responsive-text-lg font-bold text-white tracking-tighter">
                                {currentName}
                                <span className="text-blue-500 font-mono responsive-text-sm ml-2">{stockId}</span>
                            </h1>
                            <div className="h-5 w-px bg-gray-700"></div>
                            <span className={`text-2xl lg:text-3xl font-black font-mono ${isUp ? 'text-red-500' : 'text-green-500'}`}>
                                {liveQuote.price ? fmtPrice(liveQuote.price) : '---'}
                            </span>
                            <div className={`flex flex-col responsive-text-sm font-bold font-mono ${isUp ? 'text-red-500' : 'text-green-500'}`}>
                                <span>{fmtChange(liveQuote.change)}</span>
                                <span>{fmtPct(liveQuote.percent)}</span>
                            </div>
                        </div>
                        <div className="flex gap-2 items-center">
                            {isChartLoading && <span className="responsive-text-sm text-gray-500 animate-pulse hidden sm:inline">資料載入中…</span>}
                            
                            <button onClick={toggleWatchlist} className={`px-2 py-1 responsive-text-sm font-bold rounded transition-colors border hidden sm:block ${isWatched ? 'bg-yellow-900/40 border-yellow-700 text-yellow-300' : 'bg-gray-800 border-gray-600 text-gray-400 hover:bg-gray-700 hover:text-white'}`}>
                                {isWatched ? '取消追蹤' : '加入追蹤'}
                            </button>

                            <input
                                type="text" value={inputValue}
                                onChange={e => setInputValue(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && handleSearch()}
                                placeholder="輸入代號"
                                className="w-24 lg:w-32 bg-[#111] border border-gray-700 px-2 py-1 responsive-text-sm rounded text-white outline-none"
                            />
                            <button onClick={handleSearch} className="bg-blue-900 border border-blue-700 px-3 py-1 responsive-text-sm font-bold rounded text-white hover:bg-blue-800">查詢</button>
                            <button onClick={() => setShowSettings(s => !s)} className="bg-gray-800 border border-gray-600 px-3 py-1 responsive-text-sm font-bold rounded text-white hover:bg-gray-700">Groq 設定</button>
                        </div>
                    </header>

                    {showSettings && (
                        <div ref={settingsRef} className="absolute top-16 right-4 z-[100] w-80 p-4 glass-panel rounded shadow-2xl">
                            <h3 className="responsive-text-sm font-bold text-blue-400 mb-2 uppercase tracking-widest">Groq API 配置</h3>
                            <p className="text-[10px] text-gray-500 mb-2">免費申請：console.groq.com</p>
                            <input
                                type="password" value={customKey}
                                onChange={e => setCustomKey(e.target.value)}
                                placeholder="gsk_..."
                                className="w-full bg-black border border-gray-700 p-2 text-xs rounded font-mono mb-3 text-white outline-none"
                            />
                            <button onClick={saveKey} className="w-full bg-blue-600 text-white py-1.5 responsive-text-sm font-bold rounded hover:bg-blue-700">儲存並重啟預測引擎</button>
                        </div>
                    )}

                    {statusMsg && (
                        <div className="flex-none bg-red-900/30 border border-red-500 text-red-300 responsive-text-sm p-1.5 mb-1 rounded flex justify-between items-center">
                            <span>{statusMsg}</span>
                            <button onClick={() => setStatusMsg(null)} className="ml-2 text-red-400 hover:text-white">✕</button>
                        </div>
                    )}

                    <main className="flex-1 grid grid-cols-12 gap-1 lg:gap-2 overflow-hidden min-h-0">
                        {/* 左側面板 (預測與籌碼) */}
                        <div className="col-span-12 lg:col-span-3 flex flex-col gap-1 lg:gap-2 overflow-y-auto custom-scrollbar pr-1 min-h-0">
                            {/* Groq 預測 */}
                            <div className="panel-card predict-panel panel-padding bg-red-950/10 flex flex-col gap-2 relative overflow-hidden">
                                <div className="text-red-500 font-bold responsive-text-sm tracking-widest border-b border-red-900/50 pb-1">
                                    GROQ 價格預測模型
                                </div>
                                {!customKey ? (
                                    <div className="text-center py-2 text-gray-500 responsive-text-sm">請先設定 Groq API 金鑰</div>
                                ) : isAiLoading ? (
                                    <div className="text-center py-2 text-red-400 responsive-text-sm animate-pulse">模型推理中…</div>
                                ) : (
                                    <>
                                        <div className="flex justify-between gap-1">
                                            {[['明日開盤預估', aiData?.prediction?.open], ['明日收盤預估', aiData?.prediction?.close]].map(([label, val]) => (
                                                <div key={label} className="flex-1 bg-black/60 border border-red-900/30 rounded p-1.5 text-center">
                                                    <div className="text-[10px] lg:text-xs text-gray-500 mb-0.5">{label}</div>
                                                    <div className="text-base lg:text-lg font-mono font-black text-white">{val || '---'}</div>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="bg-black/40 border border-gray-800 rounded p-1.5">
                                            <div className="text-[10px] text-gray-400 mb-1">機率分佈預估</div>
                                            <div className="h-1.5 w-full bg-gray-800 rounded flex overflow-hidden">
                                                <div style={{ width: `${aiData?.prediction?.prob?.up || 0}%` }} className="bg-red-500 transition-all duration-700"></div>
                                                <div style={{ width: `${aiData?.prediction?.prob?.flat || 0}%` }} className="bg-gray-400 transition-all duration-700"></div>
                                                <div style={{ width: `${aiData?.prediction?.prob?.down || 0}%` }} className="bg-green-500 transition-all duration-700"></div>
                                            </div>
                                            <div className="flex justify-between text-[9px] mt-1 font-mono">
                                                <span className="text-red-400">漲 {aiData?.prediction?.prob?.up ?? '--'}%</span>
                                                <span className="text-gray-400">盤 {aiData?.prediction?.prob?.flat ?? '--'}%</span>
                                                <span className="text-green-400">跌 {aiData?.prediction?.prob?.down ?? '--'}%</span>
                                            </div>
                                        </div>

                                        <div className="flex flex-col gap-0.5 text-[10px] lg:text-xs font-mono border-t border-red-900/30 pt-1">
                                            <div className="flex justify-between">
                                                <span className="text-gray-400">目標一 (TP1)</span>
                                                <span className="text-red-400 font-bold">{aiData?.prediction?.targets?.tp1 || '---'}</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="text-gray-400">停損線 (SL)</span>
                                                <span className="text-green-400 font-bold">{aiData?.prediction?.targets?.sl || '---'}</span>
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>

                            {/* AI 籌碼與多空 */}
                            <div className="panel-card chips-panel bg-[#050505] flex-none">
                                <div className="bg-yellow-950/20 border-b border-yellow-900/30 p-1.5 px-2 flex justify-between items-center">
                                    <span className="text-yellow-500 font-bold text-[10px] lg:text-xs tracking-widest uppercase">籌碼與多空 (AI 推估)</span>
                                    {aiData?.chips?.bull_bear_index != null && (
                                        <div className={`text-[10px] font-black px-1.5 py-0.5 rounded ${aiData.chips.bull_bear_index > 50 ? 'bg-red-900/50 text-red-400' : 'bg-green-900/50 text-green-400'}`}>
                                            多空指標: {aiData.chips.bull_bear_index}
                                        </div>
                                    )}
                                </div>
                                <div className="p-2 space-y-1.5 text-[10px] lg:text-xs font-mono">
                                    {isAiLoading ? <div className="text-center text-gray-500 py-1">運算中…</div> : (
                                        <>
                                            <div className="flex justify-between border-b border-gray-800 pb-0.5"><span className="text-gray-500">主力動向</span><span className="text-white">{aiData?.chips?.big_player || '---'}</span></div>
                                            <div className="flex justify-between border-b border-gray-800 pb-0.5"><span className="text-gray-500">機構法人</span><span className="text-blue-400">{aiData?.chips?.institution || '---'}</span></div>
                                            <div className="flex justify-between pb-0.5"><span className="text-gray-500">散戶情緒</span><span className="text-yellow-400">{aiData?.chips?.retail || '---'}</span></div>
                                        </>
                                    )}
                                </div>
                            </div>

                            {/* 技術特徵 */}
                            <div className="panel-card bg-[#050505]">
                                <div className="bg-blue-950/20 border-b border-gray-800 p-1.5 px-2">
                                    <span className="text-blue-400 font-bold text-[10px] tracking-widest uppercase">技術特徵 (Tech Features)</span>
                                </div>
                                <div className="p-2 grid grid-cols-2 gap-1 text-[10px] lg:text-xs font-mono">
                                    {[
                                        ['ATR(14)', techFeatures?.atr, 'text-yellow-400'],
                                        ['RSI(14)', techFeatures?.rsi, 'text-white'],
                                        ['MACD.DIF', techFeatures?.macd?.dif, 'text-white'],
                                        ['KDJ.J', techFeatures?.kdj?.j, 'text-pink-400']
                                    ].map(([label, val, cls]) => (
                                        <div key={label} className="flex justify-between border-b border-gray-800 border-dotted pb-0.5">
                                            <span className="text-gray-500">{label}</span>
                                            <span className={cls}>{val ?? '--'}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* 基本面 */}
                            <div className="panel-card bg-[#050505] flex-1">
                                <div className="bg-slate-900/40 border-b border-gray-800 p-1.5 px-2">
                                    <span className="text-gray-300 font-bold text-[10px] tracking-widest uppercase">基本面與估值</span>
                                </div>
                                <div className="p-2 space-y-1.5 text-[10px] lg:text-xs font-mono">
                                    {[
                                        ['總市值', aiData?.market?.marketCap || liveQuote.marketCap, 'text-white'],
                                        ['本益比 (PE)', aiData?.market?.pe || liveQuote.pe, 'text-yellow-400'],
                                        ['殖利率', liveQuote.yield, 'text-white'],
                                        ['股淨比 (PB)', liveQuote.pb, 'text-white']
                                    ].map(([label, val, cls]) => (
                                        <div key={label} className="flex justify-between border-b border-gray-800 pb-0.5">
                                            <span className="text-gray-500">{label}</span>
                                            <span className={cls}>{val}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* 中間圖表區 */}
                        <div className="col-span-12 lg:col-span-6 flex flex-col border border-gray-800 bg-[#050505] rounded overflow-hidden min-h-[300px] lg:min-h-0">
                            <div className="bg-gray-900/50 p-1.5 flex flex-wrap gap-2 lg:gap-3 text-[9px] lg:text-[10px] font-mono border-b border-gray-800 text-gray-400 flex-none">
                                <span>開:<span className="text-gray-200">{fmtPrice(hoverData?.open)}</span></span>
                                <span>高:<span className="text-red-400">{fmtPrice(hoverData?.high)}</span></span>
                                <span>低:<span className="text-green-400">{fmtPrice(hoverData?.low)}</span></span>
                                <span>收:<span className="text-white font-bold">{fmtPrice(hoverData?.close)}</span></span>
                                <span>量:<span className="text-blue-400">{fmtVol(hoverData?.volume)}</span></span>
                                <span className="ml-auto text-[8px] lg:text-[9px] text-gray-600 hidden sm:inline">MA5:<span className="text-yellow-400 ml-1">{fmtPrice(hoverData?.ma5)}</span> MA20:<span className="text-blue-400 ml-1">{fmtPrice(hoverData?.ma20)}</span></span>
                            </div>
                            <div className="flex-1 flex flex-col min-h-0">
                                <div ref={containerRefs.kline} className="w-full" style={{ flex: 3 }}></div>
                                <div ref={containerRefs.vol}  className="w-full border-t border-gray-900" style={{ flex: 1 }}></div>
                                <div ref={containerRefs.macd} className="w-full border-t border-gray-900" style={{ flex: 1 }}></div>
                                <div ref={containerRefs.kdj}  className="w-full border-t border-gray-900" style={{ flex: 1 }}></div>
                            </div>
                        </div>

                        {/* 右側面板 (戰略與清單) */}
                        <div className="col-span-12 lg:col-span-3 flex flex-col gap-1 lg:gap-2 overflow-y-auto custom-scrollbar pl-1 min-h-0">
                            {/* 追蹤清單 */}
                            <div className="panel-card bg-[#050505] flex-none">
                                <div className="bg-[#1a1500] border-b border-gray-800 p-1.5 px-2 flex justify-between items-center cursor-pointer hover:bg-[#2a2200] transition-colors" onClick={() => setIsWatchlistExpanded(!isWatchlistExpanded)}>
                                    <span className="text-yellow-500 font-bold text-[10px] lg:text-xs tracking-widest uppercase">自選追蹤清單</span>
                                    <span className="text-gray-500 text-[10px]" style={{ transform: isWatchlistExpanded ? 'rotate(0deg)' : 'rotate(180deg)' }}>▲</span>
                                </div>
                                <div className={`transition-all duration-300 ease-in-out overflow-hidden ${isWatchlistExpanded ? 'max-h-[250px] opacity-100' : 'max-h-0 opacity-0'}`}>
                                    <div className="p-1 flex flex-col gap-1 overflow-y-auto custom-scrollbar" style={{ maxHeight: '200px' }}>
                                        {watchlist.length > 0 ? watchlist.map((item) => {
                                            const q = watchlistQuotes[item.id];
                                            const isWUp = q && parseFloat(q.change) >= 0;
                                            const cClass = !q ? 'text-gray-500' : isWUp ? 'text-red-500' : 'text-green-500';
                                            return (
                                                <div key={item.id} onClick={() => { setStockId(item.id); setInputValue(''); }} className={`flex justify-between items-center p-1.5 rounded cursor-pointer transition-colors border ${stockId === item.id ? 'bg-gray-800/80 border-gray-600' : 'bg-transparent border-transparent hover:bg-gray-900'}`}>
                                                    <div className="flex flex-col">
                                                        <span className="text-white font-bold text-[10px] lg:text-xs">{item.name}</span>
                                                        <span className="text-gray-600 font-mono text-[9px]">{item.id}</span>
                                                    </div>
                                                    <div className="flex flex-col items-end font-mono">
                                                        <span className={`font-bold text-[10px] lg:text-xs ${cClass}`}>{q ? fmtPrice(q.price) : '---'}</span>
                                                        <span className={`text-[9px] ${cClass}`}>{q ? fmtPct(q.percent) : '---'}</span>
                                                    </div>
                                                </div>
                                            );
                                        }) : <span className="text-gray-600 text-[10px] p-2 text-center block">無追蹤標的</span>}
                                    </div>
                                </div>
                            </div>

                            <div className="panel-card bg-[#050505] flex-none">
                                <div className="bg-orange-950/20 border-b border-gray-800 p-1.5 px-2 flex justify-between items-center">
                                    <span className="text-orange-400 font-bold text-[10px] uppercase">AI 戰略矩陣</span>
                                    {aiData?.strategy?.score != null && (
                                        <span className="text-white font-black text-xs lg:text-sm">{aiData.strategy.score} 分</span>
                                    )}
                                </div>
                                <div className="p-2 text-[10px] lg:text-xs text-gray-300 leading-relaxed min-h-[40px]">
                                    {isAiLoading ? <span className="text-gray-500 animate-pulse">分析中…</span> : (aiData?.strategy?.conclusion || <span className="text-gray-600">等待數據…</span>)}
                                </div>
                            </div>

                            <div className="panel-card bg-[#050505] flex-1 flex flex-col">
                                <div className="bg-blue-950/20 border-b border-gray-800 p-1.5 px-2">
                                    <span className="text-blue-400 font-bold text-[10px] uppercase">AI 盤前開盤分析</span>
                                </div>
                                <div className="p-2 text-[10px] lg:text-xs text-gray-300 leading-relaxed overflow-y-auto custom-scrollbar flex-1 text-justify">
                                    {isAiLoading ? <span className="text-gray-500 animate-pulse">撰寫報告中…</span> : (aiData?.prediction?.open_analysis || <span className="text-gray-600">等待模型輸出…</span>)}
                                </div>
                            </div>

                            <div className="panel-card bg-[#050505] flex-none">
                                <div className="bg-cyan-950/20 border-b border-gray-800 p-1.5 px-2">
                                    <span className="text-cyan-400 font-bold text-[10px] uppercase">總體聯動</span>
                                </div>
                                <div className="p-2 text-[10px] lg:text-xs space-y-1 font-mono">
                                    <div className="flex justify-between border-b border-gray-800 pb-0.5"><span className="text-gray-500">大盤狀態 (加權)</span><span className="text-white truncate max-w-[120px] text-right">{aiData?.market?.taiex || '---'}</span></div>
                                    <div className="flex justify-between"><span className="text-gray-500">費半狀態 (SOX)</span><span className="text-white truncate max-w-[120px] text-right">{aiData?.market?.sox || '---'}</span></div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
