<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化決策終端 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #030303; margin: 0; padding: 0; color: #d1d5db; overflow: hidden; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        #root { height: 100%; width: 100%; }
        
        /* 訂製流暢滾動條 */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }
        * { scrollbar-width: thin; scrollbar-color: #333 transparent; }
        :-webkit-full-screen { background-color: #030303; }
        
        /* 進階動畫定義 */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes glowPulse { 0%, 100% { box-shadow: 0 0 10px rgba(37, 99, 235, 0.1); border-color: rgba(37, 99, 235, 0.2); } 50% { box-shadow: 0 0 25px rgba(37, 99, 235, 0.3); border-color: rgba(37, 99, 235, 0.5); } }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* 動畫類別 */
        .animate-fade-up { opacity: 0; animation: fadeInUp 0.5s ease-out forwards; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .delay-50 { animation-delay: 50ms; }
        .delay-100 { animation-delay: 100ms; }
        .delay-150 { animation-delay: 150ms; }
        .delay-200 { animation-delay: 200ms; }
        .header-glow { animation: glowPulse 3s infinite ease-in-out; }
        
        .loading-shimmer { background: linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.02) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite linear; }
        .glass-panel { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .panel-card { background-color: #0a0a0a; border: 1px solid rgba(255,255,255,0.06); border-radius: 0.75rem; box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.5); transition: border-color 0.3s ease; }
        .panel-card:hover { border-color: rgba(255,255,255,0.15); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- 技術指標運算核心 ---
        const Indicators = {
            ema: (data, period) => {
                if (!data || data.length === 0) return [];
                const k = 2 / (period + 1);
                let emaVal = data[0];
                return data.map(val => (emaVal = (val - emaVal) * k + emaVal));
            },
            calculateMACD: (closePrices) => {
                if (!closePrices || closePrices.length < 26) return { dif: [], dea: [], macd: [] };
                const ema12 = Indicators.ema(closePrices, 12);
                const ema26 = Indicators.ema(closePrices, 26);
                const dif = ema12.map((v, i) => v - ema26[i]);
                const dea = Indicators.ema(dif, 9);
                const macd = dif.map((v, i) => (v - dea[i]) * 2);
                return { dif, dea, macd };
            },
            calculateKDJ: (history) => {
                if (!history || history.length === 0) return { k: [], d: [], j: [] };
                const period = 9;
                const ks = [], ds = [], js = [];
                let k = 50, d = 50;
                for (let i = 0; i < history.length; i++) {
                    const start = Math.max(0, i - period + 1);
                    const slice = history.slice(start, i + 1);
                    const low = Math.min(...slice.map(data => data.low));
                    const high = Math.max(...slice.map(data => data.high));
                    const rsv = high === low ? 0 : ((history[i].close - low) / (high - low)) * 100;
                    k = (2/3)*k + (1/3)*rsv; d = (2/3)*d + (1/3)*k;
                    js.push(3*k - 2*d); ks.push(k); ds.push(d);
                }
                return { k: ks, d: ds, j: js };
            }
        };

        const aggregateWeekly = (dailyData) => {
            const weekly = [];
            if (!dailyData.length) return weekly;
            const getWeek = (s) => {
                const d = new Date(s);
                d.setDate(d.getDate() + 4 - (d.getDay() || 7));
                return `${d.getFullYear()}-W${Math.ceil((((d-new Date(d.getFullYear(),0,1))/864e5)+1)/7).toString().padStart(2,'0')}`;
            };
            let curW = null, wc = null;
            dailyData.forEach(d => {
                const wk = getWeek(d.time);
                if (wk !== curW) {
                    if (wc) weekly.push(wc);
                    curW = wk; wc = { ...d };
                } else {
                    wc.high = Math.max(wc.high, d.high); wc.low = Math.min(wc.low, d.low);
                    wc.close = d.close; wc.volume += d.volume;
                }
            });
            if (wc) weekly.push(wc);
            return weekly;
        };

        // --- 全新高穩定度 Yahoo 歷史報價引擎 (取代 FinMind) ---
        const fetchHistoryYahoo = async (target) => {
            const timestamp = Date.now();
            const proxies = [
                `https://api.allorigins.win/get?url=`,
                `https://corsproxy.io/?`
            ];
            
            for (let ext of ['.TW', '.TWO']) {
                const url = encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${target}${ext}?interval=1d&range=1y&_t=${timestamp}`);
                for (let proxy of proxies) {
                    try {
                        const res = await fetch(`${proxy}${url}`, { cache: 'no-store' });
                        if (!res.ok) continue;
                        let data = await res.json();
                        if (proxy.includes('allorigins')) {
                            if (!data.contents) continue;
                            data = JSON.parse(data.contents);
                        }
                        if (data.chart?.error) continue;
                        
                        const result = data.chart.result[0];
                        const timestamps = result.timestamp;
                        const quote = result.indicators.quote[0];
                        if (!timestamps || !quote) continue;
                        
                        const history = [];
                        const seenDates = new Set();
                        
                        for (let i = 0; i < timestamps.length; i++) {
                            if (quote.close[i] === null || quote.open[i] === null) continue;
                            const d = new Date(timestamps[i] * 1000);
                            const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                            
                            if (seenDates.has(dateStr)) continue;
                            seenDates.add(dateStr);
                            
                            history.push({
                                time: dateStr,
                                open: Number(quote.open[i]),
                                high: Number(quote.high[i]),
                                low: Number(quote.low[i]),
                                close: Number(quote.close[i]),
                                volume: Number(quote.volume[i])
                            });
                        }
                        if (history.length > 0) return history;
                    } catch(e) { console.warn("History Proxy Failed", e); }
                }
            }
            return [];
        };

        // --- 多重代理備援 Yahoo 即時報價引擎 ---
        const fetchRealTimeYahoo = async (target) => {
            const timestamp = Date.now();
            const url = `https://query2.finance.yahoo.com/v7/finance/quote?symbols=${target}.TW,${target}.TWO&_t=${timestamp}`;

            const proxies = [
                { url: `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&disableCache=true`, type: 'wrapped' },
                { url: `https://corsproxy.io/?${encodeURIComponent(url)}`, type: 'direct' }
            ];

            for (const proxy of proxies) {
                try {
                    const res = await fetch(proxy.url, { cache: 'no-store' });
                    if (!res.ok) continue;

                    let parsed;
                    if (proxy.type === 'wrapped') {
                        const data = await res.json();
                        if (!data.contents) continue;
                        parsed = JSON.parse(data.contents);
                    } else {
                        parsed = await res.json();
                    }

                    const result = parsed.quoteResponse?.result?.find(r => r.regularMarketPrice);
                    if (!result) continue; 
                    
                    const close = result.regularMarketPrice;
                    const prevClose = result.regularMarketPreviousClose || close; 
                    const change = close - prevClose;
                    const percent = prevClose !== 0 ? (change / prevClose) * 100 : 0;
                    
                    const open = result.regularMarketOpen || close;
                    const high = result.regularMarketDayHigh || close;
                    const low = result.regularMarketDayLow || close;
                    const volume = result.regularMarketVolume || 0;
                    
                    let marketCapStr = "---";
                    if (result.marketCap) {
                        if (result.marketCap >= 1000000000000) {
                            marketCapStr = (result.marketCap / 1000000000000).toFixed(2) + " 兆";
                        } else {
                            marketCapStr = (result.marketCap / 100000000).toFixed(2) + " 億";
                        }
                    }
                    
                    return {
                        price: close.toFixed(2),
                        change: change > 0 ? '+' + change.toFixed(2) : change.toFixed(2),
                        percent: (change > 0 ? '+' : '') + percent.toFixed(2) + '%',
                        open: open, high: high, low: low, close: close, volume: volume,
                        marketCap: marketCapStr
                    };
                } catch (e) { console.warn(`Proxy Failed (${proxy.url}):`, e.message); }
            }
            return null; 
        };

        const fetchWithTimeout = async (url, options = {}, timeout = 30000) => {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch (e) {
                clearTimeout(id);
                if (e.name === 'AbortError') throw new Error("連線逾時");
                throw e;
            }
        };

        const getMockData = (symbol, price) => ({
            name: `${symbol} (安全模式)`, price: String(price), change: "---", percent: "---", industry: "離線防護",
            market: { taiex: "等候連線", sox: "等候連線", nasdaq: "等候連線" },
            peers: [{ name: "防護系統A", change: "---" }, { name: "防護系統B", change: "---" }],
            valuation: { yield: "---", pb: "---", rating: "連線異常", marketCap: "---" },
            growth: { mom: "---", yoy: "---", forwardPE: "---", grossMargin: "---" },
            risk: { level: "未知", details: "網路或金鑰狀態異常，啟動安全防護模式。圖表為真實報價，但文字分析已凍結。" },
            fund: { eps: "---", gross: "---", net: "---", status: "等待網路或金鑰狀態恢復..." },
            chips: { foreign: "---", trust: "---", big: "---", retail: "---", status: "等待狀態恢復..." },
            moneyFlow: { inflow: "---", outflow: "---", net: "---", analysis: "無資料。" },
            tech: { ma: "---", support: "---", pressure: "---" },
            strategy: { score: 0, conclusion: "安全模式運行中", short: "---", swing: "---", stop: "---" },
            news: []
        });

        const App = () => {
            const [stockId, setStockId] = useState('2330');
            const [inputValue, setInputValue] = useState('');
            const [customKey, setCustomKey] = useState(() => (localStorage.getItem('groq_api_key') || '').trim());
            const [aiModel, setAiModel] = useState(() => (localStorage.getItem('groq_model_name') || 'llama-3.3-70b-versatile').trim());
            
            // 直式追蹤清單狀態管理
            const [watchlist, setWatchlist] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem('quant_watchlist')) || [
                        { id: '2330', name: '台積電' }, { id: '2317', name: '鴻海' }, { id: '2454', name: '聯發科' }, { id: '2603', name: '長榮' }
                    ];
                } catch {
                    return [{ id: '2330', name: '台積電' }];
                }
            });
            const [watchlistQuotes, setWatchlistQuotes] = useState({});
            const [isWatchlistExpanded, setIsWatchlistExpanded] = useState(true);
            
            const [loading, setLoading] = useState(false);
            const [aiLoading, setAiLoading] = useState(false);
            const [error, setError] = useState(null);
            
            const [fullStockList, setFullStockList] = useState([]); 
            const [suggestions, setSuggestions] = useState([]); 
            const [showSuggestions, setShowSuggestions] = useState(false);
            
            const [chartData, setChartData] = useState([]); 
            const [hoverData, setHoverData] = useState(null); 
            const [stockDetails, setStockDetails] = useState({ open: 0, high: 0, low: 0, volume: 0 }); 
            const [timeframe, setTimeframe] = useState('1D'); 
            const [aiData, setAiData] = useState(null);

            const [isFullScreen, setIsFullScreen] = useState(false);
            const [zenMode, setZenMode] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [animationKey, setAnimationKey] = useState(0);

            const rootRef = useRef(null);
            const inputRef = useRef(null); 
            const chartRefs = useRef({});
            const seriesRefs = useRef({});
            
            const containerRefs = { kline: useRef(null), vol: useRef(null), macd: useRef(null), kdj: useRef(null) };
            
            const isSyncing = useRef(false);
            const isChartInitialized = useRef(false);
            const isFetchingRef = useRef(false);
            const refreshTimer = useRef(null);
            const enrichedDataRef = useRef([]);

            // 追蹤清單邏輯
            const isWatched = watchlist.some(w => w.id === stockId);
            const toggleWatchlist = () => {
                setWatchlist(prev => {
                    let newWatchlist;
                    if (isWatched) {
                        newWatchlist = prev.filter(w => w.id !== stockId);
                    } else {
                        newWatchlist = [...prev, { id: stockId, name: aiData?.name || stockId }];
                    }
                    localStorage.setItem('quant_watchlist', JSON.stringify(newWatchlist));
                    return newWatchlist;
                });
            };

            // 【修復】徹底恢復追蹤清單背景報價引擎 (防 429 機制)
            useEffect(() => {
                let isActive = true;
                const updateWatchlistQuotes = async () => {
                    if (watchlist.length === 0) return;
                    
                    const newQuotes = { ...watchlistQuotes };
                    for (const item of watchlist) {
                        if (!isActive) break;
                        try {
                            const rtData = await fetchRealTimeYahoo(item.id);
                            if (rtData) {
                                newQuotes[item.id] = {
                                    price: rtData.price,
                                    change: rtData.change,
                                    percent: rtData.percent
                                };
                                setWatchlistQuotes({ ...newQuotes }); 
                            }
                        } catch(e){}
                        await new Promise(r => setTimeout(r, 250)); // 避免被短時間內阻擋
                    }
                };
                
                updateWatchlistQuotes();
                const interval = setInterval(updateWatchlistQuotes, 15000); 
                return () => { isActive = false; clearInterval(interval); };
            }, [watchlist]);

            // 載入全市場清單供轉換
            useEffect(() => {
                const loadStockList = async () => {
                    try {
                        const res = await fetchWithTimeout(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo`);
                        const json = await res.json();
                        if (json.msg === 'success') {
                            setFullStockList(json.data);
                        }
                    } catch (e) {
                        console.warn("無法載入台股清單", e);
                    }
                };
                loadStockList();
            }, []);

            const onInputChange = (e) => {
                const val = e.target.value;
                setInputValue(val);
                if (val.trim() && fullStockList.length > 0) {
                    const filtered = fullStockList.filter(s => 
                        s.stock_id.includes(val) || s.stock_name.includes(val)
                    ).slice(0, 8); 
                    setSuggestions(filtered);
                    setShowSuggestions(true);
                } else {
                    setSuggestions([]);
                    setShowSuggestions(false);
                }
            };

            const selectSuggestion = (id) => {
                setInputValue(id);
                setShowSuggestions(false);
                executeJump(id);
            };

            const executeJump = useCallback((targetId) => {
                if (aiLoading || isFetchingRef.current || targetId === stockId) return;
                setShowSuggestions(false);
                setAnimationKey(prev => prev + 1); 
                setStockId(targetId);
            }, [aiLoading, stockId]);

            const handleSearch = useCallback(async () => {
                let input = inputValue.trim();
                if (!input || aiLoading || isFetchingRef.current) return;
                setShowSuggestions(false);

                if (/[\u4e00-\u9fa5]/.test(input) && fullStockList.length > 0) {
                    const matchedStock = fullStockList.find(i => i.stock_name === input) || 
                                         fullStockList.find(i => i.stock_name.includes(input));
                    if (matchedStock) {
                        input = matchedStock.stock_id;
                        setInputValue(input); 
                    } else {
                        setError(`找不到名稱包含「${input}」的標的`);
                        return;
                    }
                }
                executeJump(input.toUpperCase());
            }, [inputValue, aiLoading, fullStockList, executeJump]);

            const toggleFullScreen = useCallback(() => {
                if (!document.fullscreenElement) {
                    if (rootRef.current) rootRef.current.requestFullscreen().catch(() => {});
                } else {
                    document.exitFullscreen();
                }
            }, []);

            useEffect(() => {
                const fn = () => { setIsFullScreen(!!document.fullscreenElement); if(!!document.fullscreenElement) setZenMode(false); };
                document.addEventListener('fullscreenchange', fn);
                return () => document.removeEventListener('fullscreenchange', fn);
            }, []);

            // --- 圖表初始化 (彈性高度、確保完全不溢出) ---
            const initCharts = useCallback(() => {
                if (!window.LightweightCharts || isChartInitialized.current || !containerRefs.kline.current) return;
                
                const baseOpts = {
                    layout: { background: { color: 'transparent' }, textColor: '#9ca3af', fontSize: 11 },
                    grid: { vertLines: { color: 'rgba(255,255,255,0.04)' }, horzLines: { color: 'rgba(255,255,255,0.04)' } },
                    rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' }, crosshair: { mode: 0 },
                    handleScroll: true, handleScale: true
                };

                const kChart = window.LightweightCharts.createChart(containerRefs.kline.current, { ...baseOpts, timeScale: { borderColor: 'rgba(255,255,255,0.1)', fixRightEdge: true, rightOffset: 5 } });
                const kSeries = kChart.addCandlestickSeries({ upColor: '#ef4444', downColor: '#22c55e', borderVisible: false, wickUpColor: '#ef4444', wickDownColor: '#22c55e' });
                const ma5Series = kChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const ma20Series = kChart.addLineSeries({ color: '#60a5fa', lineWidth: 1.5, crosshairMarkerVisible: false });
                const ma60Series = kChart.addLineSeries({ color: '#4ade80', lineWidth: 1.5, crosshairMarkerVisible: false });
                
                const vChart = window.LightweightCharts.createChart(containerRefs.vol.current, { ...baseOpts, timeScale: { visible: false, fixRightEdge: true } });
                const vSeries = vChart.addHistogramSeries({ color: '#3b82f6', priceFormat: { type: 'volume' } });
                
                const mChart = window.LightweightCharts.createChart(containerRefs.macd.current, { ...baseOpts, timeScale: { visible: false, fixRightEdge: true } });
                const mDif = mChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const mDea = mChart.addLineSeries({ color: '#60a5fa', lineWidth: 1.5, crosshairMarkerVisible: false });
                const mHist = mChart.addHistogramSeries();
                
                const kjChart = window.LightweightCharts.createChart(containerRefs.kdj.current, { ...baseOpts, timeScale: { borderColor: 'rgba(255,255,255,0.1)', fixRightEdge: true } });
                const kjK = kjChart.addLineSeries({ color: '#f8fafc', lineWidth: 1.5, crosshairMarkerVisible: false });
                const kjD = kjChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const kjJ = kjChart.addLineSeries({ color: '#d946ef', lineWidth: 1.5, crosshairMarkerVisible: false });

                chartRefs.current = { kChart, vChart, mChart, kjChart };
                seriesRefs.current = { kSeries, ma5Series, ma20Series, ma60Series, vSeries, macdDifSeries: mDif, macdDeaSeries: mDea, macdHistSeries: mHist, kdjKSeries: kjK, kdjDSeries: kjD, kdjJSeries: kjJ };

                const resizeObserver = new ResizeObserver(entries => {
                    window.requestAnimationFrame(() => {
                        for (let entry of entries) {
                            const { width, height } = entry.contentRect;
                            if (entry.target === containerRefs.kline.current && chartRefs.current.kChart) chartRefs.current.kChart.applyOptions({ width, height });
                            if (entry.target === containerRefs.vol.current && chartRefs.current.vChart) chartRefs.current.vChart.applyOptions({ width, height });
                            if (entry.target === containerRefs.macd.current && chartRefs.current.mChart) chartRefs.current.mChart.applyOptions({ width, height });
                            if (entry.target === containerRefs.kdj.current && chartRefs.current.kjChart) chartRefs.current.kjChart.applyOptions({ width, height });
                        }
                    });
                });

                resizeObserver.observe(containerRefs.kline.current);
                resizeObserver.observe(containerRefs.vol.current);
                resizeObserver.observe(containerRefs.macd.current);
                resizeObserver.observe(containerRefs.kdj.current);

                const instances = [kChart, vChart, mChart, kjChart];
                instances.forEach(c => {
                    c.timeScale().subscribeVisibleLogicalRangeChange(range => {
                        if (!range || isSyncing.current) return;
                        isSyncing.current = true;
                        instances.forEach(other => { if (other !== c) other.timeScale().setVisibleLogicalRange(range); });
                        isSyncing.current = false;
                    });
                    
                    c.subscribeCrosshairMove(param => {
                        if (param.time && enrichedDataRef.current.length > 0) {
                            const dataPoint = enrichedDataRef.current.find(d => d.time === param.time);
                            if (dataPoint) setHoverData(dataPoint);
                        } else {
                            if (enrichedDataRef.current.length > 0) {
                                setHoverData(enrichedDataRef.current[enrichedDataRef.current.length - 1]);
                            }
                        }
                    });
                });
                isChartInitialized.current = true;
            }, []);

            const updateChartData = useCallback((historyArray) => {
                if (!isChartInitialized.current) return;
                const s = seriesRefs.current;
                if (!s.kSeries) return;

                if (!historyArray || historyArray.length === 0) {
                    s.kSeries.setData([]); s.ma5Series.setData([]); s.ma20Series.setData([]); s.ma60Series.setData([]);
                    s.vSeries.setData([]); s.macdDifSeries.setData([]); s.macdDeaSeries.setData([]); s.macdHistSeries.setData([]);
                    s.kdjKSeries.setData([]); s.kdjDSeries.setData([]); s.kdjJSeries.setData([]);
                    return;
                }

                const sorted = [...historyArray].sort((a, b) => new Date(a.time) - new Date(b.time));
                const closePrices = sorted.map(d => d.close);
                const ma5 = Indicators.ema(closePrices, 5);
                const ma20 = Indicators.ema(closePrices, 20);
                const ma60 = Indicators.ema(closePrices, 60);
                const { dif, dea, macd } = Indicators.calculateMACD(closePrices);
                const { k, d, j } = Indicators.calculateKDJ(sorted);
                
                const enriched = sorted.map((item, i) => ({
                    ...item,
                    ma5: ma5[i], ma20: ma20[i], ma60: ma60[i],
                    dif: dif[i], dea: dea[i], macd: macd[i],
                    k: k[i], d: d[i], j: j[i]
                }));
                enrichedDataRef.current = enriched;
                setHoverData(enriched[enriched.length - 1]); 

                s.kSeries.setData(sorted);
                s.ma5Series.setData(sorted.map((d, i) => ({ time: d.time, value: ma5[i] })));
                s.ma20Series.setData(sorted.map((d, i) => ({ time: d.time, value: ma20[i] })));
                s.ma60Series.setData(sorted.map((d, i) => ({ time: d.time, value: ma60[i] })));
                s.vSeries.setData(sorted.map(data => ({ time: data.time, value: data.volume, color: data.close >= data.open ? 'rgba(239, 68, 68, 0.8)' : 'rgba(34, 197, 94, 0.8)' })));
                s.macdDifSeries.setData(sorted.map((d, i) => ({ time: d.time, value: dif[i] || 0 })));
                s.macdDeaSeries.setData(sorted.map((d, i) => ({ time: d.time, value: dea[i] || 0 })));
                s.macdHistSeries.setData(sorted.map((d, i) => ({ time: d.time, value: macd[i] || 0, color: macd[i] >= 0 ? 'rgba(239, 68, 68, 0.9)' : 'rgba(34, 197, 94, 0.9)' })));
                s.kdjKSeries.setData(sorted.map((v, i) => ({ time: v.time, value: k[i] || 50 })));
                s.kdjDSeries.setData(sorted.map((v, i) => ({ time: v.time, value: d[i] || 50 })));
                s.kdjJSeries.setData(sorted.map((v, i) => ({ time: v.time, value: j[i] || 50 })));
            }, []);

            useEffect(() => {
                if (chartData.length > 0) {
                    if (!isChartInitialized.current) initCharts();
                    const displayData = timeframe === '1W' ? aggregateWeekly(chartData) : chartData;
                    updateChartData(displayData);
                }
            }, [timeframe, chartData, initCharts, updateChartData]);

            // --- 執行分析與資料抓取 ---
            const executeAnalysis = useCallback(async (target, isRefresh = false) => {
                if (!target || isFetchingRef.current) return;
                isFetchingRef.current = true;

                if (!isRefresh) {
                    setLoading(true); setAiLoading(true); setError(null); setAiData(null); setChartData([]); setHoverData(null);
                }
                
                let rtData = null;
                let officialName = target;
                let lastClosePrice = "---";
                let currentDataState = { open: 0, high: 0, low: 0, volume: 0 };
                
                try {
                    if (fullStockList.length > 0) {
                        const stock = fullStockList.find(i => i.stock_id === target);
                        if (stock) officialName = stock.stock_name;
                    }

                    // 強制改用 Yahoo 歷史報價代理
                    let historyCache = await fetchHistoryYahoo(target);
                    
                    try { rtData = await fetchRealTimeYahoo(target); } catch(e) {}

                    if (historyCache && historyCache.length > 0) {
                        const latest = historyCache[historyCache.length-1];
                        if (rtData) {
                            lastClosePrice = rtData.price;
                            currentDataState = {
                                open: Number(rtData.open).toFixed(2), high: Number(rtData.high).toFixed(2), low: Number(rtData.low).toFixed(2), volume: Math.round(rtData.volume / 1000)
                            };
                            const todayStr = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Taipei' }).format(new Date());
                            if (latest.time < todayStr) {
                                historyCache.push({ time: todayStr, open: rtData.open, high: rtData.high, low: rtData.low, close: rtData.close, volume: rtData.volume });
                            } else if (latest.time === todayStr) {
                                latest.open = rtData.open; latest.high = rtData.high; latest.low = rtData.low; latest.close = rtData.close;
                                latest.volume = Math.max(latest.volume, rtData.volume);
                            }
                        } else {
                            lastClosePrice = latest.close.toString();
                            currentDataState = {
                                open: Number(latest.open).toFixed(2), high: Number(latest.high).toFixed(2), low: Number(latest.low).toFixed(2), volume: Math.round(latest.volume / 1000)
                            };
                        }
                        setChartData([...historyCache]);
                        setStockDetails(currentDataState);
                    } else if (rtData) {
                        lastClosePrice = rtData.price;
                        currentDataState = {
                            open: Number(rtData.open).toFixed(2), high: Number(rtData.high).toFixed(2), low: Number(rtData.low).toFixed(2), volume: Math.round(rtData.volume / 1000)
                        };
                        setStockDetails(currentDataState);
                    }

                    const cleanKey = customKey ? customKey.replace(/[\s\u200B-\u200D\uFEFF]/g, '') : "";
                    if (!cleanKey) {
                        if(!isRefresh) setAiData(getMockData(officialName, lastClosePrice));
                        setAiLoading(false); setLoading(false); isFetchingRef.current = false; return; 
                    }

                    const nowMs = Date.now();
                    const cacheKey = `groq_cache_${target}`;
                    const savedCache = localStorage.getItem(cacheKey);
                    
                    if (savedCache && !isRefresh) {
                        try {
                            const parsedCache = JSON.parse(savedCache);
                            if (nowMs - parsedCache.timestamp < 14400000) { 
                                const cachedData = parsedCache.data;
                                if (rtData) {
                                    cachedData.price = rtData.price; cachedData.change = rtData.change; cachedData.percent = rtData.percent;
                                    if(rtData.marketCap && rtData.marketCap !== "---") cachedData.valuation.marketCap = rtData.marketCap;
                                }
                                setAiData(cachedData);
                                setAiLoading(false); setLoading(false); isFetchingRef.current = false; return; 
                            }
                        } catch (e) {}
                    }

                    if (isRefresh) {
                        if (aiData && rtData) {
                            setAiData(prev => {
                                const newD = {...prev, price: rtData.price, change: rtData.change, percent: rtData.percent};
                                if(rtData.marketCap && rtData.marketCap !== "---") newD.valuation.marketCap = rtData.marketCap;
                                return newD;
                            });
                        }
                        setAiLoading(false); setLoading(false); isFetchingRef.current = false; return;
                    }

                    const safeModel = aiModel ? aiModel.replace(/[^a-z0-9.-]/gi, '') : "llama-3.3-70b-versatile";
                    
                    const prompt = `分析台股代號[${target}]，正式名稱為[${officialName}]。
                    任務：依據最新狀態提供大盤聯動、估值、營收成長、風險預警、籌碼面、資金流向與最新動態。
                    【絕對強制規則】：
                    1. 絕對禁止使用任何表情符號或圖形符號。
                    2. 若缺乏精確數據，請運用你的知識庫給出合理的「市場預估值」或「趨勢描述 (如: 衰退、成長、強勢)」，絕對不允許填入 "---" 或留白。
                    3. 若在新聞或點評中提及任何實體商品時，務必清楚寫出具體的「品牌」與「型號」。
                    4. 必須且只能回傳 JSON 格式。請直接輸出 JSON 大括號，不要包含 Markdown 標籤。
                    JSON結構：{"name":"${officialName}","price":"現價","change":"漲跌","percent":"幅度","industry":"產業","market":{"taiex":"大盤","sox":"費半","nasdaq":"那指"},"peers":[{"name":"同業","change":"漲跌"}],"valuation":{"yield":"殖利率","pb":"股淨比","rating":"評價","marketCap":"總市值"},"growth":{"mom":"月營收增減","yoy":"年營收增減","forwardPE":"預估本益比","grossMargin":"最新毛利率"},"risk":{"level":"高/中/低","details":"風險與事件說明"},"fund":{"eps":"EPS","gross":"毛利","net":"淨利","status":"點評"},"chips":{"foreign":"外資","trust":"投信","big":"主力","retail":"散戶","status":"點評"},"moneyFlow":{"inflow":"流入預估","outflow":"流出預估","net":"淨流入流出","analysis":"資金面點評"},"tech":{"ma":"均線","support":"支撐","pressure":"壓力"},"strategy":{"score":85,"conclusion":"判定","short":"短線","swing":"策略","stop":"停損"},"news":[{"date":"日期","title":"標題","snippet":"新聞內容詳細預覽摘要(必填，不能空白)","impact":"多空"}]}`;

                    const apiUrl = `https://api.groq.com/openai/v1/chat/completions`;
                    const aiRes = await fetchWithTimeout(apiUrl, {
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cleanKey}` },
                        body: JSON.stringify({ 
                            model: safeModel, temperature: 0.2,
                            messages: [
                                { role: "system", content: prompt },
                                { role: "user", content: `提供台股 [${target}] 分析數據，輸出純 JSON。` }
                            ]
                        })
                    }, 30000);

                    if(!aiRes.ok) throw new Error("API 伺服器異常");
                    const aiJson = await aiRes.json();
                    let rawText = aiJson.choices?.[0]?.message?.content;
                    if (!rawText) throw new Error("AI 模型未能產出內容");
                    
                    rawText = rawText.replace(/```json/gi, '').replace(/```/gi, '').trim();
                    const match = rawText.match(/\{[\s\S]*\}/);
                    if (!match) throw new Error("資料格式無法解析");
                    
                    const rawP = JSON.parse(match[0]);
                    
                    const safeAiData = {
                        name: officialName,
                        price: rtData ? rtData.price : String(rawP.price || lastClosePrice),
                        change: rtData ? rtData.change : String(rawP.change || "0"),
                        percent: rtData ? rtData.percent : String(rawP.percent || "0%"),
                        industry: String(rawP.industry || "-"),
                        market: { taiex: String(rawP.market?.taiex || "穩定"), sox: String(rawP.market?.sox || "穩定"), nasdaq: String(rawP.market?.nasdaq || "穩定") },
                        peers: Array.isArray(rawP.peers) ? rawP.peers.map(p => ({ name: String(p?.name || "-"), change: String(p?.change || "0") })) : [],
                        valuation: {
                            yield: String(rawP.valuation?.yield || "估算中"), pb: String(rawP.valuation?.pb || "估算中"), rating: String(rawP.valuation?.rating || "中性"), 
                            marketCap: rtData && rtData.marketCap !== "---" ? rtData.marketCap : String(rawP.valuation?.marketCap || "估算中")
                        },
                        growth: { mom: String(rawP.growth?.mom || "持平"), yoy: String(rawP.growth?.yoy || "持平"), forwardPE: String(rawP.growth?.forwardPE || "估算中"), grossMargin: String(rawP.growth?.grossMargin || "持平") },
                        risk: { level: String(rawP.risk?.level || "中"), details: String(rawP.risk?.details || "目前無重大風險事件") },
                        fund: { eps: String(rawP.fund?.eps || "持平"), gross: String(rawP.fund?.gross || "持平"), net: String(rawP.fund?.net || "持平"), status: String(rawP.fund?.status || "基本面穩定") },
                        chips: { foreign: String(rawP.chips?.foreign || "觀望"), trust: String(rawP.chips?.trust || "觀望"), big: String(rawP.chips?.big || "觀望"), retail: String(rawP.chips?.retail || "觀望"), status: String(rawP.chips?.status || "籌碼穩定") },
                        moneyFlow: { inflow: String(rawP.moneyFlow?.inflow || "估算中"), outflow: String(rawP.moneyFlow?.outflow || "估算中"), net: String(rawP.moneyFlow?.net || "持平"), analysis: String(rawP.moneyFlow?.analysis || "資金動能平穩") },
                        tech: { ma: String(rawP.tech?.ma || "糾結"), support: String(rawP.tech?.support || "-"), pressure: String(rawP.tech?.pressure || "-") },
                        strategy: { score: Number(rawP.strategy?.score) || 50, conclusion: String(rawP.strategy?.conclusion || "觀望"), short: String(rawP.strategy?.short || "觀望"), swing: String(rawP.strategy?.swing || "觀望"), stop: String(rawP.strategy?.stop || "-") },
                        news: Array.isArray(rawP.news) ? rawP.news.map(n => ({ date: String(n?.date || "-"), title: String(n?.title || "-"), snippet: String(n?.snippet || "-"), impact: String(n?.impact || "-") })) : []
                    };

                    setAiData(safeAiData);
                    localStorage.setItem(cacheKey, JSON.stringify({ timestamp: nowMs, data: safeAiData }));

                } catch (e) { 
                    const fallbackData = {
                        name: officialName, price: rtData?.price || lastClosePrice, change: rtData?.change || "---", percent: rtData?.percent || "---", industry: "---",
                        market: { taiex: "連線異常", sox: "連線異常", nasdaq: "連線異常" }, peers: [],
                        valuation: { yield: "---", pb: "---", rating: "---", marketCap: rtData?.marketCap || "---" },
                        growth: { mom: "---", yoy: "---", forwardPE: "---", grossMargin: "---" },
                        risk: { level: "---", details: "AI 分析失敗或連線逾時，圖表與頂部為真實報價，請檢查金鑰或稍後再試。" },
                        fund: { eps: "---", gross: "---", net: "---", status: "分析連線逾時" }, chips: { foreign: "---", trust: "---", big: "---", retail: "---", status: "分析連線逾時" },
                        moneyFlow: { inflow: "---", outflow: "---", net: "---", analysis: "分析連線逾時" }, tech: { ma: "---", support: "---", pressure: "---" },
                        strategy: { score: 0, conclusion: "連線失敗", short: "---", swing: "---", stop: "---" }, news: []
                    };
                    setAiData(fallbackData);
                    if(!isRefresh) setError(`AI 存取異常，已啟動防護模式保留報價：${e.message}`); 
                } finally { 
                    setAiLoading(false); setLoading(false); isFetchingRef.current = false;
                }
            }, [customKey, aiModel, fullStockList]);

            useEffect(() => {
                executeAnalysis(stockId);
                refreshTimer.current = setInterval(() => executeAnalysis(stockId, true), 60000);
                return () => clearInterval(refreshTimer.current);
            }, [stockId, executeAnalysis]);

            const saveSettings = () => { 
                const cleanKey = customKey.replace(/[\s\u200B-\u200D\uFEFF]/g, '');
                const cleanModel = aiModel.replace(/[^a-z0-9.-]/gi, '') || 'llama-3.3-70b-versatile';
                localStorage.setItem('groq_api_key', cleanKey); 
                localStorage.setItem('groq_model_name', cleanModel);
                setCustomKey(cleanKey);
                setAiModel(cleanModel);
                setShowSettings(false); 
                executeAnalysis(stockId);
            };

            const isUp = aiData?.change && !String(aiData.change).includes('-');
            const priceColor = !aiData?.change || String(aiData.change) === '0' || String(aiData.change) === '---' ? 'text-white' : isUp ? 'text-red-500' : 'text-green-500';
            const zenClass = zenMode ? "fixed inset-0 z-[9999] bg-[#030303] p-2 lg:p-4" : "";
            const disableInput = aiLoading;

            return (
                <div key={animationKey} ref={rootRef} className={`min-h-screen bg-[#030303] text-gray-200 font-sans p-1.5 lg:p-3 overflow-hidden flex flex-col ${zenClass}`}>
                    
                    <header className="flex-none flex flex-col md:flex-row justify-between items-center mb-2 lg:mb-3 bg-[#0a0a0a] p-3 lg:p-4 border border-white/5 rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.5)] relative header-glow">
                        <div className="flex flex-col lg:flex-row lg:items-center gap-4 w-full lg:w-auto">
                            <div className="flex items-center gap-4">
                                <div className="flex flex-col animate-fade-in">
                                    <h1 className="text-xl font-bold text-white tracking-tighter">{aiData?.name || '系統啟動中'}</h1>
                                    <span className="text-blue-500 font-mono text-sm uppercase tracking-widest">{stockId}</span>
                                </div>
                                <div className="h-8 w-px bg-white/10 mx-2 hidden lg:block animate-fade-in delay-50"></div>
                                <div className="flex items-baseline gap-3 animate-fade-in delay-100">
                                    <span className={`text-4xl font-black font-mono tracking-tighter ${priceColor}`}>{aiData ? aiData.price : '---'}</span>
                                    <div className="flex flex-col text-sm font-bold font-mono">
                                        <span className={priceColor}>{aiData ? aiData.change : ''}</span>
                                        <span className={priceColor}>{aiData ? aiData.percent : ''}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="flex items-center gap-2 mt-4 md:mt-0 w-full lg:w-auto justify-end relative animate-fade-in delay-150">
                            {aiLoading ? <div className="w-5 h-5 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mr-2"></div> : null}
                            
                            <button onClick={toggleWatchlist} className={`px-3 py-2 text-xs font-bold rounded-lg transition-colors border ${isWatched ? 'bg-yellow-900/40 border-yellow-700 text-yellow-300' : 'bg-gray-800 border-gray-600 text-gray-400 hover:bg-gray-700 hover:text-white'}`}>
                                {isWatched ? '取消追蹤' : '加入追蹤'}
                            </button>

                            <div className="relative" ref={inputRef}>
                                <input 
                                    type="text" 
                                    value={inputValue} 
                                    onChange={onInputChange} 
                                    onKeyDown={e => { if (e.key === 'Enter') handleSearch(); }} 
                                    onBlur={() => setTimeout(() => setShowSuggestions(false), 200)}
                                    onFocus={() => { if(suggestions.length > 0) setShowSuggestions(true); }}
                                    placeholder="輸入 名稱 或 代號" 
                                    disabled={disableInput}
                                    className="w-40 lg:w-48 bg-[#111] border border-white/10 px-3 py-2 text-xs font-bold rounded-lg text-white focus:border-blue-500 outline-none transition-all disabled:opacity-50 shadow-inner" 
                                />
                                {showSuggestions && suggestions.length > 0 && (
                                    <div className="absolute top-full left-0 mt-1 w-full bg-gray-900 border border-white/10 rounded-lg shadow-2xl z-[999] overflow-hidden">
                                        {suggestions.map(s => (
                                            <div key={s.stock_id} onMouseDown={() => selectSuggestion(s.stock_id)} className="p-2.5 px-3 hover:bg-blue-600/50 cursor-pointer flex justify-between items-center border-b border-white/5 last:border-b-0 transition-colors">
                                                <span className="text-white font-bold text-xs">{s.stock_name}</span>
                                                <span className="text-blue-400 font-mono text-[10px]">{s.stock_id}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            <button onClick={() => handleSearch()} disabled={disableInput} className="bg-blue-600/80 border border-blue-500 px-4 py-2 text-xs font-bold rounded-lg hover:bg-blue-600 transition-all uppercase tracking-widest disabled:opacity-50 shadow-lg shadow-blue-900/20 hidden sm:block">
                                查詢
                            </button>
                            <button onClick={() => setShowSettings(!showSettings)} disabled={aiLoading} className="bg-gray-800 border border-white/10 px-4 py-2 text-xs font-bold rounded-lg hover:bg-gray-700 transition-all uppercase tracking-widest disabled:opacity-50 hidden sm:block">設定</button>
                            <button onClick={toggleFullScreen} className={`border px-4 py-2 text-xs font-black rounded-lg transition-all uppercase tracking-widest hidden lg:block ${zenMode || isFullScreen ? 'bg-red-900/40 border-red-700 text-red-200 hover:bg-red-800/60' : 'bg-transparent border-white/10 text-gray-300 hover:bg-white/5'}`}>
                                {isFullScreen || zenMode ? '退出全螢幕' : '全螢幕'}
                            </button>
                        </div>
                    </header>

                    {showSettings ? (
                        <div className="absolute top-20 right-6 z-[100] w-[380px] p-6 glass-panel border border-white/10 rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.8)] animate-fade-in">
                            <h3 className="text-base font-bold mb-5 border-b border-gray-800 pb-3 text-blue-400">系統核心配置</h3>
                            <div className="space-y-5">
                                <div>
                                    <label className="text-xs block text-gray-400 mb-2 font-bold tracking-widest font-mono">Groq API Key (gsk_ 開頭)</label>
                                    <input type="password" value={customKey} onChange={e => setCustomKey(e.target.value)} className="w-full bg-black border border-gray-700 p-2.5 text-xs rounded-lg focus:border-blue-500 outline-none font-mono" placeholder="貼入 API 金鑰" />
                                </div>
                                <div>
                                    <label className="text-xs block text-gray-400 mb-2 font-bold tracking-widest font-mono">AI 運算模型配置</label>
                                    <select value={aiModel} onChange={e => setAiModel(e.target.value)} className="w-full bg-black border border-gray-700 p-2.5 text-xs rounded-lg focus:border-blue-500 outline-none font-mono text-gray-200">
                                        <option value="llama-3.3-70b-versatile">Llama 3.3 70B (推薦/邏輯最強)</option>
                                        <option value="llama-3.1-8b-instant">Llama 3.1 8B (極速/日常看盤)</option>
                                    </select>
                                </div>
                                <div className="border-t border-gray-800 pt-5 mt-2">
                                    <button onClick={(e) => {
                                        Object.keys(localStorage).forEach(k => { if(k.startsWith('groq_cache_')) localStorage.removeItem(k); });
                                        e.target.innerText = "已清除快取！(下回查詢強制連線)";
                                        setTimeout(() => { e.target.innerText = "清除本機深度分析快取"; }, 2000);
                                    }} className="w-full bg-red-900/30 border border-red-800/50 text-red-300 py-2.5 text-xs font-bold rounded-lg hover:bg-red-800/50 transition-colors">清除本機深度分析快取</button>
                                </div>
                                <div className="flex gap-3 pt-2">
                                    <button onClick={saveSettings} className="flex-1 bg-blue-600 py-2.5 text-xs font-black rounded-lg hover:bg-blue-500 transition-colors shadow-lg">儲存設定</button>
                                    <button onClick={() => setShowSettings(false)} className="px-6 bg-gray-800 text-xs font-bold rounded-lg hover:bg-gray-700">關閉</button>
                                </div>
                            </div>
                        </div>
                    ) : null}

                    {error ? (
                        <div className="flex-none bg-red-900/30 border border-red-500/30 text-red-300 p-2.5 text-center text-xs font-bold mb-2 rounded-xl flex items-center justify-center shadow-lg animate-fade-in">
                            <span>{error}</span>
                        </div>
                    ) : null}

                    <main className={`flex-1 grid grid-cols-1 lg:grid-cols-12 gap-2 lg:gap-3 overflow-hidden ${(isFullScreen || zenMode) ? 'h-full' : ''}`}>
                        
                        {/* 左側：自選、聯動、同業、估值、成長 */}
                        <div className="col-span-12 lg:col-span-3 flex flex-col gap-2 overflow-y-auto custom-scrollbar pr-1 pb-1">
                            
                            <div className="panel-card flex-none animate-fade-up transition-all duration-500 overflow-hidden border-yellow-900/30">
                                <div className="bg-yellow-950/20 border-b border-white/5 p-3 px-4 flex justify-between items-center cursor-pointer hover:bg-yellow-900/30 transition-colors" onClick={() => setIsWatchlistExpanded(!isWatchlistExpanded)}>
                                    <span className="text-yellow-400 font-bold text-xs tracking-widest uppercase">自選追蹤清單</span>
                                    <span className="text-gray-500 transform transition-transform duration-300 select-none text-[10px]" style={{ transform: isWatchlistExpanded ? 'rotate(180deg)' : 'rotate(0deg)' }}>▼</span>
                                </div>
                                <div className={`transition-all duration-500 ease-in-out bg-black/20 ${isWatchlistExpanded ? 'max-h-[300px] opacity-100' : 'max-h-0 opacity-0'}`}>
                                    <div className="p-2 flex flex-col gap-1 overflow-y-auto custom-scrollbar" style={{ maxHeight: '250px' }}>
                                        {watchlist.length > 0 ? watchlist.map((item) => {
                                            const quote = watchlistQuotes[item.id];
                                            const isWUp = quote && parseFloat(quote.change) >= 0;
                                            const colorClass = !quote ? 'text-gray-500' : isWUp ? 'text-red-400' : 'text-green-400';
                                            return (
                                                <div key={item.id} onClick={() => executeJump(item.id)} className={`flex justify-between items-center p-2 rounded-lg cursor-pointer transition-all duration-200 border ${stockId === item.id ? 'bg-white/10 border-white/20 shadow-inner' : 'bg-transparent border-transparent hover:bg-white/5'}`}>
                                                    <div className="flex flex-col">
                                                        <span className="text-white font-bold text-xs">{item.name}</span>
                                                        <span className="text-gray-500 font-mono text-[9px]">{item.id}</span>
                                                    </div>
                                                    <div className="flex flex-col items-end">
                                                        <span className={`font-mono font-bold text-xs ${colorClass}`}>{quote ? quote.price : '---'}</span>
                                                        <span className={`font-mono text-[10px] ${colorClass}`}>{quote ? quote.percent : '---'}</span>
                                                    </div>
                                                </div>
                                            );
                                        }) : <span className="text-gray-600 text-xs p-3 text-center block">尚無追蹤標的</span>}
                                    </div>
                                </div>
                            </div>

                            {!customKey ? (
                                <div className="panel-card p-5 text-center mb-1 flex-none border-blue-900/30 bg-blue-950/10">
                                    <p className="text-xs text-blue-300 font-bold mb-4 tracking-widest leading-relaxed">請設定 Groq 金鑰以啟用 AI 分析</p>
                                    <button onClick={() => setShowSettings(true)} className="bg-blue-600 text-white text-xs px-8 py-2.5 rounded-lg font-black hover:bg-blue-500 shadow-[0_0_15px_rgba(37,99,235,0.4)] transition-all">立即設定</button>
                                </div>
                            ) : null}
                            
                            <div className="panel-card flex-none animate-fade-up delay-50">
                                <div className="bg-blue-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-blue-400 font-bold text-xs tracking-widest uppercase">市場聯動分析</span></div>
                                <div className="p-4 space-y-3 text-xs">
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono tracking-widest"><span className="text-gray-500">台股大盤</span><span className="text-white font-bold">{aiData?.market?.taiex || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono tracking-widest"><span className="text-gray-500">費半指數</span><span className="text-white font-bold">{aiData?.market?.sox || "---"}</span></div>
                                    <div className="flex justify-between pb-1 font-mono tracking-widest"><span className="text-gray-500">那斯達克</span><span className="text-white font-bold">{aiData?.market?.nasdaq || "---"}</span></div>
                                </div>
                            </div>
                            
                            <div className="panel-card flex-none animate-fade-up delay-100">
                                <div className="bg-purple-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-purple-400 font-bold text-xs tracking-widest uppercase">同業競爭比較</span></div>
                                <div className="p-4 space-y-2 text-xs">
                                    {aiData?.peers && aiData.peers.length > 0 ? (
                                        aiData.peers.map((p, i) => (
                                            <div key={i} className="flex justify-between bg-black/40 p-3 mb-2 rounded-lg border border-white/5 font-mono hover:bg-white/10 transition-colors">
                                                <span className="text-gray-200 font-bold">{p.name}</span>
                                                <span className={p.change && String(p.change).includes('-') ? 'text-green-400' : 'text-red-400'}>{p.change}</span>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="loading-shimmer h-12 rounded-lg opacity-20"></div>
                                    )}
                                </div>
                            </div>
                            
                            <div className="panel-card flex-none animate-fade-up delay-150">
                                <div className="bg-slate-900/40 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-gray-300 font-bold text-xs tracking-widest uppercase">基本面與估值</span></div>
                                <div className="p-4 space-y-3 text-xs">
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-blue-300 tracking-tighter">公司總市值 <span className="text-white font-bold font-mono">{aiData?.valuation?.marketCap || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">殖利率/股淨比 <span className="text-white font-bold font-mono">{aiData?.valuation?.yield || "---"} / {aiData?.valuation?.pb || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">AI 估值評等 <span className="text-yellow-400 font-black tracking-widest text-sm">{aiData?.valuation?.rating || "---"}</span></div>
                                </div>
                            </div>

                            <div className="panel-card flex-1 min-h-[160px] animate-fade-up delay-200">
                                <div className="bg-cyan-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-cyan-400 font-bold text-xs tracking-widest uppercase">營收與獲利動能</span></div>
                                <div className="p-4 space-y-3 text-xs">
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">月營收 (MoM) <span className="text-white font-bold font-mono">{aiData?.growth?.mom || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">年營收 (YoY) <span className="text-white font-bold font-mono">{aiData?.growth?.yoy || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">預估本益比 (F.P/E) <span className="text-yellow-400 font-bold font-mono">{aiData?.growth?.forwardPE || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">最新毛利率 <span className="text-white font-bold font-mono">{aiData?.growth?.grossMargin || "---"}</span></div>
                                </div>
                            </div>
                        </div>

                        {/* 中間圖表區塊：自適應 Flex H-0 絕對填滿不溢出 */}
                        <div className="col-span-12 lg:col-span-6 flex flex-col overflow-hidden pb-1">
                            <div className="panel-card flex-1 flex flex-col overflow-hidden shadow-[0_10px_30px_rgba(0,0,0,0.8)] animate-fade-up delay-100">
                                
                                <div className="bg-green-950/10 border-b border-white/5 p-3 px-5 flex justify-between items-center z-10 h-14 rounded-t-xl flex-none">
                                    <div className="flex items-center gap-4">
                                        <span className="text-green-400 font-bold text-sm tracking-widest uppercase">技術線圖</span>
                                        <div className="hidden sm:flex items-center gap-3 text-[10px] font-mono text-gray-400 bg-black/40 px-3 py-1.5 rounded-lg border border-white/5">
                                            <span>開: <strong className="text-white">{stockDetails.open || '-'}</strong></span>
                                            <span>高: <strong className="text-red-400">{stockDetails.high || '-'}</strong></span>
                                            <span>低: <strong className="text-green-400">{stockDetails.low || '-'}</strong></span>
                                            <span>總量: <strong className="text-yellow-400">{stockDetails.volume || '0'}</strong> 張</span>
                                        </div>
                                    </div>
                                    <div className="flex border border-white/10 rounded-lg overflow-hidden h-8 bg-black/40 shadow-inner">
                                        <button onClick={() => setTimeframe('1D')} disabled={aiLoading} className={`px-5 text-xs font-black transition-colors ${timeframe === '1D' ? 'bg-gray-700 text-white' : 'text-gray-400 hover:text-white hover:bg-white/10'} disabled:opacity-50`}>日線</button>
                                        <button onClick={() => setTimeframe('1W')} disabled={aiLoading} className={`px-5 text-xs font-black transition-colors ${timeframe === '1W' ? 'bg-gray-700 text-white' : 'text-gray-400 hover:text-white hover:bg-white/10'} disabled:opacity-50`}>週線</button>
                                    </div>
                                </div>

                                <div className="flex-1 bg-black/30 flex flex-col h-0 overflow-hidden p-1">
                                    {(!loading && chartData.length === 0 && !error) ? (
                                        <div className="absolute inset-0 flex flex-col justify-center items-center z-20 bg-black/80 backdrop-blur-sm">
                                            <span className="text-gray-500 text-sm font-black tracking-[0.5em] uppercase">No Data Stream</span>
                                        </div>
                                    ) : null}
                                    {(loading && chartData.length === 0) ? (
                                        <div className="absolute inset-0 flex flex-col justify-center items-center z-20 bg-black/80 backdrop-blur-sm">
                                            <span className="text-blue-500 text-sm font-black animate-pulse tracking-[0.5em] uppercase">Connecting...</span>
                                        </div>
                                    ) : null}

                                    {/* K 線圖與浮動標籤 (佔 3 份) */}
                                    <div className="relative w-full flex-[3] min-h-0 flex flex-col mb-1 rounded overflow-hidden">
                                        <div className="absolute top-2 left-2 z-10 flex flex-wrap gap-2 text-[10px] font-mono pointer-events-none">
                                            <div className="bg-black/80 px-2 py-0.5 rounded text-gray-300 font-bold border border-white/5">K線</div>
                                            <div className="bg-black/80 px-2 py-0.5 rounded text-white border border-white/5">
                                                <span className="text-gray-400 mr-2">{hoverData?.time || '最新'}</span>
                                                開:{hoverData?.open||'-'} 高:{hoverData?.high||'-'} 低:{hoverData?.low||'-'} 收:{hoverData?.close||'-'}
                                            </div>
                                            <div className="bg-black/80 px-2 py-0.5 rounded text-yellow-400 border border-white/5">MA5:{hoverData?.ma5?.toFixed(2)||'-'}</div>
                                            <div className="bg-black/80 px-2 py-0.5 rounded text-blue-400 border border-white/5">MA20:{hoverData?.ma20?.toFixed(2)||'-'}</div>
                                            <div className="bg-black/80 px-2 py-0.5 rounded text-green-400 border border-white/5">MA60:{hoverData?.ma60?.toFixed(2)||'-'}</div>
                                        </div>
                                        <div ref={containerRefs.kline} className="flex-1 w-full h-full pt-6" />
                                    </div>
                                    
                                    {/* 成交量容器 (佔 1 份) */}
                                    <div className="relative w-full flex-[1] min-h-0 flex flex-col border-t border-white/5 bg-black/20 mb-1 rounded overflow-hidden">
                                        <div className="absolute top-1 left-2 z-10 flex gap-2 text-[10px] font-mono pointer-events-none">
                                            <div className="bg-black/80 px-2 py-0.5 rounded text-gray-300 font-bold border border-white/5">成交量</div>
                                            <div className="bg-black/80 px-2 py-0.5 rounded text-blue-300 font-bold border border-white/5">
                                                Vol: {hoverData?.volume ? Math.round(hoverData.volume / 1000) + ' 張' : '-'}
                                            </div>
                                        </div>
                                        <div ref={containerRefs.vol} className="flex-1 w-full h-full pt-4" />
                                    </div>
                                    
                                    {/* MACD (佔 1 份) */}
                                    <div className="relative w-full flex-[1] min-h-0 flex flex-col border-t border-white/5 bg-black/20 mb-1 rounded overflow-hidden">
                                        <div className="absolute top-1 left-2 z-10 flex gap-2 text-[10px] font-mono pointer-events-none">
                                            <div className="bg-black/80 px-2 py-0.5 rounded text-gray-300 font-bold border border-white/5">MACD (12,26,9)</div>
                                            <div className={`bg-black/80 px-2 py-0.5 rounded border border-white/5 ${hoverData?.macd >= 0 ? "text-red-400" : "text-green-400"}`}>MACD:{hoverData?.macd?.toFixed(2)||'-'}</div>
                                            <div className="bg-black/80 px-2 py-0.5 rounded text-yellow-400 border border-white/5">DIF:{hoverData?.dif?.toFixed(2)||'-'}</div>
                                            <div className="bg-black/80 px-2 py-0.5 rounded text-blue-400 border border-white/5">DEA:{hoverData?.dea?.toFixed(2)||'-'}</div>
                                        </div>
                                        <div ref={containerRefs.macd} className="flex-1 w-full h-full pt-4" />
                                    </div>
                                    
                                    {/* KDJ (佔 1 份) */}
                                    <div className="relative w-full flex-[1] min-h-0 flex flex-col border-t border-white/5 bg-black/20 rounded-b-xl overflow-hidden pb-2">
                                        <div className="absolute top-1 left-2 z-10 flex gap-2 text-[10px] font-mono pointer-events-none">
                                            <div className="bg-black/80 px-2 py-0.5 rounded text-gray-300 font-bold border border-white/5">KDJ (9,3,3)</div>
                                            <div className="bg-black/80 px-2 py-0.5 rounded text-white border border-white/5">K:{hoverData?.k?.toFixed(2)||'-'}</div>
                                            <div className="bg-black/80 px-2 py-0.5 rounded text-yellow-400 border border-white/5">D:{hoverData?.d?.toFixed(2)||'-'}</div>
                                            <div className="bg-black/80 px-2 py-0.5 rounded text-pink-400 border border-white/5">J:{hoverData?.j?.toFixed(2)||'-'}</div>
                                        </div>
                                        <div ref={containerRefs.kdj} className="flex-1 w-full h-full pt-4" />
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 右側資訊欄 */}
                        <div className="col-span-12 lg:col-span-3 flex flex-col gap-3 overflow-y-auto custom-scrollbar pl-1 pb-2">
                            <div className="panel-card flex-none animate-fade-up delay-50">
                                <div className="bg-purple-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-purple-400 font-bold text-xs tracking-widest uppercase">籌碼流向解析</span></div>
                                <div className="p-4 space-y-3 text-xs">
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">外資動態 <span className="text-white font-bold font-mono">{aiData?.chips?.foreign || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">投信動態 <span className="text-blue-400 font-bold font-mono">{aiData?.chips?.trust || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter text-blue-400">主力持股 <span className="text-white font-black font-mono">{aiData?.chips?.big || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter text-green-400">散戶持股 <span className="text-white font-bold font-mono">{aiData?.chips?.retail || "---"}</span></div>
                                </div>
                            </div>

                            <div className="panel-card flex-none animate-fade-up delay-100">
                                <div className="bg-indigo-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-indigo-400 font-bold text-xs tracking-widest uppercase">資金面監測</span></div>
                                <div className="p-4 space-y-3 text-xs">
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">買盤流入 <span className="text-red-400 font-bold font-mono">{aiData?.moneyFlow?.inflow || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">賣盤流出 <span className="text-green-400 font-bold font-mono">{aiData?.moneyFlow?.outflow || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">淨額 <span className="text-white font-black font-mono text-sm">{aiData?.moneyFlow?.net || "---"}</span></div>
                                    <div className="mt-3 text-gray-400 bg-black/40 p-3 border border-white/5 rounded-lg leading-relaxed text-justify whitespace-normal break-words">{aiData?.moneyFlow?.analysis || (aiLoading ? "正在解析資金流向..." : "等待同步")}</div>
                                </div>
                            </div>

                            <div className="panel-card flex-none animate-fade-up delay-150">
                                <div className="bg-orange-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl flex justify-between items-center"><span className="text-orange-400 font-bold text-xs tracking-widest uppercase">AI 戰略矩陣</span><span className="text-lg font-black text-white font-mono bg-orange-900/30 px-2 py-0.5 rounded shadow-inner">{aiData?.strategy?.score || 0} 評分</span></div>
                                <div className="p-4 space-y-3 text-xs">
                                    <div className="bg-black/40 p-4 rounded-lg border border-white/5 shadow-inner"><span className="text-white font-black block mb-2 text-sm font-mono whitespace-normal leading-relaxed">{aiData?.strategy?.conclusion || (aiLoading ? "運算中..." : "等待分析")}</span><span className="text-gray-400 block text-xs tracking-tighter font-bold font-mono">短線操作：{aiData?.strategy?.short || "Analyzing"}</span></div>
                                    <div className="flex justify-between p-3 bg-red-950/20 border border-red-900/30 font-mono text-red-400 font-black text-xs tracking-widest uppercase rounded-lg">停損建議 <span className="text-white font-black text-sm">{aiData?.strategy?.stop || "---"}</span></div>
                                </div>
                            </div>

                            <div className="panel-card flex-1 min-h-[220px] flex flex-col animate-fade-up delay-200">
                                <div className="bg-yellow-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl flex justify-between items-center">
                                    <span className="text-yellow-400 font-bold text-xs tracking-widest uppercase">即時情報與觀點</span>
                                </div>
                                {/* 手風琴式新聞預覽：Hover 展開顯示 Snippet */}
                                <div className="p-2 space-y-1 flex-1 overflow-y-auto custom-scrollbar">
                                    {aiData?.news && aiData.news.length > 0 ? (
                                        aiData.news.map((n, i) => (
                                            <a 
                                                key={i} 
                                                href={`https://www.google.com/search?q=${encodeURIComponent(stockId + ' ' + String(n.title))}&tbm=nws`} 
                                                target="_blank" 
                                                rel="noreferrer" 
                                                className="block border-b border-white/5 p-3 hover:bg-white/5 transition-all duration-300 rounded-lg group"
                                            >
                                                <div className="flex justify-between text-[10px] mb-2 font-mono text-gray-500">
                                                    {n.date} 
                                                    <span className={`px-1.5 rounded ${n.impact === '多' ? 'bg-red-900/40 text-red-400' : n.impact === '空' ? 'bg-green-900/40 text-green-400' : 'bg-gray-800 text-gray-300'} font-black`}>
                                                        {n.impact}
                                                    </span>
                                                </div>
                                                <div className="text-gray-200 font-bold text-xs leading-relaxed group-hover:text-blue-400 transition-colors">
                                                    {n.title}
                                                </div>
                                                
                                                {/* 手風琴展開的新聞預覽摘要 */}
                                                <div className="max-h-0 overflow-hidden group-hover:max-h-[150px] opacity-0 group-hover:opacity-100 transition-all duration-500 ease-in-out">
                                                    <div className="mt-3 text-[11px] text-gray-400 leading-relaxed text-justify border-l-2 border-blue-500/50 pl-2">
                                                        {n.snippet && n.snippet !== "-" ? n.snippet : "點擊以跳轉閱讀完整新聞..."}
                                                    </div>
                                                    <div className="text-[9px] text-blue-500/70 font-bold mt-2 text-right group-hover:text-blue-400 transition-colors">點擊跳轉閱讀全文 ↗</div>
                                                </div>
                                            </a>
                                        ))
                                    ) : (
                                        <div className="loading-shimmer h-24 rounded-lg opacity-20 m-2"></div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
