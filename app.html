<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化決策終端 PRO</title>
    <!-- 引入外部核心資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #050505; margin: 0; padding: 0; color: #d1d5db; overflow: hidden; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        #root { height: 100%; width: 100%; }
        
        /* 訂製滾動條 */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }
        * { scrollbar-width: thin; scrollbar-color: #333 transparent; }
        
        /* 動畫定義 */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(59, 130, 246, 0.1); }
            50% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        }
        @keyframes shimmer { 
            0% { background-position: 200% 0; } 100% { background-position: -200% 0; } 
        }

        /* 動畫類別 */
        .animate-fade-up { opacity: 0; animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .header-glow { animation: pulseGlow 3s infinite; }
        
        .loading-shimmer { 
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%); 
            background-size: 200% 100%; 
            animation: shimmer 2s infinite linear; 
        }
        
        /* 玻璃面板 */
        .glass-panel { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .panel-card { background-color: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); border-radius: 0.75rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5); transition: transform 0.2s, box-shadow 0.2s; }
        .panel-card:hover { border-color: rgba(255,255,255,0.1); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // 技術指標運算核心
        const Indicators = {
            ema: (data, period) => {
                if (!data || data.length === 0) return [];
                const k = 2 / (period + 1);
                let emaVal = data[0];
                return data.map(val => (emaVal = (val - emaVal) * k + emaVal));
            },
            calculateMACD: (closePrices) => {
                if (!closePrices || closePrices.length < 26) return { dif: [], dea: [], macd: [] };
                const ema12 = Indicators.ema(closePrices, 12);
                const ema26 = Indicators.ema(closePrices, 26);
                const dif = ema12.map((v, i) => v - ema26[i]);
                const dea = Indicators.ema(dif, 9);
                const macd = dif.map((v, i) => (v - dea[i]) * 2);
                return { dif, dea, macd };
            },
            calculateKDJ: (history) => {
                if (!history || history.length === 0) return { k: [], d: [], j: [] };
                const period = 9;
                const ks = [], ds = [], js = [];
                let k = 50, d = 50;
                for (let i = 0; i < history.length; i++) {
                    const start = Math.max(0, i - period + 1);
                    const slice = history.slice(start, i + 1);
                    const low = Math.min(...slice.map(data => data.low));
                    const high = Math.max(...slice.map(data => data.high));
                    const rsv = high === low ? 0 : ((history[i].close - low) / (high - low)) * 100;
                    k = (2/3)*k + (1/3)*rsv; d = (2/3)*d + (1/3)*k;
                    js.push(3*k - 2*d); ks.push(k); ds.push(d);
                }
                return { k: ks, d: ds, j: js };
            }
        };

        const aggregateWeekly = (dailyData) => {
            const weekly = [];
            if (!dailyData.length) return weekly;
            const getWeek = (s) => {
                const d = new Date(s);
                d.setDate(d.getDate() + 4 - (d.getDay() || 7));
                return `${d.getFullYear()}-W${Math.ceil((((d-new Date(d.getFullYear(),0,1))/864e5)+1)/7).toString().padStart(2,'0')}`;
            };
            let curW = null, wc = null;
            dailyData.forEach(d => {
                const wk = getWeek(d.time);
                if (wk !== curW) {
                    if (wc) weekly.push(wc);
                    curW = wk; wc = { ...d };
                } else {
                    wc.high = Math.max(wc.high, d.high); wc.low = Math.min(wc.low, d.low);
                    wc.close = d.close; wc.volume += d.volume;
                }
            });
            if (wc) weekly.push(wc);
            return weekly;
        };

        const getMockData = (symbol, price) => ({
            name: `${symbol} (離線模式)`,
            price: String(price),
            change: "+0.00",
            percent: "+0.00%",
            industry: "系統測試模組",
            market: { taiex: "測試數據", sox: "測試數據", nasdaq: "測試數據" },
            peers: [{ name: "模擬對手A", change: "+1.2%" }, { name: "模擬對手B", change: "-0.5%" }],
            valuation: { yield: "---", pb: "---", rating: "測試評估", marketCap: "---" },
            growth: { mom: "-1.5%", yoy: "+12.4%", forwardPE: "15.2", grossMargin: "35.6%" },
            risk: { level: "中", details: "離線模式無法判定真實風險，請恢復連線。" },
            fund: { eps: "---", gross: "---", net: "---", status: "由於 API 額度耗盡或網路異常，目前啟動「離線測試模式」。圖表為真實報價，文字分析皆為系統生成排版使用。" },
            chips: { foreign: "模擬", trust: "模擬", big: "模擬", retail: "模擬", status: "籌碼資料模擬中。請等待 API 額度恢復後取得真實數據。" },
            moneyFlow: { inflow: "---", outflow: "---", net: "---", analysis: "離線模式無資金數據。" },
            tech: { ma: "均線模擬", support: "---", pressure: "---" },
            strategy: { score: 88, conclusion: "離線運行中", short: "測試狀態", swing: "模擬策略", stop: "---" },
            news: [
                { date: "剛剛", title: `【模擬情報】Apple iPhone 16 Pro 發表會落幕，市場關注 ${symbol} 相關硬體供應鏈動向。`, impact: "多" },
                { date: "今日", title: `【模擬情報】NVIDIA RTX 5090 高階顯示卡傳言包下大量產能，引發關注。`, impact: "多" }
            ]
        });

        // 核心修復：精準抓取昨收價、市值與最新報價
        const fetchRealTimeYahoo = async (target) => {
            const timestamp = Date.now();
            const url = `https://query2.finance.yahoo.com/v7/finance/quote?symbols=${target}.TW,${target}.TWO&_t=${timestamp}`;

            const proxies = [
                { url: `https://api.allorigins.win/get?url=${encodeURIComponent(url)}&disableCache=true`, type: 'wrapped' },
                { url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`, type: 'direct' },
                { url: `https://corsproxy.io/?${encodeURIComponent(url)}`, type: 'direct' }
            ];

            for (const proxy of proxies) {
                try {
                    const res = await fetch(proxy.url, { cache: 'no-store' });
                    if (!res.ok) continue;

                    let parsed;
                    if (proxy.type === 'wrapped') {
                        const data = await res.json();
                        if (!data.contents) continue;
                        parsed = JSON.parse(data.contents);
                    } else {
                        parsed = await res.json();
                    }

                    const result = parsed.quoteResponse?.result?.find(r => r.regularMarketPrice);
                    if (!result) continue; 
                    
                    const close = result.regularMarketPrice;
                    const prevClose = result.regularMarketPreviousClose || close; // 強制取得真實昨收
                    const change = close - prevClose;
                    const percent = prevClose !== 0 ? (change / prevClose) * 100 : 0;
                    
                    const open = result.regularMarketOpen || close;
                    const high = result.regularMarketDayHigh || close;
                    const low = result.regularMarketDayLow || close;
                    const volume = result.regularMarketVolume || 0;
                    
                    // 精準處理總市值
                    let marketCapStr = "---";
                    if (result.marketCap) {
                        if (result.marketCap >= 1000000000000) {
                            marketCapStr = (result.marketCap / 1000000000000).toFixed(2) + " 兆";
                        } else {
                            marketCapStr = (result.marketCap / 100000000).toFixed(2) + " 億";
                        }
                    }
                    
                    return {
                        price: close.toFixed(2),
                        change: change > 0 ? '+' + change.toFixed(2) : change.toFixed(2),
                        percent: (change > 0 ? '+' : '') + percent.toFixed(2) + '%',
                        open: open,
                        high: high,
                        low: low,
                        close: close,
                        volume: volume,
                        marketCap: marketCapStr
                    };
                } catch (e) {
                    console.warn(`Proxy Failed (${proxy.url}):`, e.message);
                }
            }
            return null; 
        };

        const fetchWithTimeout = async (url, options = {}, timeout = 30000) => {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch (e) {
                clearTimeout(id);
                if (e.name === 'AbortError') throw new Error("連線逾時");
                throw e;
            }
        };

        const App = () => {
            const [stockId, setStockId] = useState('2330');
            const [inputValue, setInputValue] = useState('');
            const [customKey, setCustomKey] = useState(() => (localStorage.getItem('groq_api_key') || '').trim());
            const [aiModel, setAiModel] = useState(() => (localStorage.getItem('groq_model_name') || 'llama-3.3-70b-versatile').trim());
            
            const [loading, setLoading] = useState(false);
            const [aiLoading, setAiLoading] = useState(false);
            const [error, setError] = useState(null);
            
            const [chartData, setChartData] = useState([]); 
            const [hoverData, setHoverData] = useState(null); // 新增：用於準心連動的即時數據
            
            const [timeframe, setTimeframe] = useState('1D'); 
            const [aiData, setAiData] = useState(null);
            const [isFullScreen, setIsFullScreen] = useState(false);
            const [zenMode, setZenMode] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [animationKey, setAnimationKey] = useState(0);

            const rootRef = useRef(null);
            const chartRefs = useRef({});
            const seriesRefs = useRef({});
            const containerRefs = { kline: useRef(null), vol: useRef(null), macd: useRef(null), kdj: useRef(null) };
            
            const isSyncing = useRef(false);
            const isChartInitialized = useRef(false);
            const isFetchingRef = useRef(false);
            const refreshTimer = useRef(null);
            const enrichedDataRef = useRef([]); // 存放計算完指標的完整陣列供 hover 使用

            const fetchWithRetry = async (url, options = {}, max = 2) => {
                let lastErr = null;
                for (let i = 0; i < max; i++) {
                    try {
                        const res = await fetchWithTimeout(url, options, 30000);
                        if (res.ok) return res;
                        
                        if (res.status === 400) {
                            const errBody = await res.json().catch(() => ({}));
                            const detailedMsg = errBody.error?.message || "請確認模型名稱或 API 格式";
                            throw new Error(`設定格式錯誤(400): ${detailedMsg}`);
                        }

                        if (res.status === 401 || res.status === 403) throw new Error("驗證失敗，請確認 Groq 金鑰是否有效");
                        if (res.status === 404) throw new Error("模型端點無法存取");
                        if (res.status === 429) throw new Error("RATE_LIMIT");

                        if (res.status >= 500) {
                            if (i < max - 1) {
                                await new Promise(r => setTimeout(r, 2000));
                                continue;
                            }
                            throw new Error("SERVER_BUSY");
                        }

                        throw new Error(`伺服器回應異常(${res.status})`);
                    } catch (e) { 
                        lastErr = e; 
                        if (e.message && (e.message.includes("400") || e.message.includes("401") || e.message.includes("403") || e.message.includes("404") || e.message.includes("RATE_LIMIT") || e.message.includes("SERVER_BUSY"))) {
                            throw e; 
                        }
                    }
                }
                throw lastErr || new Error("網路連線異常");
            };

            const handleSearch = useCallback(async () => {
                let input = inputValue.trim();
                if (!input || aiLoading || isFetchingRef.current) return;

                if (/[\u4e00-\u9fa5]/.test(input)) {
                    setLoading(true);
                    setError(null);
                    try {
                        const infoRes = await fetchWithTimeout(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo`);
                        const infoJson = await infoRes.json();
                        if (infoJson.msg === 'success') {
                            const matchedStock = infoJson.data.find(i => i.stock_name === input) || 
                                                 infoJson.data.find(i => i.stock_name.includes(input));
                            
                            if (matchedStock) {
                                input = matchedStock.stock_id;
                                setInputValue(input); 
                            } else {
                                setError(`找不到名稱包含「${input}」的股票代號，請重新確認`);
                                setLoading(false);
                                return;
                            }
                        }
                    } catch (e) {
                        setError("中文名稱轉換伺服器連線異常，請直接輸入股票代號");
                        setLoading(false);
                        return;
                    }
                }
                
                setAnimationKey(prev => prev + 1); 
                setStockId(input.toUpperCase());
            }, [inputValue, aiLoading]);

            const toggleFullScreen = useCallback(() => {
                if (!document.fullscreenElement) {
                    if (rootRef.current) {
                        rootRef.current.requestFullscreen().catch(err => {
                            console.error(`全螢幕失敗: ${err.message}`);
                        });
                    }
                } else {
                    document.exitFullscreen();
                }
            }, []);

            useEffect(() => {
                const fn = () => { setIsFullScreen(!!document.fullscreenElement); if(!!document.fullscreenElement) setZenMode(false); };
                document.addEventListener('fullscreenchange', fn);
                return () => document.removeEventListener('fullscreenchange', fn);
            }, []);

            // 初始化圖表與準心連動事件
            const initCharts = useCallback(() => {
                if (!window.LightweightCharts || isChartInitialized.current || !containerRefs.kline.current) return;
                const width = containerRefs.kline.current.clientWidth;
                const baseOpts = {
                    width, layout: { background: { color: 'transparent' }, textColor: '#9ca3af', fontSize: 11 },
                    grid: { vertLines: { color: 'rgba(255,255,255,0.03)' }, horzLines: { color: 'rgba(255,255,255,0.03)' } },
                    rightPriceScale: { borderColor: 'rgba(255,255,255,0.1)' }, crosshair: { mode: 0 },
                    handleScroll: true, handleScale: true
                };
                
                const h = (isFullScreen || zenMode) ? 400 : 250;

                const kChart = window.LightweightCharts.createChart(containerRefs.kline.current, { ...baseOpts, height: h, timeScale: { borderColor: 'rgba(255,255,255,0.1)', fixRightEdge: true, rightOffset: 5 } });
                const kSeries = kChart.addCandlestickSeries({ upColor: '#ef4444', downColor: '#22c55e', borderVisible: false, wickUpColor: '#ef4444', wickDownColor: '#22c55e' });
                const ma5Series = kChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const ma20Series = kChart.addLineSeries({ color: '#60a5fa', lineWidth: 1.5, crosshairMarkerVisible: false });
                const ma60Series = kChart.addLineSeries({ color: '#4ade80', lineWidth: 1.5, crosshairMarkerVisible: false });
                
                const vChart = window.LightweightCharts.createChart(containerRefs.vol.current, { ...baseOpts, height: 60, timeScale: { visible: false, fixRightEdge: true } });
                const vSeries = vChart.addHistogramSeries({ color: '#3b82f6', priceFormat: { type: 'volume' } });
                
                const mChart = window.LightweightCharts.createChart(containerRefs.macd.current, { ...baseOpts, height: 80, timeScale: { visible: false, fixRightEdge: true } });
                const mDif = mChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const mDea = mChart.addLineSeries({ color: '#60a5fa', lineWidth: 1.5, crosshairMarkerVisible: false });
                const mHist = mChart.addHistogramSeries();
                
                const kjChart = window.LightweightCharts.createChart(containerRefs.kdj.current, { ...baseOpts, height: 80, timeScale: { borderColor: 'rgba(255,255,255,0.1)', fixRightEdge: true } });
                const kjK = kjChart.addLineSeries({ color: '#f8fafc', lineWidth: 1.5, crosshairMarkerVisible: false });
                const kjD = kjChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const kjJ = kjChart.addLineSeries({ color: '#d946ef', lineWidth: 1.5, crosshairMarkerVisible: false });

                chartRefs.current = { kChart, vChart, mChart, kjChart };
                seriesRefs.current = { kSeries, ma5Series, ma20Series, ma60Series, vSeries, macdDifSeries: mDif, macdDeaSeries: mDea, macdHistSeries: mHist, kdjKSeries: kjK, kdjDSeries: kjD, kdjJSeries: kjJ };

                const instances = [kChart, vChart, mChart, kjChart];
                
                instances.forEach(c => {
                    // 同步時間軸縮放
                    c.timeScale().subscribeVisibleLogicalRangeChange(range => {
                        if (!range || isSyncing.current) return;
                        isSyncing.current = true;
                        instances.forEach(other => { if (other !== c) other.timeScale().setVisibleLogicalRange(range); });
                        isSyncing.current = false;
                    });
                    
                    // 核心：準心連動擷取數據
                    c.subscribeCrosshairMove(param => {
                        if (param.time) {
                            const dataPoint = enrichedDataRef.current.find(d => d.time === param.time);
                            if (dataPoint) setHoverData(dataPoint);
                        } else {
                            // 滑鼠移出，回歸最新數據
                            setHoverData(enrichedDataRef.current[enrichedDataRef.current.length - 1]);
                        }
                    });
                });
                isChartInitialized.current = true;
            }, [isFullScreen, zenMode]);

            useEffect(() => {
                if (isChartInitialized.current && chartRefs.current.kChart) {
                    const isLarge = isFullScreen || zenMode;
                    chartRefs.current.kChart.applyOptions({ height: isLarge ? 500 : 250 });
                }
            }, [isFullScreen, zenMode]);

            useEffect(() => {
                if (!containerRefs.kline.current) return;
                const observer = new ResizeObserver(entries => {
                for (let entry of entries) {
                    const width = entry.contentRect.width;
                    if (isChartInitialized.current && chartRefs.current) {
                        Object.values(chartRefs.current).forEach(chart => {
                            if (chart && typeof chart.applyOptions === 'function') chart.applyOptions({ width });
                        });
                    }
                }
                });
                observer.observe(containerRefs.kline.current);
                return () => observer.disconnect();
            }, []);

            // 更新數據並計算指標
            const updateChartData = useCallback((historyArray) => {
                if (!isChartInitialized.current || !historyArray || historyArray.length === 0) return;
                const sorted = [...historyArray].sort((a, b) => new Date(a.time) - new Date(b.time));
                const closePrices = sorted.map(d => d.close);
                const ma5 = Indicators.ema(closePrices, 5);
                const ma20 = Indicators.ema(closePrices, 20);
                const ma60 = Indicators.ema(closePrices, 60);
                const { dif, dea, macd } = Indicators.calculateMACD(closePrices);
                const { k, d, j } = Indicators.calculateKDJ(sorted);
                
                // 儲存完整計算結果供 Hover 連動使用
                const enriched = sorted.map((d, i) => ({
                    ...d,
                    ma5: ma5[i], ma20: ma20[i], ma60: ma60[i],
                    dif: dif[i], dea: dea[i], macd: macd[i],
                    k: k[i], d: d[i], j: j[i]
                }));
                enrichedDataRef.current = enriched;
                setHoverData(enriched[enriched.length - 1]);

                const s = seriesRefs.current;
                if (!s.kSeries) return;

                s.kSeries.setData(sorted);
                s.ma5Series.setData(sorted.map((d, i) => ({ time: d.time, value: ma5[i] })));
                s.ma20Series.setData(sorted.map((d, i) => ({ time: d.time, value: ma20[i] })));
                s.ma60Series.setData(sorted.map((d, i) => ({ time: d.time, value: ma60[i] })));
                s.vSeries.setData(sorted.map(data => ({ time: data.time, value: data.volume, color: data.close >= data.open ? 'rgba(239, 68, 68, 0.9)' : 'rgba(34, 197, 94, 0.9)' })));
                s.macdDifSeries.setData(sorted.map((d, i) => ({ time: d.time, value: dif[i] || 0 })));
                s.macdDeaSeries.setData(sorted.map((d, i) => ({ time: d.time, value: dea[i] || 0 })));
                s.macdHistSeries.setData(sorted.map((d, i) => ({ time: d.time, value: macd[i] || 0, color: macd[i] >= 0 ? '#ef4444' : '#22c55e' })));
                s.kdjKSeries.setData(sorted.map((v, i) => ({ time: v.time, value: k[i] || 50 })));
                s.kdjDSeries.setData(sorted.map((v, i) => ({ time: v.time, value: d[i] || 50 })));
                s.kdjJSeries.setData(sorted.map((v, i) => ({ time: v.time, value: j[i] || 50 })));
            }, []);

            useEffect(() => {
                if (chartData.length > 0) {
                    if (!isChartInitialized.current) initCharts();
                    const displayData = timeframe === '1W' ? aggregateWeekly(chartData) : chartData;
                    updateChartData(displayData);
                }
            }, [timeframe, chartData, initCharts, updateChartData]);

            const executeAnalysis = useCallback(async (target, isRefresh = false) => {
                if (!target || isFetchingRef.current) return;
                isFetchingRef.current = true;

                if (!isRefresh) {
                    setLoading(true); setAiLoading(true); setError(null); setAiData(null); setChartData([]);
                }
                
                try {
                    const infoRes = await fetchWithTimeout(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo`);
                    const infoJson = await infoRes.json();
                    let officialName = target;
                    if (infoJson.msg === 'success') {
                        const stock = infoJson.data.find(i => i.stock_id === target);
                        if (stock) officialName = stock.stock_name;
                    }

                    const d = new Date(); d.setFullYear(d.getFullYear()-1);
                    const historyRes = await fetchWithTimeout(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${target}&start_date=${d.toISOString().split('T')[0]}`, { cache: 'no-store' }, 15000);
                    const hJson = await historyRes.json();
                    
                    let historyCache = [];
                    let lastClosePrice = "---";
                    
                    if (hJson && hJson.msg === 'success' && hJson.data?.length) {
                        historyCache = hJson.data.map(i => ({ 
                            time: i.date, open: Number(i.open), high: Number(i.max), low: Number(i.min), close: Number(i.close), volume: Number(i.Trading_Volume) 
                        }));
                    }

                    // 強制抓取即時 Yahoo 報價
                    let rtData = null;
                    try { rtData = await fetchRealTimeYahoo(target); } catch(e) {}

                    if (historyCache.length > 0) {
                        const latest = historyCache[historyCache.length-1];
                        
                        if (rtData) {
                            lastClosePrice = rtData.price;
                            
                            const todayStr = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Taipei' }).format(new Date());
                            if (latest.time < todayStr) {
                                historyCache.push({ time: todayStr, open: rtData.open, high: rtData.high, low: rtData.low, close: rtData.close, volume: rtData.volume });
                            } else if (latest.time === todayStr) {
                                latest.open = rtData.open; latest.high = rtData.high; latest.low = rtData.low; latest.close = rtData.close;
                                latest.volume = Math.max(latest.volume, rtData.volume);
                            }
                        } else {
                            lastClosePrice = latest.close.toString();
                        }
                        
                        setChartData([...historyCache]);
                    }

                    const cleanKey = customKey ? customKey.replace(/[\s\u200B-\u200D\uFEFF]/g, '') : "";
                    if (!cleanKey) {
                        if(!isRefresh) {
                            setAiData({ 
                                name: officialName, price: lastClosePrice, change: rtData?.change||"0", percent: rtData?.percent||"0%", 
                                market: {taiex:"-",sox:"-",nasdaq:"-"}, peers:[], valuation:{yield:"-",pb:"-",rating:"-", marketCap: rtData?.marketCap || "-"}, 
                                growth: {mom:"-", yoy:"-", forwardPE:"-", grossMargin:"-"}, risk: {level:"-", details:"請設定金鑰。"},
                                fund:{status:"請設定 Groq API 金鑰以啟用深度分析。"}, chips:{status:"-"}, moneyFlow:{inflow:"-", outflow:"-", net:"-", analysis:"-"}, strategy:{score:0}, news:[] 
                            });
                        }
                        setAiLoading(false); setLoading(false);
                        isFetchingRef.current = false;
                        return; 
                    }

                    const nowMs = Date.now();
                    const cacheKey = `groq_cache_${target}`;
                    const savedCache = localStorage.getItem(cacheKey);
                    
                    if (savedCache && !isRefresh) {
                        try {
                            const parsedCache = JSON.parse(savedCache);
                            if (nowMs - parsedCache.timestamp < 14400000) { 
                                const cachedData = parsedCache.data;
                                if (rtData) {
                                    cachedData.price = rtData.price;
                                    cachedData.change = rtData.change;
                                    cachedData.percent = rtData.percent;
                                    if(rtData.marketCap) cachedData.valuation.marketCap = rtData.marketCap;
                                }
                                setAiData(cachedData);
                                setAiLoading(false); setLoading(false);
                                isFetchingRef.current = false;
                                return; 
                            }
                        } catch (e) {}
                    }

                    if (isRefresh) {
                        if (aiData && rtData) {
                            setAiData(prev => {
                                const newD = {...prev, price: rtData.price, change: rtData.change, percent: rtData.percent};
                                if(rtData.marketCap) newD.valuation.marketCap = rtData.marketCap;
                                return newD;
                            });
                        }
                        setAiLoading(false); setLoading(false);
                        isFetchingRef.current = false;
                        return;
                    }

                    const safeModel = aiModel ? aiModel.replace(/[^a-z0-9.-]/gi, '') : "llama-3.3-70b-versatile";
                    
                    const prompt = `分析台股代號[${target}]，正式名稱為[${officialName}]。
                    任務：依據最新市場狀態，提供大盤聯動、估值、營收成長、風險預警、籌碼面、資金流向與最新動態。
                    規則：
                    1. 絕對禁止使用任何表情符號。
                    2. 若在新聞或點評中推薦或提及任何實體商品時，務必清楚寫出具體的「品牌」與「型號」。
                    3. 必須且只能回傳 JSON 格式。請直接輸出 JSON 大括號，不要包含 Markdown 標籤。
                    JSON結構：{"name":"${officialName}","price":"現價","change":"漲跌","percent":"幅度","industry":"產業","market":{"taiex":"大盤","sox":"費半","nasdaq":"那指"},"peers":[{"name":"同業","change":"漲跌"}],"valuation":{"yield":"殖利率","pb":"股淨比","rating":"評價","marketCap":"總市值"},"growth":{"mom":"月營收增減","yoy":"年營收增減","forwardPE":"預估本益比","grossMargin":"最新毛利率"},"risk":{"level":"高/中/低","details":"風險與事件說明"},"fund":{"eps":"EPS","gross":"毛利","net":"淨利","status":"點評"},"chips":{"foreign":"外資","trust":"投信","big":"主力","retail":"散戶","status":"點評"},"moneyFlow":{"inflow":"流入預估","outflow":"流出預估","net":"淨流入流出","analysis":"資金面點評"},"tech":{"ma":"均線","support":"支撐","pressure":"壓力"},"strategy":{"score":85,"conclusion":"判定","short":"短線","swing":"策略","stop":"停損"},"news":[{"date":"日期","title":"標題","impact":"多空"}]}`;

                    const apiUrl = `https://api.groq.com/openai/v1/chat/completions`;

                    const aiRes = await fetchWithRetry(apiUrl, {
                        method: 'POST', 
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${cleanKey}`
                        },
                        body: JSON.stringify({ 
                            model: safeModel,
                            temperature: 0.1,
                            messages: [
                                { role: "system", content: prompt },
                                { role: "user", content: `請提供台股 [${target}] 的深度分析數據，直接輸出純 JSON。` }
                            ]
                        })
                    }, 2);

                    const aiJson = await aiRes.json();
                    let rawText = aiJson.choices?.[0]?.message?.content;
                    if (!rawText) throw new Error("AI 模型未能產出內容");
                    
                    rawText = rawText.replace(/```json/gi, '').replace(/```/gi, '').trim();
                    const match = rawText.match(/\{[\s\S]*\}/);
                    if (!match) throw new Error("資料格式無法解析");
                    
                    const rawP = JSON.parse(match[0]);
                    
                    const safeAiData = {
                        name: officialName,
                        price: rtData ? rtData.price : String(rawP.price || lastClosePrice),
                        change: rtData ? rtData.change : String(rawP.change || "0"),
                        percent: rtData ? rtData.percent : String(rawP.percent || "0%"),
                        industry: String(rawP.industry || "-"),
                        market: {
                            taiex: String(rawP.market?.taiex || "-"), sox: String(rawP.market?.sox || "-"), nasdaq: String(rawP.market?.nasdaq || "-")
                        },
                        peers: Array.isArray(rawP.peers) ? rawP.peers.map(p => ({
                            name: String(p?.name || "-"), change: String(p?.change || "0")
                        })) : [],
                        valuation: {
                            yield: String(rawP.valuation?.yield || "-"), pb: String(rawP.valuation?.pb || "-"), rating: String(rawP.valuation?.rating || "-"), 
                            marketCap: rtData && rtData.marketCap !== "---" ? rtData.marketCap : String(rawP.valuation?.marketCap || "-")
                        },
                        growth: {
                            mom: String(rawP.growth?.mom || "-"), yoy: String(rawP.growth?.yoy || "-"), forwardPE: String(rawP.growth?.forwardPE || "-"), grossMargin: String(rawP.growth?.grossMargin || "-")
                        },
                        risk: {
                            level: String(rawP.risk?.level || "-"), details: String(rawP.risk?.details || "-")
                        },
                        fund: {
                            eps: String(rawP.fund?.eps || "-"), gross: String(rawP.fund?.gross || "-"), net: String(rawP.fund?.net || "-"), status: String(rawP.fund?.status || "-")
                        },
                        chips: {
                            foreign: String(rawP.chips?.foreign || "-"), trust: String(rawP.chips?.trust || "-"), big: String(rawP.chips?.big || "-"), retail: String(rawP.chips?.retail || "-"), status: String(rawP.chips?.status || "-")
                        },
                        moneyFlow: {
                            inflow: String(rawP.moneyFlow?.inflow || "-"), outflow: String(rawP.moneyFlow?.outflow || "-"), net: String(rawP.moneyFlow?.net || "-"), analysis: String(rawP.moneyFlow?.analysis || "-")
                        },
                        tech: {
                            ma: String(rawP.tech?.ma || "-"), support: String(rawP.tech?.support || "-"), pressure: String(rawP.tech?.pressure || "-")
                        },
                        strategy: {
                            score: Number(rawP.strategy?.score) || 0, conclusion: String(rawP.strategy?.conclusion || "-"), short: String(rawP.strategy?.short || "-"), swing: String(rawP.strategy?.swing || "-"), stop: String(rawP.strategy?.stop || "-")
                        },
                        news: Array.isArray(rawP.news) ? rawP.news.map(n => ({
                            date: String(n?.date || "-"), title: String(n?.title || "-"), impact: String(n?.impact || "-")
                        })) : []
                    };

                    setAiData(safeAiData);
                    localStorage.setItem(cacheKey, JSON.stringify({ timestamp: nowMs, data: safeAiData }));

                } catch (e) { 
                    if (e.message === "RATE_LIMIT" || e.message === "SERVER_BUSY" || e.message.includes("連線逾時")) {
                        const mockData = getMockData(target, lastClosePrice);
                        setAiData(mockData);
                        setError("API 額度限制或異常。啟動「離線測試模式」，圖表為真實報價。");
                    } else {
                        if(!isRefresh) setError(`診斷異常：${e.message || "連線不穩定"}`); 
                    }
                } finally { 
                    setAiLoading(false); 
                    setLoading(false);
                    isFetchingRef.current = false;
                }
            }, [customKey, aiModel]);

            useEffect(() => {
                executeAnalysis(stockId);
                refreshTimer.current = setInterval(() => executeAnalysis(stockId, true), 60000);
                return () => clearInterval(refreshTimer.current);
            }, [stockId, executeAnalysis]);

            const saveSettings = () => { 
                const cleanKey = customKey.replace(/[\s\u200B-\u200D\uFEFF]/g, '');
                const cleanModel = aiModel.replace(/[^a-z0-9.-]/gi, '') || 'llama-3.3-70b-versatile';
                localStorage.setItem('groq_api_key', cleanKey); 
                localStorage.setItem('groq_model_name', cleanModel);
                setCustomKey(cleanKey);
                setAiModel(cleanModel);
                setShowSettings(false); 
                executeAnalysis(stockId);
            };

            const isUp = aiData?.change && !String(aiData.change).includes('-');
            const priceColor = !aiData?.change || String(aiData.change) === '0' ? 'text-white' : isUp ? 'text-red-500' : 'text-green-500';
            
            const zenClass = zenMode ? "fixed inset-0 z-[9999] bg-[#050505] p-2 lg:p-4" : "";
            const headerStatus = aiData?.name || (aiLoading ? '系統分析處理中' : '等待輸入指令');
            const disableInput = aiLoading;

            return (
                <div key={animationKey} ref={rootRef} className={`min-h-screen bg-[#050505] text-gray-200 font-sans p-1 lg:p-2 overflow-hidden flex flex-col ${zenClass}`}>
                    
                    <header className="flex-none flex flex-col md:flex-row justify-between items-center mb-3 bg-[#0a0a0a] p-3 lg:p-4 border border-white/5 rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.5)] relative header-glow">
                        <div className="flex flex-col lg:flex-row lg:items-center gap-4 w-full lg:w-auto">
                            <div className="flex items-center gap-4">
                                <div className="flex flex-col">
                                    <h1 className="text-xl font-bold text-white tracking-tighter">{headerStatus}</h1>
                                    <span className="text-blue-500 font-mono text-sm uppercase tracking-widest">{stockId}</span>
                                </div>
                                <div className="h-8 w-px bg-white/10 mx-2 hidden lg:block"></div>
                                <div className="flex items-baseline gap-3">
                                    <span className={`text-4xl font-black font-mono tracking-tighter ${priceColor}`}>{aiData ? aiData.price : '---'}</span>
                                    <div className="flex flex-col text-sm font-bold font-mono">
                                        <span className={priceColor}>{aiData ? aiData.change : ''}</span>
                                        <span className={priceColor}>{aiData ? aiData.percent : ''}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="flex items-center gap-2 mt-4 md:mt-0 w-full lg:w-auto justify-end">
                            {aiLoading ? <div className="w-5 h-5 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mr-2"></div> : null}
                            <input 
                                type="text" 
                                value={inputValue} 
                                onChange={e => setInputValue(e.target.value)} 
                                onKeyDown={e => { if (e.key === 'Enter') handleSearch(); }} 
                                placeholder="輸入名稱 (如: 台積電) 或 代號" 
                                disabled={disableInput}
                                className="w-56 bg-[#111] border border-white/10 px-3 py-2 text-xs font-bold rounded-lg text-white focus:border-blue-500 outline-none transition-all disabled:opacity-50 shadow-inner" 
                            />
                            <button onClick={handleSearch} disabled={disableInput} className="bg-blue-600/80 border border-blue-500 px-4 py-2 text-xs font-bold rounded-lg hover:bg-blue-600 transition-all uppercase tracking-widest disabled:opacity-50 shadow-lg shadow-blue-900/20">
                                查詢
                            </button>
                            <button onClick={() => setShowSettings(!showSettings)} disabled={aiLoading} className="bg-gray-800 border border-white/10 px-4 py-2 text-xs font-bold rounded-lg hover:bg-gray-700 transition-all uppercase tracking-widest disabled:opacity-50">設定</button>
                            <button onClick={toggleFullScreen} className={`border px-4 py-2 text-xs font-black rounded-lg transition-all uppercase tracking-widest ${zenMode || isFullScreen ? 'bg-red-900/40 border-red-700 text-red-200 hover:bg-red-800/60' : 'bg-transparent border-white/10 text-gray-300 hover:bg-white/5'}`}>
                                {isFullScreen || zenMode ? '退出全螢幕' : '全螢幕'}
                            </button>
                        </div>
                    </header>

                    {showSettings ? (
                        <div className="absolute top-20 right-6 z-[100] w-[380px] p-6 glass-panel border border-white/10 rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.8)]">
                            <h3 className="text-base font-bold mb-5 border-b border-gray-800 pb-3 text-blue-400">系統核心配置</h3>
                            <div className="space-y-5">
                                <div>
                                    <label className="text-xs block text-gray-400 mb-2 font-bold tracking-widest font-mono">Groq API Key (gsk_ 開頭)</label>
                                    <input type="password" value={customKey} onChange={e => setCustomKey(e.target.value)} className="w-full bg-black border border-gray-700 p-2.5 text-xs rounded-lg focus:border-blue-500 outline-none font-mono" placeholder="貼入 API 金鑰" />
                                </div>
                                <div>
                                    <label className="text-xs block text-gray-400 mb-2 font-bold tracking-widest font-mono">AI 運算模型配置</label>
                                    <select value={aiModel} onChange={e => setAiModel(e.target.value)} className="w-full bg-black border border-gray-700 p-2.5 text-xs rounded-lg focus:border-blue-500 outline-none font-mono text-gray-200">
                                        <option value="llama-3.3-70b-versatile">Llama 3.3 70B (推薦/邏輯最強)</option>
                                        <option value="llama-3.1-8b-instant">Llama 3.1 8B (極速/日常看盤)</option>
                                    </select>
                                </div>
                                <div className="border-t border-gray-800 pt-5 mt-2">
                                    <button onClick={(e) => {
                                        Object.keys(localStorage).forEach(k => { if(k.startsWith('groq_cache_')) localStorage.removeItem(k); });
                                        e.target.innerText = "已清除快取！(下回查詢強制連線)";
                                        setTimeout(() => { e.target.innerText = "清除本機深度分析快取"; }, 2000);
                                    }} className="w-full bg-red-900/30 border border-red-800/50 text-red-300 py-2.5 text-xs font-bold rounded-lg hover:bg-red-800/50 transition-colors">清除本機深度分析快取</button>
                                </div>
                                <div className="flex gap-3 pt-2">
                                    <button onClick={saveSettings} className="flex-1 bg-blue-600 py-2.5 text-xs font-black rounded-lg hover:bg-blue-500 transition-colors shadow-lg">儲存設定</button>
                                    <button onClick={() => setShowSettings(false)} className="px-6 bg-gray-800 text-xs font-bold rounded-lg hover:bg-gray-700">關閉</button>
                                </div>
                            </div>
                        </div>
                    ) : null}

                    {error ? (
                        <div className="flex-none bg-red-900/30 border border-red-500/30 text-red-300 p-2.5 text-center text-xs font-bold mb-3 rounded-xl flex items-center justify-center gap-4 shadow-lg">
                            <span>系統提示：{error}</span>
                        </div>
                    ) : null}

                    <main className={`flex-1 grid grid-cols-1 lg:grid-cols-12 gap-3 overflow-hidden ${(isFullScreen || zenMode) ? 'h-full' : ''}`}>
                        
                        {/* 左側：市場、同業、估值、成長、風險 */}
                        <div className="col-span-12 lg:col-span-3 flex flex-col gap-3 overflow-y-auto custom-scrollbar pr-1 pb-2">
                            {!customKey ? (
                                <div className="panel-card p-5 text-center mb-1 flex-none border-blue-900/30 bg-blue-950/10">
                                    <p className="text-xs text-blue-300 font-bold mb-4 tracking-widest leading-relaxed">請設定 Groq 金鑰以啟用 AI 分析</p>
                                    <button onClick={() => setShowSettings(true)} className="bg-blue-600 text-white text-xs px-8 py-2.5 rounded-lg font-black hover:bg-blue-500 shadow-[0_0_15px_rgba(37,99,235,0.4)] transition-all">立即設定</button>
                                </div>
                            ) : null}
                            
                            <div className="panel-card flex-none animate-fade-up">
                                <div className="bg-blue-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-blue-400 font-bold text-xs tracking-widest uppercase">市場聯動分析</span></div>
                                <div className="p-4 space-y-3 text-xs">
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono tracking-widest"><span className="text-gray-500">台股大盤</span><span className="text-white font-bold">{aiData?.market?.taiex || (aiLoading ? "讀取中" : "---")}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono tracking-widest"><span className="text-gray-500">費半指數</span><span className="text-white font-bold">{aiData?.market?.sox || (aiLoading ? "讀取中" : "---")}</span></div>
                                    <div className="flex justify-between pb-1 font-mono tracking-widest"><span className="text-gray-500">那斯達克</span><span className="text-white font-bold">{aiData?.market?.nasdaq || (aiLoading ? "讀取中" : "---")}</span></div>
                                </div>
                            </div>
                            
                            <div className="panel-card flex-none animate-fade-up delay-100">
                                <div className="bg-purple-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-purple-400 font-bold text-xs tracking-widest uppercase">同業競爭比較</span></div>
                                <div className="p-4 space-y-2 text-xs">
                                    {aiData?.peers && aiData.peers.length > 0 ? (
                                        aiData.peers.map((p, i) => (
                                            <div key={i} className="flex justify-between bg-black/40 p-3 mb-2 rounded-lg border border-white/5 font-mono hover:bg-white/5 transition-colors">
                                                <span className="text-gray-200 font-bold">{p.name}</span>
                                                <span className={p.change && String(p.change).includes('-') ? 'text-green-400' : 'text-red-400'}>{p.change}</span>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="loading-shimmer h-12 rounded-lg opacity-20"></div>
                                    )}
                                </div>
                            </div>
                            
                            <div className="panel-card flex-none animate-fade-up delay-200">
                                <div className="bg-slate-900/40 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-gray-300 font-bold text-xs tracking-widest uppercase">基本面與估值</span></div>
                                <div className="p-4 space-y-3 text-xs">
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-blue-300 tracking-tighter">公司總市值 <span className="text-white font-bold font-mono">{aiData?.valuation?.marketCap || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">殖利率/股淨比 <span className="text-white font-bold font-mono">{aiData?.valuation?.yield || "---"} / {aiData?.valuation?.pb || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">AI 估值評等 <span className="text-yellow-400 font-black tracking-widest text-sm">{aiData?.valuation?.rating || "---"}</span></div>
                                </div>
                            </div>

                            <div className="panel-card flex-none animate-fade-up delay-300">
                                <div className="bg-cyan-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-cyan-400 font-bold text-xs tracking-widest uppercase">營收與獲利動能</span></div>
                                <div className="p-4 space-y-3 text-xs">
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">月營收 (MoM) <span className="text-white font-bold font-mono">{aiData?.growth?.mom || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">年營收 (YoY) <span className="text-white font-bold font-mono">{aiData?.growth?.yoy || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">預估本益比 (F.P/E) <span className="text-yellow-400 font-bold font-mono">{aiData?.growth?.forwardPE || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">最新毛利率 <span className="text-white font-bold font-mono">{aiData?.growth?.grossMargin || "---"}</span></div>
                                </div>
                            </div>

                            <div className="panel-card flex-1 flex flex-col min-h-[140px] animate-fade-up delay-400">
                                <div className="bg-red-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl flex justify-between items-center text-red-400 font-bold text-xs tracking-widest font-mono"><span>風險與事件預警</span><span className={`px-2 py-0.5 rounded text-[10px] bg-red-900/40 text-white shadow-inner`}>{aiData?.risk?.level || "-"} 風險</span></div>
                                <div className="p-4 flex-1 text-xs text-gray-400 leading-relaxed text-justify whitespace-normal break-words">
                                    {aiData?.risk?.details || (aiLoading ? "正在掃描市場潛在風險與事件..." : "等待資訊同步")}
                                </div>
                            </div>
                        </div>

                        {/* 中間：量化技術圖表與準心連動面板 */}
                        <div className="col-span-12 lg:col-span-6 flex flex-col overflow-hidden pb-2">
                            <div className="panel-card flex-1 flex flex-col relative overflow-hidden shadow-2xl animate-fade-up delay-100">
                                
                                <div className="bg-green-950/20 border-b border-white/5 p-3 px-5 flex justify-between items-center z-10 h-14 rounded-t-xl">
                                    <span className="text-green-400 font-bold text-sm tracking-widest uppercase">技術線圖終端</span>
                                    <div className="flex border border-white/10 rounded-lg overflow-hidden h-8 bg-black/40 shadow-inner">
                                        <button onClick={() => setTimeframe('1D')} disabled={aiLoading} className={`px-5 text-xs font-black transition-colors ${timeframe === '1D' ? 'bg-gray-700 text-white' : 'text-gray-400 hover:text-white hover:bg-white/5'} disabled:opacity-50`}>日線</button>
                                        <button onClick={() => setTimeframe('1W')} disabled={aiLoading} className={`px-5 text-xs font-black transition-colors ${timeframe === '1W' ? 'bg-gray-700 text-white' : 'text-gray-400 hover:text-white hover:bg-white/5'} disabled:opacity-50`}>週線</button>
                                    </div>
                                </div>

                                <div className="flex-1 relative bg-black/50 flex flex-col overflow-hidden">
                                    {(!loading && chartData.length === 0 && !error) ? (
                                        <div className="absolute inset-0 flex flex-col justify-center items-center z-20 bg-black/80 backdrop-blur-sm">
                                            <span className="text-gray-500 text-sm font-black tracking-[0.5em] uppercase">No Data Stream</span>
                                        </div>
                                    ) : null}
                                    {(loading && chartData.length === 0) ? (
                                        <div className="absolute inset-0 flex flex-col justify-center items-center z-20 bg-black/80 backdrop-blur-sm">
                                            <span className="text-blue-500 text-sm font-black animate-pulse tracking-[0.5em] uppercase">Connecting...</span>
                                        </div>
                                    ) : null}

                                    {/* K線 實體分隔指標與連動數據 */}
                                    <div className="flex justify-between items-center px-4 py-2 bg-[#0a0a0a] border-b border-white/5 text-[11px] font-mono z-10 shadow-sm">
                                        <span className="text-gray-400 font-bold hidden sm:block">K線與均線</span>
                                        <div className="flex gap-4">
                                            <span className="text-gray-500">{hoverData?.time || '最新'}</span>
                                            <span className="text-white">開:{hoverData?.open||'-'} 高:{hoverData?.high||'-'} 低:{hoverData?.low||'-'} 收:{hoverData?.close||'-'}</span>
                                            <span className="text-yellow-400">MA5:{hoverData?.ma5?.toFixed(2)||'-'}</span>
                                            <span className="text-blue-400">MA20:{hoverData?.ma20?.toFixed(2)||'-'}</span>
                                            <span className="text-green-400">MA60:{hoverData?.ma60?.toFixed(2)||'-'}</span>
                                        </div>
                                    </div>
                                    <div className="relative w-full flex-1 min-h-[150px]">
                                        <div ref={containerRefs.kline} className="absolute inset-0 w-full h-full" />
                                    </div>
                                    
                                    {/* 成交量 實體分隔指標與連動數據 */}
                                    <div className="flex justify-between items-center px-4 py-1.5 bg-[#0a0a0a] border-t border-b border-white/5 text-[10px] font-mono z-10">
                                        <span className="text-gray-400 font-bold">成交量 (Volume)</span>
                                        <span className="text-blue-300 font-bold">Vol: {hoverData?.volume || '-'}</span>
                                    </div>
                                    <div className="relative w-full h-[60px] flex-none bg-black/20">
                                        <div ref={containerRefs.vol} className="absolute inset-0 w-full h-full" />
                                    </div>
                                    
                                    {/* MACD 實體分隔指標與連動數據 */}
                                    <div className="flex justify-between items-center px-4 py-1.5 bg-[#0a0a0a] border-t border-b border-white/5 text-[10px] font-mono z-10">
                                        <span className="text-gray-400 font-bold">MACD (12, 26, 9)</span>
                                        <div className="flex gap-4">
                                            <span className={hoverData?.macd >= 0 ? "text-red-400" : "text-green-400"}>MACD:{hoverData?.macd?.toFixed(2)||'-'}</span>
                                            <span className="text-yellow-400">DIF:{hoverData?.dif?.toFixed(2)||'-'}</span>
                                            <span className="text-blue-400">DEA:{hoverData?.dea?.toFixed(2)||'-'}</span>
                                        </div>
                                    </div>
                                    <div className="relative w-full h-[80px] flex-none bg-black/20">
                                        <div ref={containerRefs.macd} className="absolute inset-0 w-full h-full" />
                                    </div>
                                    
                                    {/* KDJ 實體分隔指標與連動數據 */}
                                    <div className="flex justify-between items-center px-4 py-1.5 bg-[#0a0a0a] border-t border-b border-white/5 text-[10px] font-mono z-10">
                                        <span className="text-gray-400 font-bold">KDJ (9, 3, 3)</span>
                                        <div className="flex gap-4">
                                            <span className="text-white">K:{hoverData?.k?.toFixed(2)||'-'}</span>
                                            <span className="text-yellow-400">D:{hoverData?.d?.toFixed(2)||'-'}</span>
                                            <span className="text-pink-400">J:{hoverData?.j?.toFixed(2)||'-'}</span>
                                        </div>
                                    </div>
                                    <div className="relative w-full h-[80px] flex-none bg-black/20 rounded-b-xl">
                                        <div ref={containerRefs.kdj} className="absolute inset-0 w-full h-full" />
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 右側：籌碼、資金、戰略、新聞 */}
                        <div className="col-span-12 lg:col-span-3 flex flex-col gap-3 overflow-y-auto custom-scrollbar pl-1 pb-2">
                            <div className="panel-card flex-none animate-fade-up">
                                <div className="bg-purple-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-purple-400 font-bold text-xs tracking-widest uppercase">籌碼流向解析</span></div>
                                <div className="p-4 space-y-3 text-xs">
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">外資動態 <span className="text-white font-bold font-mono">{aiData?.chips?.foreign || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">投信動態 <span className="text-blue-400 font-bold font-mono">{aiData?.chips?.trust || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">主力持股 <span className="text-white font-black font-mono">{aiData?.chips?.big || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">散戶持股 <span className="text-white font-bold font-mono">{aiData?.chips?.retail || "---"}</span></div>
                                </div>
                            </div>

                            <div className="panel-card flex-none animate-fade-up delay-100">
                                <div className="bg-indigo-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-indigo-400 font-bold text-xs tracking-widest uppercase">資金面監測</span></div>
                                <div className="p-4 space-y-3 text-xs">
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">買盤流入 <span className="text-red-400 font-bold font-mono">{aiData?.moneyFlow?.inflow || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">賣盤流出 <span className="text-green-400 font-bold font-mono">{aiData?.moneyFlow?.outflow || "---"}</span></div>
                                    <div className="flex justify-between border-b border-white/5 pb-2 font-mono text-gray-500 tracking-tighter">淨額 <span className="text-white font-black font-mono text-sm">{aiData?.moneyFlow?.net || "---"}</span></div>
                                    <div className="mt-3 text-gray-400 bg-black/40 p-3 border border-white/5 rounded-lg leading-relaxed text-justify whitespace-normal break-words">{aiData?.moneyFlow?.analysis || (aiLoading ? "正在解析資金流向..." : "等待同步")}</div>
                                </div>
                            </div>

                            <div className="panel-card flex-none animate-fade-up delay-200">
                                <div className="bg-orange-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl flex justify-between items-center"><span className="text-orange-400 font-bold text-xs tracking-widest uppercase">AI 戰略矩陣</span><span className="text-lg font-black text-white font-mono bg-orange-900/30 px-2 py-0.5 rounded shadow-inner">{aiData?.strategy?.score || 0} 評分</span></div>
                                <div className="p-4 space-y-3 text-xs">
                                    <div className="bg-black/40 p-4 rounded-lg border border-white/5 shadow-inner"><span className="text-white font-black block mb-2 text-sm font-mono whitespace-normal">{aiData?.strategy?.conclusion || (aiLoading ? "運算中..." : "等待分析")}</span><span className="text-gray-400 block text-xs tracking-tighter font-bold font-mono">短線操作：{aiData?.strategy?.short || "Analyzing"}</span></div>
                                    <div className="flex justify-between p-3 bg-red-950/20 border border-red-900/30 font-mono text-red-400 font-black text-xs tracking-widest uppercase rounded-lg">停損建議 <span className="text-white font-black text-sm">{aiData?.strategy?.stop || "---"}</span></div>
                                </div>
                            </div>

                            <div className="panel-card flex-1 min-h-[200px] flex flex-col animate-fade-up delay-300">
                                <div className="bg-yellow-950/20 border-b border-white/5 p-2.5 px-4 rounded-t-xl"><span className="text-yellow-400 font-bold text-xs tracking-widest uppercase">即時情報與觀點</span></div>
                                <div className="p-2 space-y-1 flex-1 overflow-y-auto custom-scrollbar">
                                    {aiData?.news && aiData.news.length > 0 ? (
                                        aiData.news.map((n, i) => (
                                            <a key={i} href={"https://www.google.com/search?q=" + encodeURIComponent(stockId + ' ' + String(n.title)) + "&tbm=nws"} target="_blank" rel="noreferrer" className="block border-b border-white/5 p-3 hover:bg-white/5 transition-colors rounded-lg group">
                                                <div className="flex justify-between text-[10px] mb-2 font-mono text-gray-500">{n.date} <span className={n.impact === '多' ? 'text-red-400 font-black' : 'text-green-400 font-black'}>{n.impact}</span></div>
                                                <span className="text-gray-300 font-bold text-xs line-clamp-2 leading-relaxed group-hover:text-blue-400 transition-colors">{n.title}</span>
                                            </a>
                                        ))
                                    ) : (
                                        <div className="loading-shimmer h-24 rounded-lg opacity-20 m-2"></div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
