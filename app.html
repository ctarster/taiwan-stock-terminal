<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化決策終端 PRO - 機構版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background-color: #030303; margin: 0; padding: 0; color: #d1d5db; overflow: hidden; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        #root { height: 100%; width: 100%; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }
        * { scrollbar-width: thin; scrollbar-color: #333 #000; }
        @keyframes pulseBorder { 0%, 100% { border-color: rgba(220, 38, 38, 0.3); } 50% { border-color: rgba(220, 38, 38, 0.8); } }
        .glass-panel { background: rgba(10, 10, 10, 0.97); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .panel-card { background-color: #050505; border: 1px solid rgba(255,255,255,0.06); border-radius: 0.25rem; }
        .predict-panel { border: 1px solid rgba(220, 38, 38, 0.4); animation: pulseBorder 3s infinite ease-in-out; }
        
        /* 響應式字體大小調整 */
        @media (max-width: 1400px) {
            .responsive-text-sm { font-size: 0.7rem; }
            .responsive-text-base { font-size: 0.8rem; }
            .responsive-text-lg { font-size: 1rem; }
            .responsive-text-xl { font-size: 1.25rem; }
            .responsive-text-3xl { font-size: 1.875rem; }
            .header-padding { padding: 0.5rem; }
            .panel-padding { padding: 0.5rem; }
        }
        @media (min-width: 1401px) {
            .responsive-text-sm { font-size: 0.75rem; }
            .responsive-text-base { font-size: 0.875rem; }
            .responsive-text-lg { font-size: 1.125rem; }
            .responsive-text-xl { font-size: 1.5rem; }
            .responsive-text-3xl { font-size: 2.25rem; }
            .header-padding { padding: 0.75rem; }
            .panel-padding { padding: 0.75rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        const DEFAULT_GROQ_MODEL = "llama-3.3-70b-versatile";

        const STOCK_NAMES = {
            '2330': '台積電', '2317': '鴻海', '2454': '聯發科', '3481': '群創',
            '2603': '長榮', '2308': '台達電', '2382': '廣達', '3231': '緯創',
            '2356': '英業達', '2618': '陽明', '2615': '萬海', '2412': '中華電'
        };

        const getStockName = (id) => STOCK_NAMES[id] || id;

        const safeNum = (val, fallback = 0) => {
            if (val === null || val === undefined || val === '' || val === '-') return fallback;
            const n = Number(val);
            return (!isNaN(n) && isFinite(n)) ? n : fallback;
        };
        const fmtPrice   = v => (v == null || v === '---') ? '---' : isNaN(+v) ? '---' : (+v).toFixed(2);
        const fmtChange  = v => { if (v == null || isNaN(+v)) return '---'; return +v > 0 ? `+${(+v).toFixed(2)}` : (+v).toFixed(2); };
        const fmtPct     = v => { if (v == null || isNaN(+v)) return '---'; return +v > 0 ? `+${(+v).toFixed(2)}%` : `${(+v).toFixed(2)}%`; };
        const fmtVol     = v => (v == null || isNaN(+v)) ? '0' : Math.round(+v).toLocaleString('en-US');

        const Indicators = {
            ema(data, period) {
                if (!data || data.length === 0) return [];
                const k = 2 / (period + 1);
                let prev = safeNum(data[0]);
                return data.map((v, i) => { if (i === 0) return prev; prev = (safeNum(v) - prev) * k + prev; return prev; });
            },
            rsi(prices, period = 14) {
                if (prices.length <= period) return prices.map(() => 50);
                const out = new Array(prices.length).fill(50);
                let gains = 0, losses = 0;
                for (let i = 1; i <= period; i++) {
                    const d = prices[i] - prices[i - 1];
                    d >= 0 ? gains += d : losses -= d;
                }
                let ag = gains / period, al = losses / period;
                out[period] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
                for (let i = period + 1; i < prices.length; i++) {
                    const d = prices[i] - prices[i - 1];
                    const g = d > 0 ? d : 0, l = d < 0 ? -d : 0;
                    ag = (ag * (period - 1) + g) / period;
                    al = (al * (period - 1) + l) / period;
                    out[i] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
                }
                return out;
            },
            atr(history, period = 14) {
                if (!history || history.length < period) return history.map(() => 0);
                const trs = [0];
                for (let i = 1; i < history.length; i++) {
                    const { high: h, low: l, close: pc } = { high: history[i].high, low: history[i].low, close: history[i - 1].close };
                    trs.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
                }
                const out = new Array(history.length).fill(0);
                out[period] = trs.slice(1, period + 1).reduce((a, b) => a + b, 0) / period;
                for (let i = period + 1; i < history.length; i++) out[i] = (out[i - 1] * (period - 1) + trs[i]) / period;
                return out;
            },
            macd(prices) {
                if (prices.length < 26) return { dif: prices.map(() => 0), dea: prices.map(() => 0), hist: prices.map(() => 0) };
                const ema12 = Indicators.ema(prices, 12);
                const ema26 = Indicators.ema(prices, 26);
                const dif = ema12.map((v, i) => v - ema26[i]);
                const dea = Indicators.ema(dif, 9);
                return { dif, dea, hist: dif.map((v, i) => (v - dea[i]) * 2) };
            },
            kdj(history) {
                if (!history || history.length === 0) return { k: [], d: [], j: [] };
                const ks = [], ds = [], js = [];
                let k = 50, d = 50;
                for (let i = 0; i < history.length; i++) {
                    const slice = history.slice(Math.max(0, i - 8), i + 1);
                    const c = safeNum(history[i].close);
                    const lo = Math.min(...slice.map(h => safeNum(h.low, c)));
                    const hi = Math.max(...slice.map(h => safeNum(h.high, c)));
                    const rsv = hi === lo ? 0 : ((c - lo) / (hi - lo)) * 100;
                    k = (2 / 3) * k + (1 / 3) * rsv;
                    d = (2 / 3) * d + (1 / 3) * k;
                    ks.push(k); ds.push(d); js.push(3 * k - 2 * d);
                }
                return { k: ks, d: ds, j: js };
            }
        };

        const fetchWithTimeout = async (url, opts = {}, ms = 8000) => {
            const ctrl = new AbortController();
            const tid = setTimeout(() => ctrl.abort(), ms);
            try {
                const res = await fetch(url, { ...opts, signal: ctrl.signal });
                clearTimeout(tid);
                return res;
            } catch (e) { clearTimeout(tid); throw new Error('Timeout'); }
        };

        const fetchFastestProxy = async (url, timeoutMs = 7000) => {
            const cb = `_cb=${Date.now()}_${Math.floor(Math.random() * 100000)}`;
            const safeUrl = url.includes('?') ? `${url}&${cb}` : `${url}?${cb}`;
            
            const proxies = [
                { url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(safeUrl)}`, isWrapper: false },
                { url: `https://api.allorigins.win/raw?url=${encodeURIComponent(safeUrl)}`, isWrapper: false }
            ];

            const controllers = proxies.map(() => new AbortController());

            try {
                const result = await Promise.any(proxies.map(async (proxyObj, idx) => {
                    const id = setTimeout(() => controllers[idx].abort(), timeoutMs);
                    try {
                        const res = await fetch(proxyObj.url, { cache: 'no-store', signal: controllers[idx].signal });
                        clearTimeout(id);
                        if (!res.ok) throw new Error('Bad Status');
                        const text = await res.text();
                        let json = JSON.parse(text);
                        return json;
                    } catch (e) {
                        clearTimeout(id);
                        throw e;
                    }
                }));
                controllers.forEach(c => c.abort());
                return result;
            } catch (e) {
                return null;
            }
        };

        const fetchTWSE_RealTime = async (target) => {
            const url = `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_${target}.tw|otc_${target}.tw&json=1&delay=0`;
            try {
                const data = await fetchFastestProxy(url, 4000);
                if (data?.msgArray?.length > 0) {
                    const r = data.msgArray[0];
                    const prevClose = safeNum(r.y, 0);
                    const currentPrice = r.z !== '-' ? safeNum(r.z, prevClose) : prevClose;
                    const change = currentPrice - prevClose;
                    const percent = prevClose !== 0 ? (change / prevClose) * 100 : 0;
                    
                    return {
                        price: currentPrice,
                        change: change,
                        percent: percent,
                        open: r.o !== '-' ? safeNum(r.o, currentPrice) : currentPrice,
                        high: r.h !== '-' ? safeNum(r.h, currentPrice) : currentPrice,
                        low: r.l !== '-' ? safeNum(r.l, currentPrice) : currentPrice,
                        volume: safeNum(r.v, 0),
                        name: r.n || getStockName(target)
                    };
                }
            } catch(e) {}
            return { name: getStockName(target) };
        };

        const fetchHistoryData = async (target) => {
            try {
                const startDate = new Date();
                startDate.setFullYear(startDate.getFullYear() - 2);
                const startDateStr = `${startDate.getFullYear()}-${String(startDate.getMonth()+1).padStart(2,'0')}-${String(startDate.getDate()).padStart(2,'0')}`;
                const fmUrl = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${target}&start_date=${startDateStr}`;
                
                const res = await fetchWithTimeout(fmUrl, {}, 6000);
                const json = await res.json();
                if (json.msg === 'success' && json.data?.length > 0) {
                    return json.data.map(item => ({
                        time: item.date,
                        open: safeNum(item.open, 0),
                        high: safeNum(item.max, 0),
                        low: safeNum(item.min, 0),
                        close: safeNum(item.close, 0),
                        volume: safeNum(item.Trading_Volume, 0) / 1000
                    }));
                }
            } catch (e) {
                console.warn("FinMind 歷史資料獲取失敗", e);
            }
            return [];
        };

        const emptyQuote = (id) => ({
            name: getStockName(id),
            price: null, change: null, percent: null,
            open: null, high: null, low: null, volume: null,
            marketCap: '---', pe: '---', pb: '---', yield: '---', forwardPE: '---'
        });

        const App = () => {
            const [stockId,      setStockId]      = useState('3481');
            const [currentName,  setCurrentName]  = useState('群創');
            const [inputValue,   setInputValue]   = useState('');
            const [customKey,    setCustomKey]    = useState(() => (localStorage.getItem('api_key_groq') || '').trim());
            
            // Watchlist States
            const [watchlist, setWatchlist] = useState(() => {
                const saved = localStorage.getItem('quant_watchlist');
                return saved ? JSON.parse(saved) : [
                    { id: '2330', name: '台積電' },
                    { id: '3481', name: '群創' },
                    { id: '2317', name: '鴻海' }
                ];
            });
            const [isWatchlistExpanded, setIsWatchlistExpanded] = useState(true);
            const [watchlistQuotes, setWatchlistQuotes] = useState({});

            const [liveQuote,    setLiveQuote]    = useState(emptyQuote('3481'));
            const [history,      setHistory]      = useState([]);
            const [aiData,       setAiData]       = useState(null);
            
            const [techFeatures, setTechFeatures]  = useState(null);
            const [techVersion,  setTechVersion]   = useState(0);
            
            const [isChartLoading, setIsChartLoading] = useState(false);
            const [isAiLoading,    setIsAiLoading]    = useState(false);
            const [statusMsg,      setStatusMsg]      = useState(null);
            const [showSettings,   setShowSettings]   = useState(false);
            const [hoverData,      setHoverData]      = useState(null);

            const containerRefs = { kline: useRef(null), vol: useRef(null), macd: useRef(null), kdj: useRef(null) };
            const chartRefs     = useRef({});
            const seriesRefs    = useRef({});
            const chartInited   = useRef(false);
            const fetchGen      = useRef(0);

            // Fetch background quotes for watchlist
            useEffect(() => {
                let isActive = true;
                const updateWatchlist = async () => {
                    if (watchlist.length === 0) return;
                    for (const item of watchlist) {
                        if (!isActive) break;
                        try {
                            const data = await fetchTWSE_RealTime(item.id);
                            if (data && data.price) {
                                setWatchlistQuotes(prev => ({
                                    ...prev,
                                    [item.id]: data
                                }));
                            }
                        } catch(e){}
                        // brief delay to avoid rate limiting
                        await new Promise(r => setTimeout(r, 200));
                    }
                };
                updateWatchlist();
                const interval = setInterval(updateWatchlist, 15000); // 15 seconds
                return () => { isActive = false; clearInterval(interval); };
            }, [watchlist]);

            const toggleWatchlist = () => {
                setWatchlist(prev => {
                    const exists = prev.find(item => item.id === stockId);
                    let newList;
                    if (exists) {
                        newList = prev.filter(item => item.id !== stockId);
                    } else {
                        newList = [...prev, { id: stockId, name: currentName }];
                    }
                    localStorage.setItem('quant_watchlist', JSON.stringify(newList));
                    return newList;
                });
            }
            const isWatched = watchlist.some(item => item.id === stockId);

            const handleWatchlistClick = (id) => {
                if (id !== stockId) {
                    setStockId(id);
                    setInputValue('');
                }
            };

            const destroyCharts = useCallback(() => {
                Object.values(chartRefs.current).forEach(c => { try { c.remove(); } catch {} });
                chartRefs.current = {};
                seriesRefs.current = {};
                chartInited.current = false;
            }, []);

            const initCharts = useCallback(() => {
                if (!window.LightweightCharts || chartInited.current) return;
                const el = containerRefs.kline.current;
                if (!el || el.clientWidth === 0) return;

                const w = el.clientWidth;
                const base = {
                    width: w,
                    layout: { background: { color: 'transparent' }, textColor: '#9ca3af', fontSize: 11 },
                    grid: { vertLines: { color: '#1f2937' }, horzLines: { color: '#1f2937' } },
                    rightPriceScale: { borderColor: '#374151' },
                    crosshair: { mode: 0 },
                    handleScroll: true, handleScale: true
                };

                const kChart = window.LightweightCharts.createChart(containerRefs.kline.current, { ...base, timeScale: { borderColor: '#374151', fixRightEdge: true } });
                const kSeries   = kChart.addCandlestickSeries({ upColor: '#ef4444', downColor: '#22c55e', borderVisible: false, wickUpColor: '#ef4444', wickDownColor: '#22c55e' });
                const ma5Series = kChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const ma20Series= kChart.addLineSeries({ color: '#60a5fa', lineWidth: 1.5, crosshairMarkerVisible: false });

                const vChart  = window.LightweightCharts.createChart(containerRefs.vol.current,  { ...base, timeScale: { visible: false } });
                const vSeries = vChart.addHistogramSeries({ color: '#3b82f6', priceFormat: { type: 'volume' } });

                const mChart = window.LightweightCharts.createChart(containerRefs.macd.current, { ...base, timeScale: { visible: false } });
                const mDif   = mChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const mDea   = mChart.addLineSeries({ color: '#60a5fa', lineWidth: 1.5, crosshairMarkerVisible: false });
                const mHist  = mChart.addHistogramSeries();

                const kjChart = window.LightweightCharts.createChart(containerRefs.kdj.current, { ...base, timeScale: { visible: false } });
                const kjK = kjChart.addLineSeries({ color: '#f8fafc', lineWidth: 1.5, crosshairMarkerVisible: false });
                const kjD = kjChart.addLineSeries({ color: '#facc15', lineWidth: 1.5, crosshairMarkerVisible: false });
                const kjJ = kjChart.addLineSeries({ color: '#d946ef', lineWidth: 1.5, crosshairMarkerVisible: false });

                chartRefs.current   = { kChart, vChart, mChart, kjChart };
                seriesRefs.current  = { kSeries, ma5Series, ma20Series, vSeries, mDif, mDea, mHist, kjK, kjD, kjJ };
                chartInited.current = true;

                kChart.timeScale().subscribeVisibleLogicalRangeChange(r => {
                    if (r) [vChart, mChart, kjChart].forEach(c => c.timeScale().setVisibleLogicalRange(r));
                });

                const ro = new ResizeObserver(() => {
                    window.requestAnimationFrame(() => {
                        const nw = containerRefs.kline.current?.clientWidth;
                        if (nw) Object.values(chartRefs.current).forEach(c => c.applyOptions({ width: nw }));
                    });
                });
                ro.observe(containerRefs.kline.current);
            }, []);

            const chartDataToRender = useMemo(() => {
                if (!history || history.length === 0) return [];
                
                const sorted = [...history].sort((a, b) => new Date(a.time).getTime() - new Date(b.time).getTime());
                const uniqueHistory = [];
                const seen = new Set();
                for (let item of sorted) {
                    if (!seen.has(item.time)) {
                        seen.add(item.time);
                        uniqueHistory.push({...item});
                    }
                }

                if (liveQuote && liveQuote.price) {
                    const todayStr = new Date().toISOString().split('T')[0];
                    const lClose = safeNum(liveQuote.price, 0);
                    const lOpen = safeNum(liveQuote.open, lClose);
                    const lHigh = Math.max(safeNum(liveQuote.high, lClose), lClose);
                    const lLow = Math.min(safeNum(liveQuote.low, lClose), lClose);
                    const lVol = safeNum(liveQuote.volume, 0);

                    const lastCandle = uniqueHistory[uniqueHistory.length - 1];
                    if (lastCandle && lastCandle.time === todayStr) {
                        lastCandle.close = lClose;
                        lastCandle.high = Math.max(lastCandle.high, lHigh);
                        lastCandle.low = Math.min(lastCandle.low, lLow);
                        lastCandle.volume = Math.max(lastCandle.volume, lVol);
                    } else if (lastCandle && lastCandle.time < todayStr) {
                         uniqueHistory.push({ time: todayStr, open: lOpen, high: lHigh, low: lLow, close: lClose, volume: lVol });
                    }
                }
                return uniqueHistory;
            }, [history, liveQuote]);

            useEffect(() => {
                if (!chartDataToRender.length) return;
                
                if (containerRefs.kline.current && containerRefs.kline.current.clientWidth > 0) {
                     if (!chartInited.current) initCharts();
                } else {
                    return;
                }
                
                const s = seriesRefs.current;
                if (!s.kSeries) return;

                const closes = chartDataToRender.map(d => d.close);
                const ma5    = Indicators.ema(closes, 5);
                const ma20   = Indicators.ema(closes, 20);
                const rsiArr = Indicators.rsi(closes, 14);
                const atrArr = Indicators.atr(chartDataToRender, 14);
                const { dif, dea, hist } = Indicators.macd(closes);
                const { k, d, j } = Indicators.kdj(chartDataToRender);

                const enriched = chartDataToRender.map((item, i) => ({
                    ...item, ma5: ma5[i], ma20: ma20[i],
                    rsi: rsiArr[i], atr: atrArr[i],
                    dif: dif[i], dea: dea[i], macd: hist[i],
                    k: k[i], d: d[i], j: j[i]
                }));

                chartRefs.current.kChart.subscribeCrosshairMove(param => {
                    const found = param.time ? enriched.find(e => e.time === param.time) : null;
                    setHoverData(found || enriched[enriched.length - 1]);
                });
                setHoverData(enriched[enriched.length - 1]);

                const latest = enriched[enriched.length - 1];
                const newFeatures = {
                    atr:  latest.atr.toFixed(2),
                    rsi:  latest.rsi.toFixed(2),
                    macd: { dif: latest.dif.toFixed(2), dea: latest.dea.toFixed(2) },
                    kdj:  { j: latest.j.toFixed(2) }
                };
                
                setTechFeatures(prev => {
                    if (JSON.stringify(prev) !== JSON.stringify(newFeatures)) {
                        setTechVersion(v => v + 1);
                        return newFeatures;
                    }
                    return prev;
                });

                try {
                    s.kSeries.setData(chartDataToRender);
                    s.ma5Series.setData(chartDataToRender.map((d, i) => ({ time: d.time, value: safeNum(ma5[i]) })));
                    s.ma20Series.setData(chartDataToRender.map((d, i) => ({ time: d.time, value: safeNum(ma20[i]) })));
                    s.vSeries.setData(chartDataToRender.map(d => ({ time: d.time, value: safeNum(d.volume), color: d.close >= d.open ? 'rgba(239,68,68,0.6)' : 'rgba(34,197,94,0.6)' })));
                    s.mDif.setData(chartDataToRender.map((d, i) => ({ time: d.time, value: safeNum(dif[i]) })));
                    s.mDea.setData(chartDataToRender.map((d, i) => ({ time: d.time, value: safeNum(dea[i]) })));
                    s.mHist.setData(chartDataToRender.map((d, i) => ({ time: d.time, value: safeNum(hist[i]), color: hist[i] >= 0 ? '#ef4444' : '#22c55e' })));
                    s.kjK.setData(chartDataToRender.map((d, i) => ({ time: d.time, value: safeNum(k[i], 50) })));
                    s.kjD.setData(chartDataToRender.map((d, i) => ({ time: d.time, value: safeNum(d[i], 50) })));
                    s.kjJ.setData(chartDataToRender.map((d, i) => ({ time: d.time, value: safeNum(j[i], 50) })));
                } catch (e) {}
            }, [chartDataToRender, initCharts]);

            useEffect(() => {
                const gen = ++fetchGen.current;

                setLiveQuote(emptyQuote(stockId));
                setCurrentName(getStockName(stockId));
                setHistory([]);
                setAiData(null);
                setTechFeatures(null);
                setStatusMsg(null);
                destroyCharts();
                setIsChartLoading(true);

                Promise.allSettled([
                    fetchTWSE_RealTime(stockId),
                    fetchHistoryData(stockId)
                ]).then(([liveResult, historyResult]) => {
                    if (fetchGen.current !== gen) return;

                    let twseData = liveResult.status === 'fulfilled' ? liveResult.value : null;
                    let historyData = historyResult.status === 'fulfilled' ? historyResult.value : [];

                    if (historyData.length > 0) {
                        setHistory(historyData);
                        
                        if (!twseData || !twseData.price) {
                             const lastCandle = historyData[historyData.length - 1];
                             let prevClose = lastCandle.open;
                             if(historyData.length > 1) prevClose = historyData[historyData.length - 2].close;
                             
                             const change = lastCandle.close - prevClose;
                             const percent = prevClose ? (change / prevClose) * 100 : 0;

                             setLiveQuote(prev => ({
                                 ...prev,
                                 price: lastCandle.close,
                                 change: change,
                                 percent: percent,
                                 open: lastCandle.open,
                                 high: lastCandle.high,
                                 low: lastCandle.low,
                                 volume: lastCandle.volume
                             }));
                        }
                    }

                    if (twseData && twseData.price) {
                        if (twseData.name) setCurrentName(twseData.name);

現價: ${liveQuote.price}, 波動率 ATR(14): ${techFeatures.atr}, 動能 RSI(14): ${techFeatures.rsi}
MACD DIF: ${techFeatures.macd.dif}, KDJ J值: ${techFeatures.kdj.j}

【分析任務指示】
1. **價格預測：** 根據波動率與動能，推算明日的「預估開盤價」與「預估收盤價」（必須是數字，小數點兩位）。

4. **戰略決策：** 綜合評估後，給予這檔股票一個整體戰略分數 (1-100) 與明確的操作結論 (如: 強力買進、逢高減碼、嚴守停損)。
5. **總體聯動推算：** 調用知識庫，給出近期「加權指數(大盤)」與「費半指數(SOX)」的推估數值或趨勢狀態 (如: 17500, 或 偏多)。
6. **基本面與估值填補：** 調用知識庫，給出該公司的「預估本益比」、「殖利率區間」、「股淨比推估」與市值規模判斷。
7. **籌碼與多空情緒推估 (AI推算)：** 請依據目前的線型特徵與你對此檔股票的認知，合理推算當前「主力」、「法人機構」、「散戶」的操作動向 (例如：外資連買、主力洗盤、散戶套牢等簡短描述)，並給出 0~100 的「多空情緒指標 (0極度看空, 100極度看多)」。
8. **專業盤前開盤分析報告 (字數150-200字)：** 結合技術面與可能的產業動態，撰寫長篇盤前報告。必須包含：明日「高開低走」或「低開高走」的具體情境推演、壓力支撐區的測試可能、以及早盤應對策略。

【格式限制】
只能輸出純 JSON，嚴禁 markdown 或解釋文字。
JSON 結構：
{
  "prediction": { "open": 0.0, "close": 0.0, "prob": { "up": 0, "flat": 0, "down": 0 }, "targets": { "tp1": 0.0, "sl": 0.0 }, "open_analysis": "報告內容..." },
  "strategy": { "score": 0, "conclusion": "明確操作結論" },
  "market": { "taiex": "推估大盤", "sox": "推估費半" },
  "fundamentals": { "marketCap": "市值", "yield": "殖利率", "pb": "股淨比", "pe": "本益比", "forwardPE": "預估本益比" },
  "sentiment": { "big_player": "主力動向", "institution": "機構動向", "retail": "散戶動向", "bull_bear_index": 0 }
}`;

                        const res = await fetchWithTimeout('https://api.groq.com/openai/v1/chat/completions', {
                            method: 'POST',
                            headers: { Authorization: `Bearer ${customKey}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                model: DEFAULT_GROQ_MODEL,
                                messages: [
                                    { role: 'system', content: 'You only output valid JSON.' },
                                    { role: 'user', content: prompt }
                                ],
                                response_format: { type: 'json_object' }

                        const data = await res.json();

                        if (!raw) throw new Error('空回應');

                        const jsonStr = raw.match(/\{[\s\S]*\}/)?.[0] || raw;

                                    marketCap: parsed.fundamentals.marketCap || prev.marketCap,

                                    pe: parsed.fundamentals.pe || prev.pe,
                                    forwardPE: parsed.fundamentals.forwardPE || prev.forwardPE

                            }
                        }

                run();
                return () => { cancelled = true; };

                            </div>

                            {/* 盤前分析區塊 - 長篇專業報告 */}
                            <div className="panel-card bg-[#050505] flex-1 flex flex-col min-h-0">
                                <div className="bg-indigo-950/20 border-b border-gray-800 panel-padding flex-none">
                                    <span className="text-indigo-400 font-bold responsive-text-sm uppercase">AI 盤前開盤分析</span>
                                </div>
                                <div className="panel-padding responsive-text-sm text-gray-300 leading-relaxed overflow-y-auto custom-scrollbar text-justify pb-4">
                                    {isAiLoading ? (
                                        <span className="text-gray-500 animate-pulse">深度分析中…</span>
                                    ) : aiData?.prediction?.open_analysis ? (
                                        aiData.prediction.open_analysis
                                    ) : (
                                        <span className="text-gray-600">等待分析結果…</span>
                                    )}
                                </div>
                            </div>

                            {/* 指標說明 */}
                            <div className="panel-card bg-[#050505] flex-none hidden lg:block">
                                <div className="bg-gray-900/40 border-b border-gray-800 panel-padding">
                                    <span className="text-gray-500 font-bold responsive-text-sm uppercase">圖例</span>
                                </div>
                                <div className="panel-padding space-y-1.5 responsive-text-sm font-mono">
                                    {[
                                        ['●', 'text-yellow-400', 'MA5 (5日均線)'],
                                        ['●', 'text-blue-400', 'MA20 (20日均線)'],
                                        ['●', 'text-gray-200', 'KDJ K 值'],
                                        ['●', 'text-yellow-400', 'KDJ D 值'],
                                        ['●', 'text-pink-400', 'KDJ J 值'],
                                    ].map(([dot, cls, label]) => (
                                        <div key={label} className="flex items-center gap-2">
                                            <span className={cls}>{dot}</span>
                                            <span className="text-gray-500">{label}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
