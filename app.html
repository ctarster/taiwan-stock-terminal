    <script type="text/babel" data-presets="react,env">
        const { useState, useEffect, useCallback, useRef, useMemo, Fragment } = React;

        const CONSTANTS = {
            DEFAULT_SYMBOL: '2330',
            DEFAULT_NAME: '台積電',
            DEFAULT_MODEL: 'llama-3.3-70b-versatile',
            API_KEY_STORAGE: 'quant_groq_api_key',
            MODEL_STORAGE: 'quant_groq_model',
            WATCHLIST_STORAGE: 'quant_watchlist'
        };

        const DataUtils = {
            safeNum: (val, fallback = 0) => {
                if (val === null || val === undefined || val === '') return fallback;
                const n = Number(val);
                return (!isNaN(n) && isFinite(n)) ? n : fallback;
            },
            fmtPrice: (val) => {
                if (val === undefined || val === null || val === '-' || val === '---') return '---';
                const num = Number(val);
                return (isNaN(num) || !isFinite(num)) ? '---' : num.toFixed(2);
            },
            fmtChange: (val) => {
                if (val === undefined || val === null || val === '-' || val === '---') return '---';
                const num = Number(val);
                if (isNaN(num) || !isFinite(num)) return '---';
                return num > 0 ? `+${num.toFixed(2)}` : num.toFixed(2);
            },
            fmtPercent: (val) => {
                if (val === undefined || val === null || val === '-' || val === '---') return '---';
                const num = Number(val);
                if (isNaN(num) || !isFinite(num)) return '---';
                return num > 0 ? `+${num.toFixed(2)}%` : `${num.toFixed(2)}%`;
            },
            fmtVol: (val) => {
                if (val === undefined || val === null || val === '-' || val === '---') return '0';
                const num = Number(val);
                return (isNaN(num) || !isFinite(num)) ? '0' : Math.round(num).toLocaleString('en-US');
            },
            aggregateWeekly: (dailyData) => {
                const weekly = [];
                if (!dailyData || dailyData.length === 0) return weekly;
                const getWeek = (dateString) => {
                    const d = new Date(dateString);
                    d.setHours(0, 0, 0, 0);
                    d.setDate(d.getDate() + 4 - (d.getDay() || 7));
                    const yearStart = new Date(d.getFullYear(), 0, 1);
                    const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
                    return `${d.getFullYear()}-W${weekNo.toString().padStart(2, '0')}`;
                };
                let currentWeek = null;
                let weekCandle = null;
                dailyData.forEach(day => {
                    const weekKey = getWeek(day.time);
                    if (weekKey !== currentWeek) {
                        if (weekCandle) weekly.push(weekCandle);
                        currentWeek = weekKey;
                        weekCandle = { ...day };
                    } else {
                        weekCandle.high = Math.max(weekCandle.high, day.high);
                        weekCandle.low = Math.min(weekCandle.low, day.low);
                        weekCandle.close = day.close;
                        weekCandle.volume += day.volume;
                    }
                });
                if (weekCandle) weekly.push(weekCandle);
                return weekly;
            },
            deduplicateAndSort: (dataArray) => {
                if (!dataArray || !Array.isArray(dataArray)) return [];
                const sorted = [...dataArray].sort((a, b) => {
                    const timeA = typeof a.time === 'string' ? new Date(a.time).getTime() : a.time;
                    const timeB = typeof b.time === 'string' ? new Date(b.time).getTime() : b.time;
                    return timeA - timeB;
                });
                const unique = [];
                const seen = new Set();
                for (let item of sorted) {
                    if (!seen.has(item.time)) {
                        seen.add(item.time);
                        unique.push({...item});
                    }
                }
                return unique;
            }
        };

        const Indicators = {
            ema: (data, period) => {
                if (!data || data.length === 0) return [];
                const k = 2 / (period + 1);
                let emaVal = DataUtils.safeNum(data[0], 0);
                return data.map((val, i) => {
                    if (i === 0) return emaVal;
                    emaVal = (DataUtils.safeNum(val, 0) - emaVal) * k + emaVal;
                    return emaVal;
                });
            },
            calculateMACD: (closePrices) => {
                if (!closePrices || closePrices.length < 26) {
                    const zeros = new Array(closePrices ? closePrices.length : 0).fill(0);
                    return { dif: zeros, dea: zeros, macd: zeros };
                }
                const ema12 = Indicators.ema(closePrices, 12);
                const ema26 = Indicators.ema(closePrices, 26);
                const dif = ema12.map((v, i) => v - ema26[i]);
                const dea = Indicators.ema(dif, 9);
                const macd = dif.map((v, i) => (v - dea[i]) * 2);
                return { dif, dea, macd };
            },
            calculateKDJ: (history) => {
                if (!history || history.length === 0) return { k: [], d: [], j: [] };
                const period = 9;
                const ks = [], ds = [], js = [];
                let k = 50, d = 50;
                for (let i = 0; i < history.length; i++) {
                    const start = Math.max(0, i - period + 1);
                    const slice = history.slice(start, i + 1);
                    const close = DataUtils.safeNum(history[i].close, 0);
                    const low = Math.min(...slice.map(h => DataUtils.safeNum(h.low, close)));
                    const high = Math.max(...slice.map(h => DataUtils.safeNum(h.high, close)));
                    
                    const rsv = high === low ? 0 : ((close - low) / (high - low)) * 100;
                    k = (2 / 3) * k + (1 / 3) * rsv;
                    d = (2 / 3) * d + (1 / 3) * k;
                    
                    js.push(3 * k - 2 * d);
                    ks.push(k);
                    ds.push(d);
                }
                return { k: ks, d: ds, j: js };
            }
        };

        class NetworkManager {
            static async fetchWithTimeout(url, options = {}, timeoutMs = 8000) {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const response = await fetch(url, { ...options, signal: controller.signal });
                    clearTimeout(id);
                    return response;
                } catch (e) {
                    clearTimeout(id);
                    throw new Error(`Timeout`);
                }
            }

            // 智慧雙軌直連：優先原生 fetch，若遇 CORS 則退避至代理
            static async smartFetch(url, timeoutMs = 6000) {
                const cb = `_cb=${Date.now()}_${Math.floor(Math.random() * 1000000)}`;
                const safeUrl = url.includes('?') ? `${url}&${cb}` : `${url}?${cb}`;
                
                try {
                    const directRes = await this.fetchWithTimeout(safeUrl, { cache: 'no-store' }, timeoutMs);
                    if (directRes.ok) {
                        return await directRes.json();
                    }
                } catch(e) {} // 靜默降級

                const encodedUrl = encodeURIComponent(safeUrl);
                const proxies = [
                    { url: `https://api.allorigins.win/raw?url=${encodedUrl}`, isWrapper: false },
                    { url: `https://api.codetabs.com/v1/proxy?quest=${encodedUrl}`, isWrapper: false },
                    { url: `https://corsproxy.io/?${encodedUrl}`, isWrapper: false }
                ];

                const controllers = proxies.map(() => new AbortController());

                try {
                    const result = await Promise.any(proxies.map(async (proxyObj, idx) => {
                        const id = setTimeout(() => controllers[idx].abort(), timeoutMs);
                        try {
                            const res = await fetch(proxyObj.url, { 
                                method: 'GET',
                                cache: 'no-store', 
                                signal: controllers[idx].signal
                            });
                            clearTimeout(id);
                            
                            if (!res.ok) throw new Error(`Bad Status`);
                            const text = await res.text();
                            
                            let json;
                            if (proxyObj.isWrapper) {
                                const parsed = JSON.parse(text);
                                if (!parsed.contents) throw new Error('No contents');
                                json = JSON.parse(parsed.contents);
                            } else {
                                json = JSON.parse(text);
                            }
                            
                            if (json && (json.chart || json.quoteResponse || json.msgArray || json.data)) {
                                return json;
                            }
                            throw new Error('Invalid Payload Structure');
                        } catch (e) {
                            clearTimeout(id);
                            throw e;
                        }
                    }));
                    
                    controllers.forEach(c => c.abort()); 
                    return result;
                } catch (e) {
                    return null;
                }
            }

            // 終極防彈 Groq 解析器 (原生直連，拒絕代理導致的死鎖)
            static async fetchGroq(prompt, target, apiKey, modelName) {
                const cleanApiKey = String(apiKey).replace(/[^\x21-\x7E]/g, '');
                if (!cleanApiKey) throw new Error("API 金鑰格式錯誤");

                const url = `https://api.groq.com/openai/v1/chat/completions`;
                const payload = {
                    model: modelName,
                    temperature: 0.0, // 降低隨機性，保證 JSON 穩定
                    max_tokens: 1500, 
                    response_format: { type: "json_object" },
                    messages: [
                        { role: "system", content: prompt },
                        { role: "user", content: `提供台股 [${target}] 分析數據，務必只輸出 JSON。` }
                    ]
                };

                let retries = 1; 
                let delay = 1000;

                while (retries >= 0) {
                    try {
                        const res = await this.fetchWithTimeout(url, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${cleanApiKey}`
                            },
                            body: JSON.stringify(payload)
                        }, 25000);

                        if (!res.ok) {
                            if (res.status === 401) throw new Error("API 金鑰無效或未授權 (401)");
                            if (res.status === 404) throw new Error("模型名稱不存在 (404)");
                            if (res.status === 429) throw new Error("請求頻率超限 (429)");
                            if (res.status === 503) throw new Error("伺服器目前過載 (503)");
                            throw new Error(`API 錯誤 (${res.status})`);
                        }

                        const json = await res.json();
                        let rawText = null;
                        if (json.choices && json.choices.length > 0 && json.choices[0].message) {
                            rawText = json.choices[0].message.content;
                        }
                        if (!rawText) throw new Error("模型未回傳有效文本");
                        
                        rawText = rawText.replace(/```json/gi, '').replace(/```/gi, '').trim();
                        const firstBrace = rawText.indexOf('{');
                        const lastBrace = rawText.lastIndexOf('}');
                        if (firstBrace === -1 || lastBrace === -1) {
                            throw new Error("回傳格式非完整 JSON 結構");
                        }
                        
                        const jsonStr = rawText.slice(firstBrace, lastBrace + 1);
                        return JSON.parse(jsonStr);
                    } catch (error) {
                        if (error.message.includes('401') || error.message.includes('404')) {
                            throw error;
                        }
                        if (retries === 0) {
                            const isTimeout = error.message.includes('Timeout');
                            throw new Error(isTimeout ? "伺服器無回應或網路壅塞" : error.message);
                        }
                        retries--;
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 1.5;
                    }
                }
            }
        }

        class MarketDataFetcher {
            
            // TWSE 官方直連 (絕對零延遲)
            static async fetchTWSE_RealTime(target) {
                const ts = Date.now();
                const url = `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_${target}.tw|otc_${target}.tw&json=1&delay=0&_=${ts}`;
                try {
                    const data = await NetworkManager.smartFetch(url, 4000);
                    if (data && data.msgArray && data.msgArray.length > 0) {
                        const r = data.msgArray[0];
                        const prevClose = DataUtils.safeNum(r.y, 0);
                        const currentPrice = r.z !== '-' ? DataUtils.safeNum(r.z, prevClose) : prevClose;
                        const change = currentPrice - prevClose;
                        const percent = prevClose !== 0 ? (change / prevClose) * 100 : 0;
                        
                        return {
                            price: currentPrice,
                            change: change,
                            percent: percent,
                            open: r.o !== '-' ? DataUtils.safeNum(r.o, currentPrice) : currentPrice,
                            high: r.h !== '-' ? DataUtils.safeNum(r.h, currentPrice) : currentPrice,
                            low: r.l !== '-' ? DataUtils.safeNum(r.l, currentPrice) : currentPrice,
                            close: currentPrice,
                            volume: DataUtils.safeNum(r.v, 0), // TWSE 本身就是張
                            isTwse: true
                        };
                    }
                } catch(e) {}
                return null;
            }

            // 綜合：即時報價與基本面 (雙線並行)
            static async getUltimateQuoteAndFundamentals(target) {
                const twseQuote = await this.fetchTWSE_RealTime(target);

                let bestQuote = twseQuote;
                let fundamentals = { marketCap: '---', pe: '---', pb: '---', yield: '---', eps: '---', forwardPE: '---' };
                let intradayCandles = [];

                for (let ext of ['.TW', '.TWO']) {
                    const fundUrl = `https://query2.finance.yahoo.com/v7/finance/quote?symbols=${target}${ext}`;
                    const chartUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${target}${ext}?interval=1m&range=1d`;
                    
                    try {
                        const [fundData, chartData] = await Promise.all([
                            NetworkManager.smartFetch(fundUrl, 4000),
                            NetworkManager.smartFetch(chartUrl, 4000)
                        ]);

                        if (fundData && fundData.quoteResponse && fundData.quoteResponse.result && fundData.quoteResponse.result.length > 0) {
                            const r = fundData.quoteResponse.result[0];
                            if (r.marketCap) {
                                fundamentals.marketCap = r.marketCap >= 1000000000000 ? (r.marketCap / 1000000000000).toFixed(2) + " 兆" : (r.marketCap / 100000000).toFixed(2) + " 億";
                            }
                            fundamentals.pe = r.trailingPE ? r.trailingPE.toFixed(2) : "---";
                            fundamentals.pb = r.priceToBook ? r.priceToBook.toFixed(2) : "---";
                            fundamentals.yield = r.trailingAnnualDividendYield ? (r.trailingAnnualDividendYield * 100).toFixed(2) + "%" : "---";
                            fundamentals.eps = r.epsTrailingTwelveMonths ? r.epsTrailingTwelveMonths.toFixed(2) : "---";
                            fundamentals.forwardPE = r.forwardPE ? r.forwardPE.toFixed(2) : "---";

                            if (!bestQuote) {
                                const currentPrice = DataUtils.safeNum(r.regularMarketPrice, 0);
                                const prevClose = DataUtils.safeNum(r.regularMarketPreviousClose, currentPrice);
                                bestQuote = {
                                    price: currentPrice,
                                    change: currentPrice - prevClose,
                                    percent: prevClose !== 0 ? ((currentPrice - prevClose) / prevClose) * 100 : 0,
                                    open: DataUtils.safeNum(r.regularMarketOpen, currentPrice),
                                    high: DataUtils.safeNum(r.regularMarketDayHigh, currentPrice),
                                    low: DataUtils.safeNum(r.regularMarketDayLow, currentPrice),
                                    volume: DataUtils.safeNum(r.regularMarketVolume, 0) / 1000
                                };
                            }
                        }

                        if (chartData && chartData.chart && chartData.chart.result && chartData.chart.result.length > 0) {
                            const result0 = chartData.chart.result[0];
                            const timestamps = result0.timestamp || [];
                            const q = (result0.indicators && result0.indicators.quote && result0.indicators.quote.length > 0) ? result0.indicators.quote[0] : {};
                            
                            const quoteClose = q.close || [];
                            const quoteOpen = q.open || [];
                            const quoteHigh = q.high || [];
                            const quoteLow = q.low || [];
                            const quoteVol = q.volume || [];

                            let lastValidClose = bestQuote ? bestQuote.price : 0;
                            for (let i = 0; i < timestamps.length; i++) {
                                const c = quoteClose[i];
                                if (c !== null && c !== undefined) {
                                    lastValidClose = c;
                                    intradayCandles.push({
                                        time: timestamps[i] + 28800, // UTC+8
                                        open: DataUtils.safeNum(quoteOpen[i], lastValidClose),
                                        high: DataUtils.safeNum(quoteHigh[i], lastValidClose),
                                        low: DataUtils.safeNum(quoteLow[i], lastValidClose),
                                        close: c,
                                        volume: DataUtils.safeNum(quoteVol[i], 0) / 1000
                                    });
                                }
                            }
                        }
                        
                        if (bestQuote && fundamentals.pe !== '---') break; 

                    } catch(e) {}
                }

                if (!bestQuote) return null;

                return {
                    ...bestQuote,
                    close: bestQuote.price,
                    intradayCandles: intradayCandles,
                    ...fundamentals
                };
            }

            static async getHistoryData(target) {
                for (let ext of ['.TW', '.TWO']) {
                    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${target}${ext}?interval=1d&range=2y`;
                    try {
                        const data = await NetworkManager.smartFetch(url, 6000);
                        if (data && data.chart && data.chart.result && data.chart.result.length > 0) {
                            const result = data.chart.result[0];
                            const timestamps = result.timestamp;
                            const q = (result.indicators && result.indicators.quote && result.indicators.quote.length > 0) ? result.indicators.quote[0] : {};
                            const quoteClose = q.close || [];
                            const quoteOpen = q.open || [];
                            const quoteHigh = q.high || [];
                            const quoteLow = q.low || [];
                            const quoteVol = q.volume || [];

                            if (!timestamps || quoteClose.length === 0) continue;
                            
                            const history = [];
                            for (let i = 0; i < timestamps.length; i++) {
                                if (quoteClose[i] === null || quoteOpen[i] === null) continue;
                                const d = new Date(timestamps[i] * 1000);
                                const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                                history.push({
                                    time: dateStr, 
                                    open: DataUtils.safeNum(quoteOpen[i], 0), 
                                    high: DataUtils.safeNum(quoteHigh[i], 0), 
                                    low: DataUtils.safeNum(quoteLow[i], 0), 
                                    close: DataUtils.safeNum(quoteClose[i], 0), 
                                    volume: DataUtils.safeNum(quoteVol[i], 0) / 1000
                                });
                            }
                            if (history.length > 0) return history;
                        }
                    } catch(e){}
                }

                try {
                    const d = new Date(); d.setFullYear(d.getFullYear() - 2);
                    const startDate = d.toISOString().split('T')[0];
                    const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${target}&start_date=${startDate}`;
                    const res = await NetworkManager.fetchWithTimeout(url, {}, 5000);
                    const json = await res.json();
                    if (json.msg === 'success' && json.data && json.data.length > 0) {
                        return json.data.map(i => ({ 
                            time: i.date, 
                            open: DataUtils.safeNum(i.open), 
                            high: DataUtils.safeNum(i.max), 
                            low: DataUtils.safeNum(i.min), 
                            close: DataUtils.safeNum(i.close), 
                            volume: DataUtils.safeNum(i.Trading_Volume) / 1000 
                        }));
                    }
                } catch (e) { }

                return [];
            }
        }

        const App = () => {
            const [stockId, setStockId] = useState(CONSTANTS.DEFAULT_SYMBOL);
            const [currentName, setCurrentName] = useState(CONSTANTS.DEFAULT_NAME);

                model: localStorage.getItem(CONSTANTS.MODEL_STORAGE) || CONSTANTS.DEFAULT_MODEL
            });
            const [settingsError, setSettingsError] = useState(null);
            
            const [liveQuote, setLiveQuote] = useState(null); 
            const [baseHistoryData, setBaseHistoryData] = useState([]); 
            const [intradayData, setIntradayData] = useState([]); 
            const [aiData, setAiData] = useState(null);
            
            const [isChartLoading, setIsChartLoading] = useState(true);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [error, setError] = useState(null);
            const [timeframe, setTimeframe] = useState('1D'); 
            const [hoverData, setHoverData] = useState(null); 
            const [isFullScreen, setIsFullScreen] = useState(false);
            const [zenMode, setZenMode] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [fullStockList, setFullStockList] = useState([]); 
            const [suggestions, setSuggestions] = useState([]); 
            const [showSuggestions, setShowSuggestions] = useState(false);

            const [watchlist, setWatchlist] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem(CONSTANTS.WATCHLIST_STORAGE)) || [
                        { id: '2330', name: '台積電' }, { id: '2317', name: '鴻海' }, { id: '2454', name: '聯發科' }, { id: '2603', name: '長榮' }
                    ];
                } catch {
                    return [{ id: '2330', name: '台積電' }];
                }
            });
            const [watchlistQuotes, setWatchlistQuotes] = useState({});
            const [isWatchlistExpanded, setIsWatchlistExpanded] = useState(true);
            
            const rootRef = useRef(null);
            const inputRef = useRef(null); 
            const chartRefs = useRef({});
            const seriesRefs = useRef({});
            const containerRefs = { kline: useRef(null), vol: useRef(null), macd: useRef(null), kdj: useRef(null) };
            
            const isChartInitialized = useRef(false);
            const currentFetchId = useRef(0);
            const dataLoadedRef = useRef(''); // Format: 'stockId_timeframe'

            const isWatched = watchlist.some(w => w.id === stockId);

                        const twDate = new Date(twUtc);
                        const todayStr = `${twDate.getFullYear()}-${String(twDate.getMonth()+1).padStart(2,'0')}-${String(twDate.getDate()).padStart(2,'0')}`;
                        
                        const lClose = DataUtils.safeNum(liveQuote.price, 0);
                        const lOpen = DataUtils.safeNum(liveQuote.open, lClose);
                        const lHigh = Math.max(DataUtils.safeNum(liveQuote.high, lClose), lClose);
                        const lLow = Math.min(DataUtils.safeNum(liveQuote.low, lClose), lClose);
                        const lVol = DataUtils.safeNum(liveQuote.volume, 0);

                        const lastCandle = uniqueHistory[uniqueHistory.length - 1];
                        
                        if (lastCandle && lastCandle.time < todayStr) {
                            uniqueHistory.push({ time: todayStr, open: lOpen, high: lHigh, low: lLow, close: lClose, volume: lVol });
                        } else if (lastCandle && lastCandle.time === todayStr) {
                            lastCandle.open = lOpen;
                            lastCandle.high = Math.max(lastCandle.high, lHigh);
                            lastCandle.low = Math.min(lastCandle.low, lLow);
                            lastCandle.close = lClose;
                            lastCandle.volume = Math.max(lastCandle.volume, lVol);
                        } else if (!lastCandle) {
                            uniqueHistory.push({ time: todayStr, open: lOpen, high: lHigh, low: lLow, close: lClose, volume: lVol });
                        }
                    }
                    dataToEnrich = timeframe === '1W' ? DataUtils.aggregateWeekly(uniqueHistory) : uniqueHistory;

                const { dif, dea, macd } = Indicators.calculateMACD(closePrices);
                const { k, d, j } = Indicators.calculateKDJ(dataToEnrich);
                
                return dataToEnrich.map((item, i) => ({
                    ...item, ma5: ma5[i], ma20: ma20[i], ma60: ma60[i], dif: dif[i], dea: dea[i], macd: macd[i], k: k[i], d: d[i], j: j[i]

                                                    開:{DataUtils.fmtPrice(hdOpen)} 高:{DataUtils.fmtPrice(hdHigh)} 低:{DataUtils.fmtPrice(hdLow)} 收:{DataUtils.fmtPrice(hdClose)}
                                                </div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-yellow-500 border border-gray-800">MA5:{DataUtils.fmtPrice(hdMa5)}</div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-blue-400 border border-gray-800">MA20:{DataUtils.fmtPrice(hdMa20)}</div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-green-400 border border-gray-800">MA60:{DataUtils.fmtPrice(hdMa60)}</div>
                                            </div>
                                            <div ref={containerRefs.kline} className="w-full h-full" />
                                        </div>
                                        
                                        <div className="relative w-full flex-[1.2] min-h-0 flex flex-col border-t border-gray-900 overflow-hidden">
                                            <div className="absolute top-0.5 left-2 z-10 flex gap-1 text-[9px] font-mono pointer-events-none">
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-gray-300 font-bold border border-white/5">成交量</div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-blue-300 font-bold border border-white/5">
                                                    Vol: {DataUtils.fmtVol(hdVolume)}
                                                </div>
                                            </div>
                                            <div ref={containerRefs.vol} className="w-full h-full" />
                                        </div>
                                        
                                        <div className="relative w-full flex-[1.2] min-h-0 flex flex-col border-t border-gray-900 overflow-hidden">
                                            <div className="absolute top-0.5 left-2 z-10 flex gap-1 text-[9px] font-mono pointer-events-none">
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-gray-300 font-bold border border-white/5">MACD (12,26,9)</div>
                                                <div className={`bg-black/80 px-1.5 py-0.5 rounded border border-white/5 ${hdMacd >= 0 ? "text-red-500" : "text-green-500"}`}>MACD:{DataUtils.fmtPrice(hdMacd)}</div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-yellow-500 border border-white/5">DIF:{DataUtils.fmtPrice(hdDif)}</div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-blue-400 border border-white/5">DEA:{DataUtils.fmtPrice(hdDea)}</div>
                                            </div>
                                            <div ref={containerRefs.macd} className="w-full h-full" />
                                        </div>
                                        
                                        <div className="relative w-full flex-[1.2] min-h-0 flex flex-col border-t border-gray-900 overflow-hidden">
                                            <div className="absolute top-0.5 left-2 z-10 flex gap-1 text-[9px] font-mono pointer-events-none">
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-gray-300 font-bold border border-white/5">KDJ (9,3,3)</div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-white border border-white/5">K:{DataUtils.fmtPrice(hdK)}</div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-yellow-500 border border-white/5">D:{DataUtils.fmtPrice(hdD)}</div>
                                                <div className="bg-black/80 px-1.5 py-0.5 rounded text-pink-500 border border-white/5">J:{DataUtils.fmtPrice(hdJ)}</div>
                                            </div>
                                            <div ref={containerRefs.kdj} className="w-full h-full" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="col-span-12 lg:col-span-3 flex flex-col gap-2 overflow-y-auto custom-scrollbar pl-0.5 pb-1 relative">
                                {!apiConfig.key ? (
                                    <div className="absolute inset-0 z-20 flex flex-col justify-center items-center bg-black/60 backdrop-blur-sm rounded">
                                        <p className="text-[11px] text-blue-400 font-bold mb-3 tracking-widest text-center">請設定 Groq 金鑰<br/>解鎖 AI 戰略與籌碼分析</p>
                                        <button onClick={() => setShowSettings(true)} className="bg-blue-700 text-white text-[10px] px-6 py-2 rounded font-black hover:bg-blue-600 transition-all shadow-[0_0_15px_rgba(37,99,235,0.4)]">立刻設定</button>
                                    </div>
                                ) : null}

                                <div className="panel-card flex-none border border-gray-800 bg-[#050505]">
                                    <div className="bg-cyan-950/20 border-b border-gray-800 p-2 px-3"><span className="text-cyan-400 font-bold text-[10px] tracking-widest uppercase">營收與獲利動能</span></div>
                                    <div className="p-3 space-y-2 text-[10px]">
                                        <div className="flex justify-between border-b border-gray-800 border-dotted pb-1">
                                            <span className="text-gray-500">月營收 (MoM)</span>
                                            {isAiLoading ? <div className="h-3 w-10 skeleton-text"></div> : <span className="text-white font-bold">{displayVal(aiGrowthMom)}</span>}
                                        </div>
                                        <div className="flex justify-between border-b border-gray-800 border-dotted pb-1">
                                            <span className="text-gray-500">年營收 (YoY)</span>
                                            {isAiLoading ? <div className="h-3 w-10 skeleton-text"></div> : <span className="text-white font-bold">{displayVal(aiGrowthYoy)}</span>}
                                        </div>
                                        <div className="flex justify-between border-b border-gray-800 border-dotted pb-1">
                                            <span className="text-gray-500">預估毛利率</span>
                                            {isAiLoading ? <div className="h-3 w-10 skeleton-text"></div> : <span className="text-white font-bold">{displayVal(aiGrowthGross)}</span>}
                                        </div>
                                        
                                        {isAiLoading ? <div className="h-8 mt-2 skeleton-text w-full"></div> : <div className="mt-2 text-gray-400 bg-gray-900/40 p-2 border border-gray-800 rounded leading-relaxed text-justify">{aiFundStatus || "等待分析..."}</div>}
                                    </div>
                                </div>

                                <div className="panel-card flex-none border border-gray-800 bg-[#050505]">
                                    <div className="bg-indigo-950/20 border-b border-gray-800 p-2 px-3"><span className="text-indigo-400 font-bold text-[10px] tracking-widest uppercase">籌碼與資金</span></div>
                                    <div className="p-3 space-y-2 text-[10px]">
                                        <div className="flex justify-between border-b border-gray-800 border-dotted pb-1">
                                            <span className="text-gray-500">外資動態</span>
                                            {isAiLoading ? <div className="h-3 w-10 skeleton-text"></div> : <span className="text-white font-bold">{displayVal(aiChipsForeign)}</span>}
                                        </div>
                                        <div className="flex justify-between border-b border-gray-800 border-dotted pb-1">
                                            <span className="text-gray-500">投信動態</span>
                                            {isAiLoading ? <div className="h-3 w-10 skeleton-text"></div> : <span className="text-blue-400 font-bold">{displayVal(aiChipsTrust)}</span>}
                                        </div>
                                        <div className="flex justify-between border-b border-gray-800 border-dotted pb-1">
                                            <span className="text-gray-500">主力持股</span>
                                            {isAiLoading ? <div className="h-3 w-10 skeleton-text"></div> : <span className="text-white font-black font-mono">{displayVal(aiChipsBig)}</span>}
                                        </div>
                                        <div className="flex justify-between pb-0.5">
                                            <span className="text-gray-500">散戶持股</span>
                                            {isAiLoading ? <div className="h-3 w-10 skeleton-text"></div> : <span className="text-white font-bold font-mono">{displayVal(aiChipsRetail)}</span>}
                                        </div>
                                    </div>
                                </div>

                                <div className="panel-card flex-none border border-gray-800 bg-[#050505]">
                                    <div className="bg-orange-950/20 border-b border-gray-800 p-2 px-3 flex justify-between items-center"><span className="text-orange-400 font-bold text-[10px] tracking-widest uppercase">AI 戰略矩陣</span><span className="text-sm font-black text-white">{isAiLoading ? '--' : aiStrategyScore} 分</span></div>
                                    <div className="p-3 space-y-2 text-[10px]">
                                        {isAiLoading ? (
                                            <div>
                                                <div className="h-10 skeleton-text w-full mb-2"></div>
                                                <div className="h-8 skeleton-text w-full"></div>
                                            </div>
                                        ) : (
                                            <div>
                                                <div className="bg-gray-900/50 p-2 rounded border border-gray-800 mb-2"><span className="text-white font-bold block mb-1">{displayVal(aiStrategyConclusion)}</span><span className="text-gray-400 block text-[9px]">短線：{displayVal(aiStrategyShort)}</span></div>
                                                <div className="flex justify-between p-2 bg-red-950/20 border border-red-900/40 rounded"><span className="text-red-400 font-bold">建議停損</span><span className="text-white font-bold font-mono">{displayVal(aiStrategyStop)}</span></div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="panel-card flex-1 min-h-[150px] flex flex-col border border-gray-800 bg-[#050505]">
                                    <div className="bg-yellow-950/20 border-b border-gray-800 p-2 px-3">
                                        <span className="text-yellow-400 font-bold text-[10px] tracking-widest uppercase">即時情報與觀點</span>
                                    </div>
                                    <div className="p-1.5 space-y-1 flex-1 overflow-y-auto custom-scrollbar">
                                        {isAiLoading ? (
                                            <div className="p-2 space-y-2">
                                                <div className="h-12 skeleton-text w-full"></div>
                                                <div className="h-12 skeleton-text w-full"></div>
                                                <div className="h-12 skeleton-text w-full"></div>
                                            </div>
                                        ) : (aiNews && aiNews.length > 0) ? (
                                            aiNews.map((n, i) => (
                                                <a key={i} href={`https://www.google.com/search?q=${encodeURIComponent(stockId + ' ' + String(n.title))}&tbm=nws`} target="_blank" rel="noreferrer" className="block border-b border-gray-800/50 p-2 hover:bg-gray-800/40 transition-colors group">
                                                    <div className="flex justify-between text-[8px] mb-1 text-gray-500">
                                                        <span>{n.date}</span>
                                                        <span className={n.impact === '多' ? 'text-red-500 font-bold' : n.impact === '空' ? 'text-green-500 font-bold' : 'text-gray-400'}>{n.impact}</span>
                                                    </div>
                                                    <div className="text-gray-200 font-bold text-[10px] leading-tight group-hover:text-blue-400 transition-colors">
                                                        {n.title}
                                                    </div>
                                                    <div className="max-h-0 overflow-hidden group-hover:max-h-[100px] opacity-0 group-hover:opacity-100 transition-all duration-300 ease-in-out">
                                                        <div className="mt-1.5 text-[9px] text-gray-500 leading-relaxed border-l border-gray-700 pl-1.5">{n.snippet && n.snippet !== "-" ? n.snippet : "點擊跳轉..."}</div>
                                                    </div>
                                                </a>
                                            ))
                                        ) : (
                                            <div className="text-center text-gray-600 text-[10px] py-4">---</div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
